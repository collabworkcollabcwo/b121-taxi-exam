<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUT-Exam · B121 / BPT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ===== Official CUT design tokens (asa Computer-Unterstützte Theorieprüfung) ===== */
  :root{
    --white:#ffffff;
    --night-rider:#303030;      /* texts */
    --dark-grey:#ababab;        /* lines, strokes */
    --silver:#c6c6c6;           /* inactive states */
    --white-smoke:#f1f1f1;      /* backgrounds */
    --mariner:#355da6;          /* buttons / primary */
    --mariner-light:#afbedb;
    --mahogany:#d73b40;         /* failed, errors */
    --medium-orchid:#af61c6;    /* marked content */
    --deep-lilac:#9849af;
    --jungle-green:#289b7c;     /* passed, accepted */
    --tropical-rain-forest:#027d5c;

    --primary-text-color:var(--night-rider);
    --line-color:var(--dark-grey);
    --inactive-color:var(--silver);
    --shared-background-color:var(--white-smoke);
    --button-color:var(--mariner);
    --error-color:var(--mahogany);
    --marked-content-color:var(--medium-orchid);
    --test-accepted-color:var(--jungle-green);
  }
  *{box-sizing:border-box;}
  html{height:100%;}
  body{
    width:100vw; margin:0;
    -webkit-tap-highlight-color:transparent;
    user-select:none; cursor:default;
    background-color:white; color:var(--primary-text-color);
    font-family:'Roboto Condensed','Roboto',sans-serif;
    font-style:normal; font-weight:400;
    overflow-x:hidden;
  }
  .header{
    height:80px; padding:0 60px; background-color:var(--white-smoke);
    display:flex; flex-direction:row; align-items:center;
  }
  .footer{
    position:fixed; bottom:0; left:0; right:0; height:80px; padding:0 60px;
    background-color:var(--white-smoke);
    display:flex; flex-direction:row; align-items:center;
  }
  .justified{justify-content:space-between;}
  .scrollpanel{
    overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch;
    position:absolute; top:80px; bottom:80px; left:0; right:0;
  }
  .scrollpanel-noheader{top:0;}
  /* paper-button replica */
  .pbtn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    font-family:inherit; font-size:14px; font-weight:500; letter-spacing:.2px;
    color:var(--mariner); background:#fff; border:none; border-radius:5px;
    padding:10px 16px; min-width:64px; cursor:pointer; text-transform:none;
    box-shadow:0 2px 2px 0 rgba(0,0,0,.14),0 1px 5px 0 rgba(0,0,0,.12),0 3px 1px -2px rgba(0,0,0,.2);
    transition:box-shadow .15s;
  }
  .pbtn:active{box-shadow:0 4px 5px 0 rgba(0,0,0,.14),0 1px 10px 0 rgba(0,0,0,.12),0 2px 4px -1px rgba(0,0,0,.3);}
  .pbtn.invert{background:var(--mariner); color:white;}
  .pbtn.flat{box-shadow:none; background:transparent;}
  .pbtn.bookmarkbtn{color:var(--marked-content-color);}
  .pbtn svg{width:20px; height:20px; fill:currentColor; flex:0 0 auto;}
  /* icon button (navigation chevrons) */
  .navbtn{
    border:none; cursor:pointer; color:white; background-color:var(--button-color);
    width:50px; height:50px; padding:8px;
  }
  .navbtn svg{width:100%; height:100%; fill:white;}
  .navbtn.back{border-radius:0 5px 5px 0;}
  .navbtn.forward{border-radius:5px 0 0 5px;}
  .navbtn:disabled{background-color:var(--silver); cursor:default;}
  /* login-info block (top right on start screens) */
  .logininfo{
    position:absolute; top:8px; right:44px; font-size:13px; line-height:1.3;
  }
  .logininfo td{padding:1px 0;}
  .logininfo td:first-child{padding-right:24px;}
  .logininfo td:last-child{font-weight:700;}
  /* ===== language selection ===== */
  .langpage{position:absolute; top:60px; left:0; right:0; display:flex; flex-direction:column; align-items:center;}
  .langcards{margin-top:75px; display:flex; gap:14px; flex-wrap:wrap; justify-content:center; max-width:400px;}
  .langcard{
    width:170px; padding:22px 0; text-align:center; background:#fff; border:none; cursor:pointer;
    color:var(--mariner); font-family:inherit; font-size:14px; font-weight:500; border-radius:2px;
    box-shadow:0 2px 2px 0 rgba(0,0,0,.14),0 1px 5px 0 rgba(0,0,0,.12),0 3px 1px -2px rgba(0,0,0,.2);
  }
  /* ===== start screen ===== */
  .startpage{padding:26px 20px 100px; text-align:center;}
  .startpage h1{font-size:24px; font-weight:700; margin:34px 0 0;}
  .startpage .goodluck{margin-top:34px; font-size:15px;}
  .startpage .disclaimer{margin:28px auto 0; max-width:820px; color:var(--mahogany); font-size:15px; line-height:1.5;}
  .examtable{
    margin:36px auto 0; border-top:1px solid var(--white-smoke); border-bottom:1px solid var(--white-smoke);
    padding:22px 0; max-width:760px; text-align:left; font-size:14px;
  }
  .examtable table{margin:0 auto; border-collapse:collapse;}
  .examtable td{padding:3px 0; vertical-align:top;}
  .examtable td:first-child{font-weight:700; padding-right:80px; white-space:nowrap;}
  .startbtn{margin-top:40px;}
  /* ===== exam screen ===== */
  .examcontainer{height:100%; display:flex; flex-direction:row;}
  .self-center{align-self:center;}
  .exampage{flex:1; min-width:0;}
  .content{padding:0 60px; display:flex; flex-direction:column;}
  .title{
    margin-top:10px; padding-bottom:10px; border-bottom:2px solid var(--shared-background-color);
    display:flex; flex-direction:row; align-items:center;
  }
  .titleText{font-weight:700; font-size:15px;}
  .flexspacer{flex:1;}
  .qcols{display:flex; flex-direction:row; gap:0;}
  .contentLeft{padding:20px 20px 0 0; display:flex; flex-direction:column; flex:1; min-width:0;}
  .contentRight{padding:20px 0 0 20px; flex:1; min-width:0;}
  .questionTitle{font-size:large; margin-bottom:10px; line-height:normal;}
  /* answers — official CUT styles */
  .answer{
    margin:5px 0 5px 0; padding:20px; border:1px solid #fff;
    display:flex; flex-direction:row; align-items:flex-start; cursor:pointer;
  }
  .answer span.atext{margin-top:5px; font-size:14px; line-height:1.4;}
  .answer.selected{
    border:1px solid var(--inactive-color);
    box-shadow:0 0 1px 0 rgba(0,0,0,.12),0 1px 2px 0 rgba(0,0,0,.12),0 2px 1px -2px rgba(0,0,0,.2);
  }
  /* paper-checkbox replica: 30px */
  .pcheck{
    display:inline-block; flex:0 0 30px; width:30px; height:30px; margin-right:16px; position:relative;
    border:2px solid var(--silver); border-radius:2px; background:#fff;
  }
  .answer.checked .pcheck{background:var(--mariner); border-color:var(--mariner);}
  .answer.checked .pcheck::after{
    content:''; position:absolute; left:9px; top:2px; width:8px; height:17px;
    border:solid white; border-width:0 3px 3px 0; transform:rotate(45deg);
  }
  /* review mode rings (official .correct / .incorrect) */
  .ring{
    display:inline-flex; align-items:center; padding:8px 0px 8px 8px; margin-right:8px; margin-left:-11px;
    border:3px solid transparent; border-radius:26px; max-height:52px;
  }
  .correct .ring{border-color:var(--test-accepted-color);}
  .incorrect .ring{border-color:var(--error-color);}
  .ring .pcheck{margin-right:8px;}
  /* header widgets */
  .hstack{display:flex; flex-direction:column; font-size:13px; line-height:1.5;}
  .hstack .row{display:flex; align-items:center; gap:6px;}
  .questionBookmarked{color:var(--marked-content-color);}
  .questionAnswered{color:var(--button-color);}
  .hstack svg{width:18px; height:18px; fill:currentColor;}
  /* cut-time-progress replica */
  .timewrap{margin-left:40px;}
  .cut-time{width:20vw; min-width:170px; height:40px; background:var(--white); position:relative; overflow:hidden;}
  .cut-time .fill{position:absolute; left:0; top:0; bottom:0; background:var(--inactive-color);}
  .cut-time .label{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:space-around;
    font-size:14px; z-index:1;
  }
  .cut-time .label.critical{color:var(--error-color);}
  /* ===== overview (Fragenübersicht) ===== */
  .ovwrap{padding:0 0 60px 60px;}
  .list-item{display:inline-table; margin:0 20px 0 0; width:calc(20% - 32px);}
  .list-item .flag{
    position:relative; width:36px; height:36px; top:40px; left:10px; z-index:1000;
    color:var(--marked-content-color); display:block;
  }
  .list-item .flag svg{width:36px; height:36px; fill:currentColor;}
  .list-item .flag.hiddenflag{visibility:hidden;}
  .ovbtn{width:100%; padding:15px; margin-bottom:6px;}
  .ovbtn .button-text{width:100%; text-align:center;}
  .ovbtn.answered{color:#fff;}
  .infoText{display:inline-block; width:100px; padding:2px 0;}
  .infoValue{font-weight:700;}
  /* ===== dialogs (paper-dialog replica) ===== */
  .backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:50;
    display:none; align-items:center; justify-content:center;
  }
  .backdrop.open{display:flex;}
  .pdialog{
    background:#fff; border-radius:2px; min-width:420px; max-width:620px; padding:24px;
    box-shadow:0 16px 24px 2px rgba(0,0,0,.14),0 6px 30px 5px rgba(0,0,0,.12),0 8px 10px -5px rgba(0,0,0,.4);
    font-size:15px; line-height:1.5;
  }
  .pdialog .dlgbuttons{display:flex; justify-content:flex-end; gap:10px; margin-top:24px;}
  /* ===== result ===== */
  .resultpage{padding:26px 20px 120px; text-align:center;}
  .resultpage h1{font-size:24px; font-weight:700; margin:34px 0 0;}
  .verdict{font-size:26px; font-weight:700; margin-top:8px;}
  .verdict.pass{color:var(--tropical-rain-forest);}
  .verdict.fail{color:var(--mahogany);}
  .reviewwrap{max-width:900px; margin:30px auto 0; text-align:left;}
  .reviewwrap h2{font-size:16px; border-bottom:2px solid var(--shared-background-color); padding-bottom:8px;}
  .rquestion{margin:26px 0 6px; font-size:15px; font-weight:700; line-height:1.4;}
  .rquestion .qnum{color:var(--mariner);}
  .reviewwrap .answer{cursor:default; padding:10px 14px;}
  .reviewwrap .answer .pcheck{transform:scale(.8); transform-origin:left center;}
  .rmarkedflag{color:var(--marked-content-color); font-size:13px;}
  @media (max-width:860px){
    .header,.footer{padding:0 14px;}
    .content{padding:0 14px;}
    .qcols{flex-direction:column;}
    .contentLeft,.contentRight{padding:14px 0 0 0;}
    .timewrap{margin-left:10px;}
    .list-item{width:calc(33% - 24px);}
    .pdialog{min-width:0; margin:0 12px;}
    .logininfo{right:12px;}
    .hstack{display:none;}
  }
</style>
</head>

{en:{q:"What is the maximum daily driving time between two consecutive daily rest periods?",a:["9 hours","10 hours","8 hours","12 hours"]},it:{q:"Qual è il tempo massimo di guida giornaliero tra due periodi di riposo giornaliero consecutivi?",a:["9 ore","10 ore","8 ore","12 ore"]}},
{en:{q:"What is the maximum driving time within one week?",a:["45 hours","56 hours","48 hours","53 hours"]},it:{q:"Qual è il tempo massimo di guida in una settimana?",a:["45 ore","56 ore","48 ore","53 ore"]}},
{en:{q:"May the daily and weekly maximum driving times be exceeded when doing overtime?",a:["No, they may never be exceeded, not even with overtime","Yes, by up to 2 hours per day","Yes, if the employer agrees","Yes, once per week"]},it:{q:"I tempi massimi di guida giornalieri e settimanali possono essere superati facendo straordinari?",a:["No, non possono mai essere superati, nemmeno con lo straordinario","Sì, fino a 2 ore al giorno","Sì, se il datore di lavoro è d'accordo","Sì, una volta a settimana"]}},
{en:{q:"Which activity always counts fully as driving time?",a:["Every period in which the vehicle is moving in traffic","Waiting at a taxi rank with the engine off","Cleaning the vehicle","Filling in the work book at home"]},it:{q:"Quale attività conta sempre interamente come tempo di guida?",a:["Ogni periodo in cui il veicolo è in movimento nel traffico","L'attesa a un posteggio taxi con il motore spento","La pulizia del veicolo","La compilazione del libretto di lavoro a casa"]}},
{en:{q:"A self-employed taxi driver has already driven 9 hours today. What may he still do today?",a:["No more driving under the ARV2 until after a daily rest","Drive 2 more hours if business is good","Drive 1 more hour with a customer's consent","Drive as long as he feels awake"]},it:{q:"Un tassista indipendente ha già guidato 9 ore oggi. Cosa può ancora fare oggi?",a:["Nessun'altra guida secondo l'OLR2 fino a dopo un riposo giornaliero","Guidare altre 2 ore se gli affari vanno bene","Guidare 1 ora in più con il consenso di un cliente","Guidare finché si sente sveglio"]}},
{en:{q:"The driving-time limits of the ARV2 exist mainly to...",a:["Ensure road safety by preventing driver fatigue","Increase company profits","Reduce fuel consumption","Limit the number of taxis in a city"]},it:{q:"I limiti del tempo di guida dell'OLR2 esistono principalmente per...",a:["Garantire la sicurezza stradale evitando la stanchezza del conducente","Aumentare i profitti dell'azienda","Ridurre il consumo di carburante","Limitare il numero di taxi in una città"]}},
{en:{q:"After how much continuous driving time must a break of at least 45 minutes be taken?",a:["After 4½ hours of driving","After 6 hours of driving","After 2 hours of driving","After 8 hours of driving"]},it:{q:"Dopo quanto tempo di guida continuativa deve essere effettuata una pausa di almeno 45 minuti?",a:["Dopo 4 ore e mezza di guida","Dopo 6 ore di guida","Dopo 2 ore di guida","Dopo 8 ore di guida"]}},
{en:{q:"If the break is placed BEFORE 4½ hours of driving elapse, what is sufficient?",a:["One break of 30 minutes, or two breaks of 20 minutes each","One break of 10 minutes","No break at all","One break of 60 minutes only"]},it:{q:"Se la pausa è collocata PRIMA che siano trascorse 4 ore e mezza di guida, cosa è sufficiente?",a:["Una pausa di 30 minuti, oppure due pause di 20 minuti ciascuna","Una pausa di 10 minuti","Nessuna pausa","Solo una pausa di 60 minuti"]}},
{en:{q:"What may the driver NOT do during a driving break?",a:["Drive a vehicle","Have a coffee","Rest in the car","Read a newspaper"]},it:{q:"Cosa NON può fare il conducente durante una pausa di guida?",a:["Guidare un veicolo","Bere un caffè","Riposare in auto","Leggere un giornale"]}},
{en:{q:"When is the 45-minute driving break not required after 4½ hours?",a:["If a daily or weekly rest begins immediately afterwards","If the driver is not tired","If there are still customers waiting","If it is raining"]},it:{q:"Quando la pausa di guida di 45 minuti non è richiesta dopo 4 ore e mezza?",a:["Se subito dopo inizia un riposo giornaliero o settimanale","Se il conducente non è stanco","Se ci sono ancora clienti in attesa","Se piove"]}},
{en:{q:"A driver takes his break as two separate parts before 4½ h of driving. Each part must be at least...",a:["20 minutes","10 minutes","5 minutes","45 minutes"]},it:{q:"Un conducente fraziona la pausa in due parti prima di 4 ore e mezza di guida. Ogni parte deve durare almeno...",a:["20 minuti","10 minuti","5 minuti","45 minuti"]}},
{en:{q:"The purpose of the driving break is primarily to...",a:["Counter fatigue and keep the driver alert","Allow time to clean the taxi","Let the meter reset","Give the employer time to check the vehicle"]},it:{q:"Lo scopo della pausa di guida è principalmente quello di...",a:["Contrastare la stanchezza e mantenere il conducente vigile","Dare tempo per pulire il taxi","Permettere il reset del tassametro","Dare tempo al datore di lavoro di controllare il veicolo"]}},
{en:{q:"What is the maximum weekly working time for an EMPLOYED driver in a taxi business?",a:["53 hours","45 hours","48 hours","60 hours"]},it:{q:"Qual è il tempo di lavoro settimanale massimo per un conducente DIPENDENTE in un'azienda di taxi?",a:["53 ore","45 ore","48 ore","60 ore"]}},
{en:{q:"Outside taxi businesses, the maximum weekly working time for an employed driver is...",a:["48 hours","53 hours","56 hours","40 hours"]},it:{q:"Al di fuori delle aziende di taxi, il tempo di lavoro settimanale massimo per un conducente dipendente è...",a:["48 ore","53 ore","56 ore","40 ore"]}},
{en:{q:"For a SELF-EMPLOYED driver, the working time is...",a:["Not limited by the ARV2 (but driving time, breaks and rest still apply)","Limited to 53 hours per week","Limited to 40 hours per week","Unlimited including driving time"]},it:{q:"Per un conducente INDIPENDENTE, il tempo di lavoro è...",a:["Non limitato dall'OLR2 (ma restano validi tempo di guida, pause e riposo)","Limitato a 53 ore a settimana","Limitato a 40 ore a settimana","Illimitato incluso il tempo di guida"]}},
{en:{q:"At the latest after how much working time must an employed driver take a work break?",a:["After 5½ hours of working time","After 8 hours of working time","After 4½ hours of working time","After 7 hours of working time"]},it:{q:"Al più tardi dopo quanto tempo di lavoro un conducente dipendente deve fare una pausa di lavoro?",a:["Dopo 5 ore e mezza di lavoro","Dopo 8 ore di lavoro","Dopo 4 ore e mezza di lavoro","Dopo 7 ore di lavoro"]}},
{en:{q:"For a daily working time of UP TO 7 hours, the minimum work break is...",a:["20 minutes","30 minutes","45 minutes","60 minutes"]},it:{q:"Per un tempo di lavoro giornaliero FINO A 7 ore, la pausa lavorativa minima è di...",a:["20 minuti","30 minuti","45 minuti","60 minuti"]}},
{en:{q:"For a daily working time of MORE THAN 9 hours, the work break must be...",a:["1 hour, or 2×30 minutes, or 3×20 minutes","Exactly 20 minutes","Only 30 minutes","No break is required"]},it:{q:"Per un tempo di lavoro giornaliero SUPERIORE a 9 ore, la pausa lavorativa deve essere di...",a:["1 ora, oppure 2×30 minuti, oppure 3×20 minuti","Esattamente 20 minuti","Solo 30 minuti","Nessuna pausa richiesta"]}},
{en:{q:"Regular overtime work is limited to how many hours per week?",a:["4 hours per week","10 hours per week","8 hours per week","2 hours per week"]},it:{q:"Il lavoro straordinario ordinario è limitato a quante ore a settimana?",a:["4 ore a settimana","10 ore a settimana","8 ore a settimana","2 ore a settimana"]}},
{en:{q:"Overtime work per calendar year may not exceed...",a:["208 hours","300 hours","150 hours","100 hours"]},it:{q:"Il lavoro straordinario per anno civile non può superare...",a:["208 ore","300 ore","150 ore","100 ore"]}},
{en:{q:"What is the regular minimum daily rest period?",a:["11 consecutive hours","9 consecutive hours","8 consecutive hours","12 consecutive hours"]},it:{q:"Qual è il riposo giornaliero minimo ordinario?",a:["11 ore consecutive","9 ore consecutive","8 ore consecutive","12 ore consecutive"]}},
{en:{q:"The daily rest may be reduced to 9 hours at most how many times per week?",a:["3 times per week","1 time per week","5 times per week","It may never be reduced"]},it:{q:"Il riposo giornaliero può essere ridotto a 9 ore al massimo quante volte a settimana?",a:["3 volte a settimana","1 volta a settimana","5 volte a settimana","Non può mai essere ridotto"]}},
{en:{q:"Does a reduced (9-hour) daily rest have to be compensated later?",a:["No, a reduced daily rest does not have to be compensated","Yes, always the next day","Yes, within the same week","Yes, doubled"]},it:{q:"Un riposo giornaliero ridotto (9 ore) deve essere recuperato in seguito?",a:["No, un riposo giornaliero ridotto non deve essere recuperato","Sì, sempre il giorno dopo","Sì, entro la stessa settimana","Sì, in misura doppia"]}},
{en:{q:"At any moment of professional activity, how much of the previous 24 hours must have been consecutive rest?",a:["11 hours","8 hours","6 hours","24 hours"]},it:{q:"In ogni momento dell'attività professionale, quanta parte delle 24 ore precedenti deve essere stata riposo consecutivo?",a:["11 ore","8 ore","6 ore","24 ore"]}},
{en:{q:"If the daily rest is split within 24 hours, how many parts are allowed and how long must one part be?",a:["Up to 3 parts, with one part of at least 8 hours","Up to 5 parts of 2 hours each","Only 2 parts of 4 hours each","Splitting is never allowed"]},it:{q:"Se il riposo giornaliero è frazionato nelle 24 ore, quante parti sono ammesse e quanto deve durare una parte?",a:["Fino a 3 parti, con una parte di almeno 8 ore","Fino a 5 parti di 2 ore ciascuna","Solo 2 parti di 4 ore ciascuna","Il frazionamento non è mai ammesso"]}},
{en:{q:"Rest time may be replaced by a payment (money) instead of actually being taken.",a:["False – rest may not be replaced by money (compensation ban)","True – if the driver agrees","True – for self-employed only","True – up to 4 hours per week"]},it:{q:"Il tempo di riposo può essere sostituito da un pagamento (denaro) invece di essere effettivamente goduto.",a:["Falso – il riposo non può essere sostituito con denaro (divieto di indennizzo)","Vero – se il conducente è d'accordo","Vero – solo per gli indipendenti","Vero – fino a 4 ore a settimana"]}},
{en:{q:"An EMPLOYED driver must have a weekly rest day of at least...",a:["24 consecutive hours","12 consecutive hours","48 consecutive hours","8 consecutive hours"]},it:{q:"Un conducente DIPENDENTE deve avere un giorno di riposo settimanale di almeno...",a:["24 ore consecutive","12 ore consecutive","48 ore consecutive","8 ore consecutive"]}},
{en:{q:"A SELF-EMPLOYED driver must, within two weeks, take how many rest days?",a:["Two rest days of at least 24 consecutive hours each","One rest day of 24 hours","Four rest days of 12 hours","No rest day is required"]},it:{q:"Un conducente INDIPENDENTE deve, nell'arco di due settimane, prendere quanti giorni di riposo?",a:["Due giorni di riposo di almeno 24 ore consecutive ciascuno","Un giorno di riposo di 24 ore","Quattro giorni di riposo di 12 ore","Nessun giorno di riposo richiesto"]}},
{en:{q:"Between two rest days of a self-employed driver, at most how many days of professional activity may lie?",a:["12 days","6 days","14 days","8 days"]},it:{q:"Tra due giorni di riposo di un conducente indipendente, quanti giorni di attività professionale al massimo possono trascorrere?",a:["12 giorni","6 giorni","14 giorni","8 giorni"]}},
{en:{q:"The rest day counts as taken on a Sunday/holiday if at least how many of the 24 hours fall on it?",a:["18 hours","12 hours","24 hours","6 hours"]},it:{q:"Il giorno di riposo è considerato goduto in una domenica/festivo se almeno quante delle 24 ore vi cadono?",a:["18 ore","12 ore","24 ore","6 ore"]}},
{en:{q:"Who is entitled to a free half-day per week in addition to the weekly rest day?",a:["An employee whose work is spread over more than 5 mornings and afternoons of the week","Every driver, always","Only self-employed drivers","Only drivers over 50 years old"]},it:{q:"Chi ha diritto a una mezza giornata libera a settimana oltre al giorno di riposo settimanale?",a:["Un dipendente il cui lavoro è distribuito su più di 5 mattine e pomeriggi della settimana","Ogni conducente, sempre","Solo i conducenti indipendenti","Solo i conducenti over 50"]}},
{en:{q:"The free half-day consists of 5 consecutive hours between which times?",a:["Between 07:00 and 18:00","Between 00:00 and 05:00","Between 18:00 and 23:00","Any 5 hours at night"]},it:{q:"La mezza giornata libera consiste in 5 ore consecutive tra quali orari?",a:["Tra le 07:00 e le 18:00","Tra le 00:00 e le 05:00","Tra le 18:00 e le 23:00","5 ore qualsiasi di notte"]}},
{en:{q:"For an EMPLOYED taxi driver, time spent waiting for customers while available for the employer counts as...",a:["Working time","Rest time","A driving break","Free time"]},it:{q:"Per un tassista DIPENDENTE, il tempo trascorso in attesa dei clienti restando a disposizione del datore di lavoro conta come...",a:["Tempo di lavoro","Tempo di riposo","Una pausa di guida","Tempo libero"]}},
{en:{q:"Standby time (Bereitschaftszeit) is best described as...",a:["Time when the driver is not driving but must remain available to work","Time spent sleeping at home","The weekly rest day","The 45-minute driving break"]},it:{q:"Il tempo di disponibilità (Bereitschaftszeit) è descritto meglio come...",a:["Tempo in cui il conducente non guida ma deve restare disponibile a lavorare","Tempo trascorso dormendo a casa","Il giorno di riposo settimanale","La pausa di guida di 45 minuti"]}},
{en:{q:"Why does waiting time matter for an employed driver's limits?",a:["Because it counts toward the maximum working time, not as rest","Because it counts as a driving break","Because it reduces the weekly rest day","Because it has no effect at all"]},it:{q:"Perché il tempo di attesa è rilevante per i limiti di un conducente dipendente?",a:["Perché conta ai fini del tempo di lavoro massimo, non come riposo","Perché conta come pausa di guida","Perché riduce il giorno di riposo settimanale","Perché non ha alcun effetto"]}},
{en:{q:"A self-employed driver records his times in a...",a:["Work book (Arbeitsbuch)","Company tax return","Customer receipt only","Vehicle service booklet"]},it:{q:"Un conducente indipendente registra i suoi tempi in un...",a:["Libretto di lavoro (Arbeitsbuch)","Dichiarazione fiscale aziendale","Solo scontrino cliente","Libretto di manutenzione del veicolo"]}},
{en:{q:"Before starting the trip, what must a self-employed driver enter in the work book?",a:["The consecutive rest before starting, the start time and the licence-plate number","The customer's name and destination","The fuel price of the day","Nothing until the end of the day"]},it:{q:"Prima di iniziare la corsa, cosa deve annotare un conducente indipendente nel libretto di lavoro?",a:["Il riposo consecutivo prima dell'inizio, l'ora di inizio e il numero di targa","Il nome del cliente e la destinazione","Il prezzo del carburante del giorno","Nulla fino a fine giornata"]}},
{en:{q:"At the end of the working day, what must the self-employed driver additionally record?",a:["The total driving time and the new odometer reading","The weather conditions","The number of passengers only","The colour of the vehicle"]},it:{q:"Alla fine della giornata lavorativa, cosa deve annotare in più il conducente indipendente?",a:["Il tempo di guida totale e il nuovo chilometraggio","Le condizioni meteo","Solo il numero di passeggeri","Il colore del veicolo"]}},
{en:{q:"What is the purpose of the driving/rest-time records?",a:["To allow the authorities to check compliance with the ARV2","To calculate the fare for the customer","To advertise the taxi company","To register the vehicle for the first time"]},it:{q:"Qual è lo scopo delle registrazioni dei tempi di guida/riposo?",a:["Permettere alle autorità di verificare il rispetto dell'OLR2","Calcolare la tariffa per il cliente","Pubblicizzare l'azienda di taxi","Immatricolare il veicolo per la prima volta"]}},
{en:{q:"A digital tachograph or equivalent recording is used mainly to...",a:["Record driving, work and rest periods reliably","Play music for passengers","Navigate to the destination","Calculate the tip"]},it:{q:"Un tachigrafo digitale o registrazione equivalente serve principalmente a...",a:["Registrare in modo affidabile i periodi di guida, lavoro e riposo","Riprodurre musica per i passeggeri","Navigare fino alla destinazione","Calcolare la mancia"]}},
{en:{q:"Records of working, driving and rest time must be...",a:["Kept and made available for control","Destroyed at the end of each shift","Shown to passengers","Sent to other taxi drivers"]},it:{q:"Le registrazioni di tempo di lavoro, guida e riposo devono essere...",a:["Conservate e messe a disposizione per il controllo","Distrutte alla fine di ogni turno","Mostrate ai passeggeri","Inviate ad altri tassisti"]}},
{en:{q:"A key duty of the employer under the ARV2 is to...",a:["Monitor that working, driving and rest-time rules are respected","Choose the driver's clothes","Set the fuel price","Drive the taxi personally"]},it:{q:"Un dovere fondamentale del datore di lavoro secondo l'OLR2 è...",a:["Vigilare sul rispetto delle norme su tempo di lavoro, guida e riposo","Scegliere l'abbigliamento del conducente","Fissare il prezzo del carburante","Guidare personalmente il taxi"]}},
{en:{q:"The employer's record (Aufstellung) of times must contain, among other things...",a:["Daily driving time, total daily/weekly working time and overtime","Only the driver's home address","Only the customers' phone numbers","Only the vehicle's colour"]},it:{q:"Il registro (Aufstellung) dei tempi tenuto dal datore di lavoro deve contenere, tra l'altro...",a:["Tempo di guida giornaliero, tempo di lavoro totale giornaliero/settimanale e straordinari","Solo l'indirizzo di casa del conducente","Solo i numeri di telefono dei clienti","Solo il colore del veicolo"]}},
{en:{q:"Who is generally responsible for controlling compliance on the road and in businesses?",a:["The competent cantonal enforcement authority","The passengers","The vehicle importer","The fuel station"]},it:{q:"Chi è generalmente responsabile del controllo del rispetto delle norme su strada e nelle aziende?",a:["L'autorità cantonale di esecuzione competente","I passeggeri","L'importatore del veicolo","La stazione di servizio"]}},
{en:{q:"What driving experience is normally required before obtaining the B121 (professional passenger transport)?",a:["At least 1 year of category B experience without licence withdrawal","At least 5 years of any driving","No previous experience is needed","A category C (truck) licence"]},it:{q:"Quale esperienza di guida è normalmente richiesta prima di ottenere il B121 (trasporto professionale di persone)?",a:["Almeno 1 anno di esperienza in categoria B senza revoca della licenza","Almeno 5 anni di guida qualsiasi","Nessuna esperienza precedente","Una licenza categoria C (camion)"]}},
{en:{q:"Before registering, the candidate normally must pass a...",a:["Medical examination by an approved physician","Physical fitness sports test","Language exam in three national languages","Mechanics apprenticeship"]},it:{q:"Prima di iscriversi, il candidato deve normalmente superare una...",a:["Visita medica presso un medico riconosciuto","Prova sportiva di forma fisica","Esame di lingua in tre lingue nazionali","Apprendistato da meccanico"]}},
{en:{q:"How often is the medical control examination repeated up to age 50?",a:["Every 5 years","Every year","Every 10 years","Only once"]},it:{q:"Ogni quanto viene ripetuta la visita medica di controllo fino ai 50 anni?",a:["Ogni 5 anni","Ogni anno","Ogni 10 anni","Solo una volta"]}},
{en:{q:"After age 50, how often must the medical control examination be repeated?",a:["Every 3 years","Every 5 years","Every year","Never again"]},it:{q:"Dopo i 50 anni, ogni quanto deve essere ripetuta la visita medica di controllo?",a:["Ogni 3 anni","Ogni 5 anni","Ogni anno","Mai più"]}},
{en:{q:"The B121 authorises professional passenger transport with vehicles up to how many seats in total?",a:["9 seats (8 passengers + driver)","16 seats","20 seats","5 seats"]},it:{q:"Il B121 autorizza il trasporto professionale di persone con veicoli fino a quanti posti in totale?",a:["9 posti (8 passeggeri + conducente)","16 posti","20 posti","5 posti"]}},
{en:{q:"In addition to passing the B121 steps, a driver may also need, depending on the canton...",a:["A separate cantonal operating permit (local knowledge, local rules, language)","A pilot's licence","A federal firearms permit","A university degree"]},it:{q:"Oltre a superare le tappe del B121, un conducente può inoltre necessitare, a seconda del cantone...",a:["Un'autorizzazione cantonale d'esercizio separata (conoscenze locali, regole locali, lingua)","Una licenza di pilota","Un permesso federale per armi da fuoco","Un titolo universitario"]}},
{en:{q:"While the driver is in or near the vehicle, how must the tachograph be handled during professional activity?",a:["It must be kept running continuously and operated so that driving time, other working time and breaks are recorded correctly","It only needs to run while a passenger is on board","It may be switched off during waiting times","It only needs to run at night"]},it:{q:"Mentre il conducente si trova nel veicolo o nelle sue vicinanze, come deve essere gestito il tachigrafo durante l'attività professionale?",a:["Deve essere tenuto costantemente in funzione e usato in modo che tempo di guida, altro tempo di lavoro e pause siano registrati correttamente","Deve funzionare solo quando un passeggero è a bordo","Può essere spento durante i tempi di attesa","Deve funzionare solo di notte"]}},
{en:{q:"Why must a self-employed taxi driver also operate the tachograph switch during professional activity?",a:["So that taxi trips and private trips can be distinguished on the record sheet","To save fuel","To switch the taximeter tariff","Because the switch starts the engine"]},it:{q:"Perché un tassista indipendente deve azionare anche il selettore del tachigrafo durante l'attività professionale?",a:["Affinché sul foglio di registrazione si possano distinguere le corse in taxi dalle corse private","Per risparmiare carburante","Per cambiare la tariffa del tassametro","Perché il selettore avvia il motore"]}},
{en:{q:"During PRIVATE trips with the vehicle, the tachograph must...",a:["Keep running, set to the pause/rest position (\"0\" / chair symbol)","Be switched off completely","Be removed from the vehicle","Record the trip as working time"]},it:{q:"Durante le corse PRIVATE con il veicolo, il tachigrafo deve...",a:["Restare in funzione, impostato sulla posizione di pausa/riposo (\"0\" / simbolo della sedia)","Essere completamente spento","Essere rimosso dal veicolo","Registrare la corsa come tempo di lavoro"]}},
{en:{q:"How many record sheets (Einlageblätter) may be used per vehicle and per day?",a:["Only one record sheet per vehicle per day, and each sheet may be used only once","As many as the driver wants","One sheet per trip","One sheet per week"]},it:{q:"Quanti fogli di registrazione (Einlageblätter) si possono usare per veicolo e per giorno?",a:["Un solo foglio di registrazione per veicolo al giorno, e ogni foglio può essere usato una sola volta","Quanti ne vuole il conducente","Un foglio per corsa","Un foglio a settimana"]}},
{en:{q:"Which record sheets must be carried on the vehicle?",a:["Enough blank sheets matching the tachograph and, if the previous day was a working day, the completed sheet of that day (or a copy)","Only the sheets of the past year","No sheets need to be carried","Only photocopies of old sheets"]},it:{q:"Quali fogli di registrazione devono essere presenti sul veicolo?",a:["Un numero sufficiente di fogli vergini adatti al tachigrafo e, se il giorno precedente era lavorativo, il foglio compilato di quel giorno (o una copia)","Solo i fogli dell'anno passato","Non è necessario avere fogli a bordo","Solo fotocopie di vecchi fogli"]}},
{en:{q:"At a roadside check with a digital tachograph, the driver must be able to present...",a:["The driver card and the records of the current day and the previous 28 days","Only today's record","Nothing – records stay at the office","Only the vehicle registration document"]},it:{q:"A un controllo stradale con tachigrafo digitale, il conducente deve poter presentare...",a:["La carta del conducente e le registrazioni del giorno corrente e dei 28 giorni precedenti","Solo la registrazione di oggi","Nulla – le registrazioni restano in ufficio","Solo la licenza di circolazione"]}},
{en:{q:"What must the driver do if the vehicle's tachograph is defective?",a:["Fill in the daily sheets of the work book until the tachograph is repaired","Stop working permanently","Nothing, records are optional","Estimate the times at the end of the month"]},it:{q:"Cosa deve fare il conducente se il tachigrafo del veicolo è difettoso?",a:["Compilare i fogli giornalieri del libretto di lavoro finché il tachigrafo non viene riparato","Smettere di lavorare definitivamente","Nulla, le registrazioni sono facoltative","Stimare i tempi a fine mese"]}},
{en:{q:"What are the driver's duties regarding the work book during trips?",a:["Carry it along, present it to the enforcement authority on request and fill it in legibly and indelibly","Keep it at home in a safe place","Give it to the customer to sign","Fill it in only at the end of the month"]},it:{q:"Quali sono i doveri del conducente riguardo al libretto di lavoro durante le corse?",a:["Portarlo con sé, presentarlo all'autorità di esecuzione su richiesta e compilarlo in modo leggibile e indelebile","Tenerlo a casa in un luogo sicuro","Farlo firmare al cliente","Compilarlo solo a fine mese"]}},
{en:{q:"A driver works for two different taxi companies. How many work books may he use at the same time?",a:["Only one work book – it is personal and not transferable","One per employer","Two, one as a backup","As many as he likes"]},it:{q:"Un conducente lavora per due aziende di taxi diverse. Quanti libretti di lavoro può usare contemporaneamente?",a:["Un solo libretto di lavoro – è personale e non trasferibile","Uno per ogni datore di lavoro","Due, uno di riserva","Quanti ne vuole"]}},
{en:{q:"In addition to the weekly sheet, when must the driver also fill in the daily sheets of the work book?",a:["When the tachograph is not working or the vehicle has already been driven by two drivers that day","Every day without exception","Only on Sundays","Never – daily sheets are optional"]},it:{q:"Oltre al foglio settimanale, quando il conducente deve compilare anche i fogli giornalieri del libretto di lavoro?",a:["Quando il tachigrafo non funziona o il veicolo è già stato guidato da due conducenti quel giorno","Ogni giorno senza eccezioni","Solo la domenica","Mai – i fogli giornalieri sono facoltativi"]}},

{en:{q:"How long is a driver card for the digital tachograph valid?",a:["5 years","1 year","10 years","Unlimited"]},it:{q:"Quanto è valida la carta del conducente per il tachigrafo digitale?",a:["5 anni","1 anno","10 anni","Illimitata"]}},
{en:{q:"In an emergency (force majeure, giving assistance), the driver may deviate from the working, driving and rest time rules...",a:["As far as the emergency actually requires and road safety allows","Without any limit","Never, under no circumstances","Only with written permission from the canton"]},it:{q:"In caso di emergenza (forza maggiore, prestazione di soccorso), il conducente può derogare alle norme su tempo di lavoro, guida e riposo...",a:["Nella misura in cui l'emergenza lo richiede effettivamente e la sicurezza stradale lo consente","Senza alcun limite","Mai, in nessun caso","Solo con permesso scritto del cantone"]}},
{en:{q:"After deviating from the rules in an emergency, the driver must...",a:["Note the reason and extent in the work book / register and compensate the deviation at the latest by the end of the following week","Do nothing","Inform the police within one hour","Pay a fee"]},it:{q:"Dopo aver derogato alle norme in un'emergenza, il conducente deve...",a:["Annotare motivo ed entità nel libretto di lavoro / registro e compensare la deroga al più tardi entro la fine della settimana successiva","Non fare nulla","Informare la polizia entro un'ora","Pagare una tassa"]}},
{en:{q:"Regarding scheduling, the employer must...",a:["Organise the driver's work so that the working, driving and rest time rules can be respected","Maximise driving hours regardless of the rules","Leave planning entirely to the customers","Only plan the vehicle maintenance"]},it:{q:"Per quanto riguarda la pianificazione, il datore di lavoro deve...",a:["Organizzare il lavoro del conducente in modo che le norme su tempo di lavoro, guida e riposo possano essere rispettate","Massimizzare le ore di guida indipendentemente dalle norme","Lasciare la pianificazione interamente ai clienti","Pianificare solo la manutenzione del veicolo"]}},
{en:{q:"Since 1 January 2024, what is required to offer taxi services in the Canton of Zurich?",a:["A cantonal taxi driver's permit (Taxiausweis) and a cantonal taxi vehicle permit","Only a city licence plate","Only membership in a taxi association","No permit at all"]},it:{q:"Dal 1° gennaio 2024, cosa è richiesto per offrire servizi taxi nel Canton Zurigo?",a:["Una licenza cantonale di tassista (Taxiausweis) e un'autorizzazione cantonale per il veicolo taxi","Solo una targa cittadina","Solo l'adesione a un'associazione di taxi","Nessuna autorizzazione"]}},
{en:{q:"When may taxi trips be carried out in the Canton of Zurich?",a:["Only once both the taxi vehicle permit and the taxi driver's permit have been issued","As soon as the vehicle has a taximeter","Immediately after passing the B121 theory exam","As soon as the application has been submitted"]},it:{q:"Quando si possono effettuare corse in taxi nel Canton Zurigo?",a:["Solo quando sono state rilasciate sia l'autorizzazione per il veicolo taxi sia la licenza di tassista","Non appena il veicolo ha un tassametro","Subito dopo aver superato l'esame di teoria B121","Non appena la domanda è stata presentata"]}},
{en:{q:"Which authority issues the taxi driver's permit and the taxi vehicle permit in the Canton of Zurich?",a:["The cantonal Office for Mobility (Amt für Mobilität)","The city police of Zurich","The federal customs office","The taxi drivers' union"]},it:{q:"Quale autorità rilascia la licenza di tassista e l'autorizzazione per il veicolo taxi nel Canton Zurigo?",a:["L'Ufficio cantonale della mobilità (Amt für Mobilität)","La polizia municipale di Zurigo","L'ufficio doganale federale","Il sindacato dei tassisti"]}},

{en:{q:"What happened to the local knowledge exam (Ortskundeprüfung) under the Zurich cantonal taxi law?",a:["It was abolished; instead the driver's record/reputation is checked","It became mandatory for all of Switzerland","It must be repeated every year","It replaced the ARV2 theory exam"]},it:{q:"Cosa è successo all'esame di conoscenza locale (Ortskundeprüfung) con la legge cantonale zurighese sui taxi?",a:["È stato abolito; al suo posto viene verificata la buona reputazione del conducente","È diventato obbligatorio per tutta la Svizzera","Deve essere ripetuto ogni anno","Ha sostituito l'esame di teoria OLR2"]}},
{en:{q:"Which reputation requirement applies to taxi drivers in the Canton of Zurich?",a:["In the past 5 years they must not have been repeatedly convicted of offences connected with practising the taxi trade","They must never have had a parking fine","They must present a university certificate","There is no reputation requirement"]},it:{q:"Quale requisito di buona reputazione si applica ai tassisti nel Canton Zurigo?",a:["Negli ultimi 5 anni non devono essere stati ripetutamente condannati per infrazioni legate all'esercizio della professione di tassista","Non devono mai aver avuto una multa per parcheggio","Devono presentare un certificato universitario","Non esiste alcun requisito di reputazione"]}},
{en:{q:"How is the official ARV2 additional theory exam (B121) structured at the road traffic office?",a:["30 multiple-choice questions on the computer in 45 minutes, with a maximum of 3 errors allowed","100 questions in 2 hours, no errors allowed","10 oral questions","A written essay about traffic rules"]},it:{q:"Come è strutturato l'esame di teoria supplementare ufficiale OLR2 (B121) presso l'ufficio della circolazione?",a:["30 domande a scelta multipla al computer in 45 minuti, con al massimo 3 errori ammessi","100 domande in 2 ore, nessun errore ammesso","10 domande orali","Un tema scritto sulle norme di circolazione"]}},
{en:{q:"In which languages can the official ARV2 theory exam be taken?",a:["German, French or Italian","Only German","Any language with an interpreter","Only English"]},it:{q:"In quali lingue si può sostenere l'esame di teoria ufficiale OLR2?",a:["Tedesco, francese o italiano","Solo tedesco","Qualsiasi lingua con un interprete","Solo inglese"]}},
{en:{q:"After the cantonal reform, what does the City of Zurich itself still regulate?",a:["Public taxi stands (allocation of stand permits) and any release of bus lanes","The ARV2 theory exam","Medical examinations","The price of fuel"]},it:{q:"Dopo la riforma cantonale, cosa continua a regolare la Città di Zurigo?",a:["I posteggi pubblici per taxi (assegnazione dei permessi di posteggio) e l'eventuale apertura delle corsie dei bus","L'esame di teoria OLR2","Le visite mediche","Il prezzo del carburante"]}}
];

/* ================= CONSTANTS (official exam format) ================= */
const EXAM_N = 30;          // questions per exam
const EXAM_MIN = 45;        // minutes
const MAX_MISTAKES = 3;     // max errors allowed
const CRITICAL_S = 5*60;    // timer turns red

/* ================= STATE ================= */
let lang = localStorage.getItem('b121lang2') || null;
let view = lang ? 'start' : 'lang';   // lang | start | exam | overview | result
let exam = null;  // {qs:[{p (pool idx), perm:[..]}], answers:[origIdx|null], marked:[bool], cur, endTime, timerId, finishedIn}
const $ = id=>document.getElementById(id);
const esc = s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function shuffled(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const T = ()=>UI[lang||'en'];

/* ================= VIEWS ================= */
function loginInfoBlock(){
  const t=T();
  return `<table class="logininfo"><tr><td>${t.loggedIn}</td><td>Demo</td></tr>
  <tr><td>${t.category}</td><td>B121</td></tr>
  <tr><td>${t.device}</td><td>Web</td></tr></table>`;
}

function renderLang(){
  $('app').innerHTML = `
    <div class="header"></div>
    ${lang?loginInfoBlock():`<table class="logininfo"><tr><td>Logged in:</td><td>Demo</td></tr><tr><td>Category:</td><td>B121</td></tr><tr><td>Device:</td><td>Web</td></tr></table>`}
    <div class="langpage">
      <div style="margin-top:40px; text-align:center; font-size:13px; line-height:1.5;">
        Select a language<br>Seleziona una lingua
      </div>
      <div class="langcards">
        <button class="langcard" onclick="pickLang('en')">English</button>
        <button class="langcard" onclick="pickLang('it')">Italiano</button>
      </div>
    </div>`;
}
function pickLang(l){ lang=l; localStorage.setItem('b121lang2',l); view='start'; render(); }

function renderStart(){
  const t=T();
  $('app').innerHTML = `
    <div class="header"></div>
    ${loginInfoBlock()}
    <div class="startpage">
      <h1>${t.startTitle}</h1>
      <div class="goodluck">${t.goodLuck}</div>
      <div class="disclaimer">${t.disclaimer}</div>
      <div class="examtable">
        <table>
          <tr><td>${t.yourExam}</td><td>${t.catValue}<br>${t.oneAnswer}</td></tr>
          <tr><td>${t.numQuestions}</td><td>${EXAM_N}</td></tr>
          <tr><td>${t.maxScore}</td><td>${EXAM_N}</td></tr>
          <tr><td>${t.maxMistakes}</td><td>${MAX_MISTAKES}</td></tr>
          <tr><td>${t.time}</td><td>${t.minutes}</td></tr>
        </table>
      </div>
      <button class="pbtn invert startbtn" onclick="startExam()">${t.startExam}</button>
    </div>
    <div class="footer justified">
      <span></span>
      <button class="pbtn" onclick="view='lang';render()">${IC.lang} ${lang==='en'?'English':'Italiano'}</button>
    </div>`;
}

function startExam(){
  const picks = shuffled(POOL.map((_,i)=>i)).slice(0,EXAM_N);
  exam = {
    qs: picks.map(p=>({p, perm: shuffled([0,1,2,3])})),
    answers: Array(EXAM_N).fill(null),
    marked: Array(EXAM_N).fill(false),
    cur: 0,
    total: EXAM_MIN*60,
    left: EXAM_MIN*60,
    timerId: null
  };
  exam.timerId = setInterval(tick, 1000);
  view='exam'; render();
}

function tick(){
  if(!exam) return;
  exam.left--;
  if(exam.left<=0){
    clearInterval(exam.timerId);
    exam.left=0;
    showDialog(`<p>${T().timeUp}</p>`, [[T().ok, ()=>{closeDialog(); finish();}, true]]);
    return;
  }
  const el=$('timelabel'), fill=$('timefill');
  if(el){ el.innerHTML = timeHTML(); el.classList.toggle('critical', exam.left<=CRITICAL_S); }
  if(fill){ fill.style.width = (exam.left/exam.total*100)+'%'; }
}
function timeHTML(){
  const m=Math.floor(exam.left/60), s=exam.left%60;
  return `${T().remaining}&nbsp;<b>${m}:${String(s).padStart(2,'0')}</b>`;
}

function renderExam(){
  const t=T(), e=exam, qq=e.qs[e.cur], q=POOL[qq.p][lang];
  const answeredCount = e.answers.filter(a=>a!==null).length;
  const markedCount = e.marked.filter(Boolean).length;
  $('app').innerHTML = `
    <div class="header justified">
      <div>
        <button class="pbtn" onclick="view='overview';render()">${IC.menu} <span>${t.overview}</span></button>
      </div>
      <div style="display:flex; align-items:center;">
        <div class="hstack">
          <div class="row questionBookmarked">${IC.bookmark}<span>${t.marked(markedCount)}</span></div>
          <div class="row questionAnswered">${IC.check}<span>${answeredCount} / ${EXAM_N}</span></div>
        </div>
        <div class="timewrap">
          <div class="cut-time">
            <div class="fill" id="timefill" style="width:${e.left/e.total*100}%"></div>
            <div class="label ${e.left<=CRITICAL_S?'critical':''}" id="timelabel">${timeHTML()}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="scrollpanel">
      <div class="examcontainer">
        <div class="self-center">
          <button class="navbtn back" onclick="nav(-1)" ${e.cur===0?'disabled':''}>${IC.chevL}</button>
        </div>
        <div class="exampage">
          <div class="content">
            <div class="title">
              <span class="titleText">${t.question} ${e.cur+1} ${t.of} ${EXAM_N}</span>
              <div class="flexspacer"></div>
              <button class="pbtn bookmarkbtn" onclick="toggleMark()">
                ${IC.bookmark} <span>${e.marked[e.cur]?t.removeBookmark:t.bookmark}</span>
              </button>
            </div>
            <div class="qcols">
              <div class="contentLeft">
                <span class="questionTitle">${esc(q.q)}</span>
              </div>
              <div class="contentRight">
                ${qq.perm.map(orig=>{
                  const sel = e.answers[e.cur]===orig;
                  return `<div class="answer ${sel?'selected checked':''}" onclick="choose(${orig})">
                    <span class="pcheck"></span>
                    <span class="atext">${esc(q.a[orig])}</span>
                  </div>`;
                }).join('')}
              </div>
            </div>
          </div>
        </div>
        <div class="self-center">
          <button class="navbtn forward" onclick="nav(1)" ${e.cur===EXAM_N-1?'disabled':''}>${IC.chevR}</button>
        </div>
      </div>
    </div>

    <div class="footer justified">
      <button class="pbtn" onclick="showHelp()">${IC.help} ${t.help}</button>
      <button class="pbtn" onclick="askFinish()">${IC.check} ${t.closeExam}</button>
      <button class="pbtn" onclick="switchLangInline()">${IC.lang} ${lang==='en'?'English':'Italiano'}</button>
    </div>
    <div class="backdrop" id="dlgback"><div class="pdialog" id="dlg"></div></div>`;
}

function choose(orig){
  exam.answers[exam.cur] = exam.answers[exam.cur]===orig ? null : orig;
  render();
}
function nav(d){
  exam.cur=Math.min(EXAM_N-1,Math.max(0,exam.cur+d));
  render();
}
function toggleMark(){ exam.marked[exam.cur]=!exam.marked[exam.cur]; render(); }
function switchLangInline(){ lang = lang==='en'?'it':'en'; localStorage.setItem('b121lang2',lang); render(); }

function renderOverview(){
  const t=T(), e=exam;
  const answeredCount=e.answers.filter(a=>a!==null).length;
  const markedCount=e.marked.filter(Boolean).length;
  $('app').innerHTML = `
    <div class="header justified">
      <div>
        <button class="pbtn" onclick="view='exam';render()">${IC.menu} <span>${t.closeOverview}</span></button>
      </div>
      <div class="hstack">
        <div class="row questionBookmarked">${IC.bookmark}<span>${t.marked(markedCount)}</span></div>
        <div class="row questionAnswered">${IC.check}<span>${t.answered(answeredCount)}</span></div>
      </div>
    </div>
    <div class="scrollpanel">
      <div class="ovwrap">
        ${e.qs.map((_,i)=>`
          <div class="list-item">
            <span class="flag ${e.marked[i]?'':'hiddenflag'}">${IC.flag}</span>
            <button class="pbtn ovbtn ${e.answers[i]!==null?'invert answered':''}" onclick="exam.cur=${i};view='exam';render()">
              <span class="button-text">${i+1}</span>
            </button>
          </div>`).join('')}
      </div>
    </div>
    <div class="footer justified">
      <button class="pbtn" onclick="showHelp()">${IC.help} ${t.help}</button>
      <button class="pbtn" onclick="askFinish()">${IC.check} ${t.closeExam}</button>
      <span></span>
    </div>
    <div class="backdrop" id="dlgback"><div class="pdialog" id="dlg"></div></div>`;
}

/* ===== dialogs ===== */
function showDialog(html, buttons){
  const back=$('dlgback');
  if(!back) return;
  $('dlg').innerHTML = html + `<div class="dlgbuttons">${buttons.map((b,i)=>
    `<button class="pbtn ${b[2]?'invert':''}" id="dlgbtn${i}">${esc(b[0])}</button>`).join('')}</div>`;
  buttons.forEach((b,i)=>{ $('dlgbtn'+i).onclick=b[1]; });
  back.classList.add('open');
}
function closeDialog(){ const b=$('dlgback'); if(b) b.classList.remove('open'); }
function showHelp(){
  const t=T();
  showDialog(t.helpTexts.map(h=>`<p><b>${esc(h[0])}</b><br>${esc(h[1])}</p>`).join(''), [[t.ok, closeDialog, true]]);
}
function askFinish(){
  const t=T();
  const missing = exam.answers.some(a=>a===null);
  showDialog(`<p>${missing?t.confirmMissing:t.confirmAll}</p>`,
    [[t.doNotClose, closeDialog, false],[t.closeNow, ()=>{closeDialog();finish();}, true]]);
}

function finish(){
  clearInterval(exam.timerId);
  exam.usedS = exam.total - exam.left;
  view='result'; render();
  window.scrollTo(0,0);
}

function renderResult(){
  const t=T(), e=exam;
  const correct=e.answers.filter(a=>a===0).length;
  const mistakes=EXAM_N-correct;
  const pass=mistakes<=MAX_MISTAKES;
  const mm=Math.floor(e.usedS/60), ss=e.usedS%60;
  $('app').innerHTML = `
    <div class="header"></div>
    ${loginInfoBlock()}
    <div class="scrollpanel scrollpanel-noheader" style="top:80px;">
    <div class="resultpage">
      <h1>${t.examResult}</h1>
      <div class="verdict ${pass?'pass':'fail'}">${pass?t.passed:t.failed}</div>
      <div class="examtable">
        <table>
          <tr><td>${t.score}</td><td>${correct} / ${EXAM_N}</td></tr>
          <tr><td>${t.mistakes}</td><td>${mistakes} (max. ${MAX_MISTAKES})</td></tr>
          <tr><td>${t.time}</td><td>${mm}:${String(ss).padStart(2,'0')}</td></tr>
        </table>
      </div>
      <button class="pbtn invert" style="margin-top:26px;" onclick="startExam()">${t.newExam}</button>

      <div class="reviewwrap">
        <h2>${t.review}</h2>
        ${e.qs.map((qq,i)=>{
          const q=POOL[qq.p][lang], user=e.answers[i];
          return `<div>
            <div class="rquestion"><span class="qnum">${i+1}.</span> ${esc(q.q)} ${e.marked[i]?`<span class="rmarkedflag">⚑</span>`:''} ${user===null?`<span style="color:var(--error-color); font-weight:400; font-size:13px;">— ${t.notAnswered}</span>`:''}</div>
            ${qq.perm.map(orig=>{
              const isC=orig===0, isU=user===orig;
              let cls='answer'; if(isU) cls+=' checked selected';
              let ring=''; if(isC) ring='correct'; else if(isU) ring='incorrect';
              return `<div class="${cls}" style="cursor:default">
                <span class="${ring}"><span class="ring"><span class="pcheck"></span></span></span>
                <span class="atext">${esc(q.a[orig])}</span>
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>
    </div>
    </div>
    <div class="footer justified">
      <span></span>
      <button class="pbtn" onclick="switchLangInline()">${IC.lang} ${lang==='en'?'English':'Italiano'}</button>
    </div>`;
}

/* ================= RENDER ROOT ================= */
function render(){
  if(view==='lang') renderLang();
  else if(view==='start') renderStart();
  else if(view==='exam') renderExam();
  else if(view==='overview') renderOverview();
  else if(view==='result') renderResult();
}
render();
</script>
</body>
</html>
