<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUT-Exam · B121 / BPT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ===== Official CUT design tokens (asa Computer-Unterstützte Theorieprüfung) ===== */
  :root{
    --white:#ffffff;
    --night-rider:#303030;      /* texts */
    --dark-grey:#ababab;        /* lines, strokes */
    --silver:#c6c6c6;           /* inactive states */
    --white-smoke:#f1f1f1;      /* backgrounds */
    --mariner:#355da6;          /* buttons / primary */
    --mariner-light:#afbedb;
    --mahogany:#d73b40;         /* failed, errors */
    --medium-orchid:#af61c6;    /* marked content */
    --deep-lilac:#9849af;
    --jungle-green:#289b7c;     /* passed, accepted */
    --tropical-rain-forest:#027d5c;

    --primary-text-color:var(--night-rider);
    --line-color:var(--dark-grey);
    --inactive-color:var(--silver);
    --shared-background-color:var(--white-smoke);
    --button-color:var(--mariner);
    --error-color:var(--mahogany);
    --marked-content-color:var(--medium-orchid);
    --test-accepted-color:var(--jungle-green);
  }
  *{box-sizing:border-box;}
  html{height:100%;}
  body{
    width:100vw; margin:0;
    -webkit-tap-highlight-color:transparent;
    user-select:none; cursor:default;
    background-color:white; color:var(--primary-text-color);
    font-family:'Roboto Condensed','Roboto',sans-serif;
    font-style:normal; font-weight:400;
    overflow-x:hidden;
  }
  .header{
    height:80px; padding:0 60px; background-color:var(--white-smoke);
    display:flex; flex-direction:row; align-items:center;
  }
  .footer{
    position:fixed; bottom:0; left:0; right:0; height:80px; padding:0 60px;
    background-color:var(--white-smoke);
    display:flex; flex-direction:row; align-items:center;
  }
  .justified{justify-content:space-between;}
  .scrollpanel{
    overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch;
    position:absolute; top:80px; bottom:80px; left:0; right:0;
  }
  .scrollpanel-noheader{top:0;}
  /* paper-button replica */
  .pbtn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    font-family:inherit; font-size:14px; font-weight:500; letter-spacing:.2px;
    color:var(--mariner); background:#fff; border:none; border-radius:5px;
    padding:10px 16px; min-width:64px; cursor:pointer; text-transform:none;
    box-shadow:0 2px 2px 0 rgba(0,0,0,.14),0 1px 5px 0 rgba(0,0,0,.12),0 3px 1px -2px rgba(0,0,0,.2);
    transition:box-shadow .15s;
  }
  .pbtn:active{box-shadow:0 4px 5px 0 rgba(0,0,0,.14),0 1px 10px 0 rgba(0,0,0,.12),0 2px 4px -1px rgba(0,0,0,.3);}
  .pbtn.invert{background:var(--mariner); color:white;}
  .pbtn.flat{box-shadow:none; background:transparent;}
  .pbtn.bookmarkbtn{color:var(--marked-content-color);}
  .pbtn svg{width:20px; height:20px; fill:currentColor; flex:0 0 auto;}
  /* icon button (navigation chevrons) */
  .navbtn{
    border:none; cursor:pointer; color:white; background-color:var(--button-color);
    width:50px; height:50px; padding:8px;
  }
  .navbtn svg{width:100%; height:100%; fill:white;}
  .navbtn.back{border-radius:0 5px 5px 0;}
  .navbtn.forward{border-radius:5px 0 0 5px;}
  .navbtn:disabled{background-color:var(--silver); cursor:default;}
  /* login-info block (top right on start screens) */
  .logininfo{
    position:absolute; top:8px; right:44px; font-size:13px; line-height:1.3;
  }
  .logininfo td{padding:1px 0;}
  .logininfo td:first-child{padding-right:24px;}
  .logininfo td:last-child{font-weight:700;}
  /* ===== language selection ===== */
  .langpage{position:absolute; top:60px; left:0; right:0; display:flex; flex-direction:column; align-items:center;}
  .langcards{margin-top:75px; display:flex; gap:14px; flex-wrap:wrap; justify-content:center; max-width:400px;}
  .langcard{
    width:170px; padding:22px 0; text-align:center; background:#fff; border:none; cursor:pointer;
    color:var(--mariner); font-family:inherit; font-size:14px; font-weight:500; border-radius:2px;
    box-shadow:0 2px 2px 0 rgba(0,0,0,.14),0 1px 5px 0 rgba(0,0,0,.12),0 3px 1px -2px rgba(0,0,0,.2);
  }
  /* ===== start screen ===== */
  .startpage{padding:26px 20px 100px; text-align:center;}
  .startpage h1{font-size:24px; font-weight:700; margin:34px 0 0;}
  .startpage .goodluck{margin-top:34px; font-size:15px;}
  .startpage .disclaimer{margin:28px auto 0; max-width:820px; color:var(--mahogany); font-size:15px; line-height:1.5;}
  .examtable{
    margin:36px auto 0; border-top:1px solid var(--white-smoke); border-bottom:1px solid var(--white-smoke);
    padding:22px 0; max-width:760px; text-align:left; font-size:14px;
  }
  .examtable table{margin:0 auto; border-collapse:collapse;}
  .examtable td{padding:3px 0; vertical-align:top;}
  .examtable td:first-child{font-weight:700; padding-right:80px; white-space:nowrap;}
  .startbtn{margin-top:40px;}
  /* ===== exam screen ===== */
  .examcontainer{height:100%; display:flex; flex-direction:row;}
  .self-center{align-self:center;}
  .exampage{flex:1; min-width:0;}
  .content{padding:0 60px; display:flex; flex-direction:column;}
  .title{
    margin-top:10px; padding-bottom:10px; border-bottom:2px solid var(--shared-background-color);
    display:flex; flex-direction:row; align-items:center;
  }
  .titleText{font-weight:700; font-size:15px;}
  .flexspacer{flex:1;}
  .qcols{display:flex; flex-direction:row; gap:0;}
  .contentLeft{padding:20px 20px 0 0; display:flex; flex-direction:column; flex:1; min-width:0;}
  .contentRight{padding:20px 0 0 20px; flex:1; min-width:0;}
  .questionTitle{font-size:large; margin-bottom:10px; line-height:normal;}
  /* answers — official CUT styles */
  .answer{
    margin:5px 0 5px 0; padding:20px; border:1px solid #fff;
    display:flex; flex-direction:row; align-items:flex-start; cursor:pointer;
  }
  .answer span.atext{margin-top:5px; font-size:14px; line-height:1.4;}
  .answer.selected{
    border:1px solid var(--inactive-color);
    box-shadow:0 0 1px 0 rgba(0,0,0,.12),0 1px 2px 0 rgba(0,0,0,.12),0 2px 1px -2px rgba(0,0,0,.2);
  }
  /* paper-checkbox replica: 30px */
  .pcheck{
    display:inline-block; flex:0 0 30px; width:30px; height:30px; margin-right:16px; position:relative;
    border:2px solid var(--silver); border-radius:2px; background:#fff;
  }
  .answer.checked .pcheck{background:var(--mariner); border-color:var(--mariner);}
  .answer.checked .pcheck::after{
    content:''; position:absolute; left:9px; top:2px; width:8px; height:17px;
    border:solid white; border-width:0 3px 3px 0; transform:rotate(45deg);
  }
  /* review mode rings (official .correct / .incorrect) */
  .ring{
    display:inline-flex; align-items:center; padding:8px 0px 8px 8px; margin-right:8px; margin-left:-11px;
    border:3px solid transparent; border-radius:26px; max-height:52px;
  }
  .correct .ring{border-color:var(--test-accepted-color);}
  .incorrect .ring{border-color:var(--error-color);}
  @keyframes ringPop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.18);opacity:1}100%{transform:scale(1);opacity:1}}
  .ring.anim{animation:ringPop .45s cubic-bezier(.2,.8,.3,1.25);}
  @keyframes flashGood{0%{background:rgba(40,155,124,.28)}100%{background:transparent}}
  @keyframes flashBad{0%{background:rgba(215,59,64,.26)}40%{transform:translateX(-4px)}60%{transform:translateX(4px)}100%{background:transparent;transform:translateX(0)}}
  .answer.flashgood{animation:flashGood .9s ease-out;}
  .answer.flashbad{animation:flashBad .6s ease-out;}
  .ring .pcheck{margin-right:8px;}
  /* header widgets */
  .hstack{display:flex; flex-direction:column; font-size:13px; line-height:1.5;}
  .hstack .row{display:flex; align-items:center; gap:6px;}
  .questionBookmarked{color:var(--marked-content-color);}
  .questionAnswered{color:var(--button-color);}
  .hstack svg{width:18px; height:18px; fill:currentColor;}
  /* cut-time-progress replica */
  .timewrap{margin-left:40px;}
  .cut-time{width:20vw; min-width:170px; height:40px; background:var(--white); position:relative; overflow:hidden;}
  .cut-time .fill{position:absolute; left:0; top:0; bottom:0; background:var(--inactive-color);}
  .cut-time .label{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:space-around;
    font-size:14px; z-index:1;
  }
  .cut-time .label.critical{color:var(--error-color);}
  /* ===== overview (Fragenübersicht) ===== */
  .ovwrap{padding:0 0 60px 60px;}
  .list-item{display:inline-table; margin:0 20px 0 0; width:calc(20% - 32px);}
  .list-item .flag{
    position:relative; width:36px; height:36px; top:40px; left:10px; z-index:1000;
    color:var(--marked-content-color); display:block;
  }
  .list-item .flag svg{width:36px; height:36px; fill:currentColor;}
  .list-item .flag.hiddenflag{visibility:hidden;}
  .ovbtn{width:100%; padding:15px; margin-bottom:6px;}
  .ovbtn .button-text{width:100%; text-align:center;}
  .ovbtn.answered{color:#fff;}
  .infoText{display:inline-block; width:100px; padding:2px 0;}
  .infoValue{font-weight:700;}
  /* ===== dialogs (paper-dialog replica) ===== */
  .backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:50;
    display:none; align-items:center; justify-content:center;
  }
  .backdrop.open{display:flex;}
  .pdialog{
    background:#fff; border-radius:2px; min-width:420px; max-width:620px; padding:24px;
    box-shadow:0 16px 24px 2px rgba(0,0,0,.14),0 6px 30px 5px rgba(0,0,0,.12),0 8px 10px -5px rgba(0,0,0,.4);
    font-size:15px; line-height:1.5;
  }
  .pdialog .dlgbuttons{display:flex; justify-content:flex-end; gap:10px; margin-top:24px;}
  /* ===== result ===== */
  .resultpage{padding:26px 20px 120px; text-align:center;}
  .resultpage h1{font-size:24px; font-weight:700; margin:34px 0 0;}
  .verdict{font-size:26px; font-weight:700; margin-top:8px;}
  .verdict.pass{color:var(--tropical-rain-forest);}
  .verdict.fail{color:var(--mahogany);}
  .reviewwrap{max-width:900px; margin:30px auto 0; text-align:left;}
  .reviewwrap h2{font-size:16px; border-bottom:2px solid var(--shared-background-color); padding-bottom:8px;}
  .rquestion{margin:26px 0 6px; font-size:15px; font-weight:700; line-height:1.4;}
  .rquestion .qnum{color:var(--mariner);}
  .reviewwrap .answer{cursor:default; padding:10px 14px;}
  .reviewwrap .answer .pcheck{transform:scale(.8); transform-origin:left center;}
  .rmarkedflag{color:var(--marked-content-color); font-size:13px;}
  .explain{
    font-size:13px; color:var(--night-rider); background:var(--white-smoke);
    border-left:3px solid var(--mariner); padding:10px 14px; margin:8px 0 2px; line-height:1.55;
  }
  @media (max-width:860px){
    .header,.footer{padding:0 14px;}
    .content{padding:0 14px;}
    .qcols{flex-direction:column;}
    .contentLeft,.contentRight{padding:14px 0 0 0;}
    .timewrap{margin-left:10px;}
    .list-item{width:calc(33% - 24px);}
    .pdialog{min-width:0; margin:0 12px;}
    .logininfo{right:12px;}
    .hstack{display:none;}
  }
</style>
</head>
