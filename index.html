<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B121 / BPT — Exam · Esame</title>
<style>
  :root{
    --bg:#0f1524; --panel:#171f33; --panel2:#1d2740; --line:#2a3554;
    --text:#e8ecf6; --muted:#93a0bd; --accent:#3b82f6; --accent2:#60a5fa;
    --good:#22c55e; --bad:#ef4444; --warn:#f59e0b;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:860px; margin:0 auto; padding:24px 16px 80px;}
  header{
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    padding-bottom:18px; border-bottom:1px solid var(--line); margin-bottom:22px; flex-wrap:wrap;
  }
  header h1{font-size:1.15rem; letter-spacing:.3px;}
  header .sub{color:var(--muted); font-size:.8rem; margin-top:3px;}
  .langswitch{display:flex; border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  .langswitch button{
    background:transparent; color:var(--muted); border:0; padding:8px 16px;
    font-size:.85rem; font-weight:600; cursor:pointer;
  }
  .langswitch button.active{background:var(--accent); color:#fff;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:26px;}
  .btn{
    display:inline-block; background:var(--accent); color:#fff; border:0; border-radius:10px;
    padding:12px 26px; font-size:.95rem; font-weight:700; cursor:pointer;
  }
  .btn:hover{background:var(--accent2);}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--text);}
  .btn.ghost:hover{border-color:var(--accent); color:var(--accent2); background:transparent;}
  .btn:disabled{opacity:.4; cursor:default;}
  /* start screen */
  #start h2{font-size:1.5rem; margin-bottom:10px;}
  #start p{color:var(--muted); line-height:1.6; margin-bottom:10px; font-size:.92rem;}
  #start .meta{display:flex; gap:20px; margin:18px 0 24px; flex-wrap:wrap;}
  #start .meta div{background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:12px 18px;}
  #start .meta b{display:block; font-size:1.25rem;}
  #start .meta span{color:var(--muted); font-size:.78rem;}
  /* exam */
  .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:10px; flex-wrap:wrap;}
  .qcount{font-size:.85rem; color:var(--muted); font-weight:600;}
  .section-tag{
    display:inline-block; background:#1e3a5f; color:#8ec2ff; font-size:.72rem; font-weight:700;
    letter-spacing:.4px; padding:4px 10px; border-radius:99px; margin-bottom:14px;
  }
  .progress{height:6px; background:var(--panel2); border-radius:99px; overflow:hidden; margin-bottom:22px;}
  .progress i{display:block; height:100%; background:var(--accent); border-radius:99px; transition:width .25s;}
  .qtext{font-size:1.08rem; font-weight:600; line-height:1.5; margin-bottom:20px;}
  .opts{display:flex; flex-direction:column; gap:10px;}
  .opt{
    display:flex; gap:12px; align-items:flex-start; text-align:left; width:100%;
    background:var(--panel2); border:1px solid var(--line); border-radius:10px;
    padding:13px 15px; color:var(--text); font-size:.93rem; line-height:1.45; cursor:pointer;
  }
  .opt:hover{border-color:var(--accent);}
  .opt .letter{
    flex:0 0 26px; height:26px; border-radius:50%; border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-size:.78rem; font-weight:700; color:var(--muted);
  }
  .opt.selected{border-color:var(--accent); background:#1c2a4a;}
  .opt.selected .letter{background:var(--accent); border-color:var(--accent); color:#fff;}
  .opt.correct{border-color:var(--good); background:rgba(34,197,94,.10);}
  .opt.correct .letter{background:var(--good); border-color:var(--good); color:#fff;}
  .opt.wrong{border-color:var(--bad); background:rgba(239,68,68,.10);}
  .opt.wrong .letter{background:var(--bad); border-color:var(--bad); color:#fff;}
  .navrow{display:flex; justify-content:space-between; margin-top:24px; gap:10px;}
  /* navigator grid */
  .grid{display:flex; flex-wrap:wrap; gap:6px; margin-top:22px; padding-top:18px; border-top:1px solid var(--line);}
  .grid button{
    width:34px; height:30px; border-radius:7px; border:1px solid var(--line);
    background:transparent; color:var(--muted); font-size:.75rem; font-weight:600; cursor:pointer;
  }
  .grid button.answered{background:var(--panel2); color:var(--text); border-color:#3a4a75;}
  .grid button.current{border-color:var(--accent); color:var(--accent2);}
  /* results */
  .score-big{font-size:3rem; font-weight:800; text-align:center;}
  .score-sub{text-align:center; color:var(--muted); margin-bottom:24px;}
  .score-sub b{color:var(--text);}
  .secstats{display:flex; flex-direction:column; gap:8px; margin:22px 0;}
  .secstat{display:flex; align-items:center; gap:12px; font-size:.85rem;}
  .secstat .name{flex:1; color:var(--muted);}
  .secstat .bar{flex:2; height:8px; background:var(--panel2); border-radius:99px; overflow:hidden;}
  .secstat .bar i{display:block; height:100%; background:var(--good); border-radius:99px;}
  .secstat .num{width:48px; text-align:right; font-weight:700;}
  .review-item{border-top:1px solid var(--line); padding:20px 0;}
  .review-item .qtext{font-size:.98rem; margin-bottom:14px;}
  .review-item .opts{gap:8px;}
  .review-item .opt{cursor:default; font-size:.88rem; padding:10px 13px;}
  .center{text-align:center;}
  .mt{margin-top:24px;}
  footer{margin-top:34px; text-align:center; color:#5b6785; font-size:.72rem; line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1 id="hd-title"></h1>
      <div class="sub" id="hd-sub"></div>
    </div>
    <div class="langswitch">
      <button id="lang-en" onclick="setLang('en')">English</button>
      <button id="lang-it" onclick="setLang('it')">Italiano</button>
    </div>
  </header>

  <!-- START -->
  <div id="start" class="card">
    <h2 id="st-h"></h2>
    <p id="st-p1"></p>
    <p id="st-p2"></p>
    <div class="meta">
      <div><b id="st-nq"></b><span id="st-mq"></span></div>
      <div><b id="st-ns"></b><span id="st-ms"></span></div>
      <div><b>EN · IT</b><span id="st-ml"></span></div>
    </div>
    <button class="btn" id="st-go" onclick="startExam()"></button>
  </div>

  <!-- EXAM -->
  <div id="exam" class="card" style="display:none">
    <div class="topbar">
      <span class="qcount" id="ex-count"></span>
      <button class="btn ghost" id="ex-finish" onclick="finishExam()" style="padding:8px 16px; font-size:.8rem;"></button>
    </div>
    <div class="progress"><i id="ex-bar" style="width:0%"></i></div>
    <span class="section-tag" id="ex-sec"></span>
    <div class="qtext" id="ex-q"></div>
    <div class="opts" id="ex-opts"></div>
    <div class="navrow">
      <button class="btn ghost" id="ex-prev" onclick="nav(-1)"></button>
      <button class="btn" id="ex-next" onclick="nav(1)"></button>
    </div>
    <div class="grid" id="ex-grid"></div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="card" style="display:none">
    <div class="score-big" id="rs-pct"></div>
    <div class="score-sub" id="rs-sub"></div>
    <div class="secstats" id="rs-secs"></div>
    <div class="center">
      <button class="btn" onclick="restart()" id="rs-again"></button>
    </div>
    <div class="mt">
      <h2 style="font-size:1.05rem; margin-bottom:6px;" id="rs-revh"></h2>
      <div id="rs-review"></div>
    </div>
  </div>

  <footer id="ft"></footer>
</div>

<script>
/* ---------- UI strings ---------- */
const UI = {
  en:{
    title:"B121 / BPT — Professional Passenger Transport",
    sub:"Practice exam · ARV2 (SR 822.222) theory",
    stH:"Practice exam",
    stP1:"This practice exam is built from the actual subject matter of the B121 additional theory exam: the ARV2 rules on working, driving and rest time for professional passenger transport, plus the administrative requirements for the licence.",
    stP2:n=>`You get all ${n} questions in their original order — the 58 core ARV2 questions plus extra sections on the tachograph/work book in practice and the Zurich cantonal taxi rules (PTLG). The position of the answers is shuffled on every attempt. Answer every question, then finish the exam to see your score and the full review. Focus on the exact numbers (hours and minutes) — that is where most candidates lose points. At the official exam: 30 questions in 45 minutes, maximum 3 errors.`,
    stMQ:"questions", stMS:"topic areas", stML:"languages",
    stGo:"Start exam",
    count:(i,n)=>`Question ${i} of ${n}`,
    finish:"Finish exam", prev:"← Previous", next:"Next →",
    confirmUnanswered:n=>`You have ${n} unanswered question(s). Finish the exam anyway?`,
    rsSub:(c,n)=>`<b>${c}</b> of <b>${n}</b> questions answered correctly`,
    rsAgain:"New attempt", rsRevH:"Review",
    notAnswered:"Not answered",
    ft:"Independent practice set — not the official asa question bank. Figures reflect the ARV2 as summarised from public Swiss sources (status 2025/2026); sections K–L reflect the ARV2 control provisions and the Zurich cantonal taxi law (PTLG, in force since 2024). Cantonal rules and official questions can differ or change — always confirm current requirements with your cantonal office (e.g. Kanton Zürich) and official asa material."
  },
  it:{
    title:"B121 / TPP — Trasporto Professionale di Persone",
    sub:"Esame di prova · teoria OLR2 (RS 822.222)",
    stH:"Esame di prova",
    stP1:"Questo esame di prova è costruito sui contenuti reali dell'esame di teoria supplementare B121: le regole dell'OLR2 su tempo di lavoro, di guida e di riposo per il trasporto professionale di persone, oltre ai requisiti amministrativi per la licenza.",
    stP2:n=>`Riceverai tutte le ${n} domande nel loro ordine originale — le 58 domande di base sull'OLR2 più sezioni extra sul tachigrafo/libretto di lavoro in pratica e sulle regole cantonali zurighesi per i taxi (PTLG). La posizione delle risposte viene mescolata a ogni tentativo. Rispondi a tutte le domande, poi concludi l'esame per vedere il punteggio e la revisione completa. Concentrati sui numeri esatti (ore e minuti): è lì che la maggior parte dei candidati perde punti. All'esame ufficiale: 30 domande in 45 minuti, al massimo 3 errori.`,
    stMQ:"domande", stMS:"aree tematiche", stML:"lingue",
    stGo:"Inizia l'esame",
    count:(i,n)=>`Domanda ${i} di ${n}`,
    finish:"Concludi l'esame", prev:"← Precedente", next:"Successiva →",
    confirmUnanswered:n=>`Hai ${n} domanda/e senza risposta. Concludere comunque l'esame?`,
    rsSub:(c,n)=>`<b>${c}</b> risposte corrette su <b>${n}</b> domande`,
    rsAgain:"Nuovo tentativo", rsRevH:"Revisione",
    notAnswered:"Nessuna risposta",
    ft:"Set di esercizi indipendente — non è la banca dati ufficiale asa. I dati riflettono l'OLR2 come riassunto da fonti pubbliche svizzere (stato 2025/2026); le sezioni K–L riflettono le disposizioni di controllo dell'OLR2 e la legge cantonale zurighese sui taxi (PTLG, in vigore dal 2024). Le regole cantonali e le domande ufficiali possono differire o cambiare — verifica sempre i requisiti aggiornati presso il tuo ufficio cantonale (es. Canton Zurigo) e il materiale ufficiale asa."
  }
};

/* ---------- Sections ---------- */
const SECTIONS = [
  {en:"A. Scope & definitions", it:"A. Campo d'applicazione e definizioni"},
  {en:"B. Driving time (Lenkzeit)", it:"B. Tempo di guida (Lenkzeit)"},
  {en:"C. Driving breaks (Lenkpausen)", it:"C. Pause di guida (Lenkpausen)"},
  {en:"D. Working time & overtime (Arbeitszeit / Überzeit)", it:"D. Tempo di lavoro e straordinari (Arbeitszeit / Überzeit)"},
  {en:"E. Daily rest time (Ruhezeit)", it:"E. Riposo giornaliero (Ruhezeit)"},
  {en:"F. Rest day & free half-day (Ruhetag / Halbtag)", it:"F. Giorno di riposo e mezza giornata libera (Ruhetag / Halbtag)"},
  {en:"G. Standby & waiting time (Bereitschaftszeit)", it:"G. Tempo di disponibilità e attesa (Bereitschaftszeit)"},
  {en:"H. Records, work book & tachograph", it:"H. Registrazioni, libretto di lavoro e tachigrafo"},
  {en:"I. Employer duties & control", it:"I. Doveri del datore di lavoro e controllo"},
  {en:"J. B121 admin: eligibility, medical & vehicle", it:"J. Amministrazione B121: idoneità, visita medica e veicolo"},
  {en:"K. Tachograph, record sheets & work book in practice", it:"K. Tachigrafo, fogli di registrazione e libretto di lavoro in pratica"},
  {en:"L. Zurich: cantonal taxi permit & exam facts (PTLG)", it:"L. Zurigo: licenza cantonale taxi e dati sull'esame (PTLG)"}
];

/* ---------- Questions (correct answer is always index 0; positions are shuffled at runtime) ---------- */
const Q = [
{s:0,en:{q:"Which drivers does the ARV2 (SR 822.222) mainly apply to?",a:["Professional drivers of light passenger-transport vehicles and heavy passenger cars not covered by ARV1","Only drivers of goods vehicles over 3.5 t","Only private drivers using their own car","Only bus drivers in scheduled public transport"]},it:{q:"A quali conducenti si applica principalmente l'OLR2 (RS 822.222)?",a:["Conducenti professionali di veicoli leggeri per il trasporto di persone e di autovetture pesanti non soggetti all'OLR1","Solo ai conducenti di veicoli merci oltre 3,5 t","Solo ai conducenti privati con la propria auto","Solo ai conducenti di bus di linea del trasporto pubblico"]}},
{s:0,en:{q:"A taxi is a light motor vehicle up to 3,500 kg with a maximum of how many passenger seats (besides the driver) under the ARV2?",a:["8 passenger seats","16 passenger seats","4 passenger seats","12 passenger seats"]},it:{q:"Un taxi è un veicolo leggero fino a 3'500 kg con al massimo quanti posti a sedere per passeggeri (oltre al conducente) secondo l'OLR2?",a:["8 posti passeggeri","16 posti passeggeri","4 posti passeggeri","12 posti passeggeri"]}},
{s:0,en:{q:"What is the legal reference number of the ARV2?",a:["SR 822.222","SR 741.01","SR 822.221","SR 741.51"]},it:{q:"Qual è il numero di riferimento legale dell'OLR2?",a:["RS 822.222","RS 741.01","RS 822.221","RS 741.51"]}},
{s:0,en:{q:"How is \"driving time\" (Lenkzeit) defined?",a:["The time during which the vehicle is actually in motion (pure driving)","The whole working day including breaks","Only the time spent waiting for customers","The time from leaving home until returning home"]},it:{q:"Come è definito il \"tempo di guida\" (Lenkzeit)?",a:["Il tempo durante il quale il veicolo è effettivamente in movimento (guida vera e propria)","L'intera giornata lavorativa comprese le pause","Solo il tempo trascorso in attesa dei clienti","Il tempo da quando si esce di casa fino al rientro"]}},
{s:0,en:{q:"What does \"working time\" (Arbeitszeit) include?",a:["Driving time plus all other work-related activity","Only the driving time","Only administrative work at the office","Only the daily rest period"]},it:{q:"Cosa comprende il \"tempo di lavoro\" (Arbeitszeit)?",a:["Il tempo di guida più ogni altra attività lavorativa","Solo il tempo di guida","Solo il lavoro amministrativo in ufficio","Solo il periodo di riposo giornaliero"]}},
{s:0,en:{q:"Interruptions or short pauses of less than 15 minutes are counted as...",a:["Working time","Rest time","A driving break","Standby time"]},it:{q:"Le interruzioni o brevi pause di meno di 15 minuti sono considerate come...",a:["Tempo di lavoro","Tempo di riposo","Una pausa di guida","Tempo di disponibilità"]}},
{s:0,en:{q:"For a self-employed driver, what counts as \"professional activity\" for the rules?",a:["The driving time","The full working time including waiting","Only night work","Only work for other employers"]},it:{q:"Per un conducente indipendente, cosa conta come \"attività professionale\" ai fini delle regole?",a:["Il tempo di guida","L'intero tempo di lavoro compresa l'attesa","Solo il lavoro notturno","Solo il lavoro per altri datori di lavoro"]}},
{s:0,en:{q:"A vehicle may be used for professional passenger transport only if...",a:["It is marked/entered for professional passenger transport in the vehicle registration document","It is less than one year old","It is painted a specific colour nationwide","It has a diesel engine"]},it:{q:"Un veicolo può essere impiegato per il trasporto professionale di persone solo se...",a:["È annotato/iscritto per il trasporto professionale di persone nella licenza di circolazione","Ha meno di un anno","È verniciato di un colore specifico in tutta la Svizzera","Ha un motore diesel"]}},
{s:1,en:{q:"What is the maximum daily driving time between two consecutive daily rest periods?",a:["9 hours","10 hours","8 hours","12 hours"]},it:{q:"Qual è il tempo massimo di guida giornaliero tra due periodi di riposo giornaliero consecutivi?",a:["9 ore","10 ore","8 ore","12 ore"]}},
{s:1,en:{q:"What is the maximum driving time within one week?",a:["45 hours","56 hours","48 hours","53 hours"]},it:{q:"Qual è il tempo massimo di guida in una settimana?",a:["45 ore","56 ore","48 ore","53 ore"]}},
{s:1,en:{q:"May the daily and weekly maximum driving times be exceeded when doing overtime?",a:["No, they may never be exceeded, not even with overtime","Yes, by up to 2 hours per day","Yes, if the employer agrees","Yes, once per week"]},it:{q:"I tempi massimi di guida giornalieri e settimanali possono essere superati facendo straordinari?",a:["No, non possono mai essere superati, nemmeno con lo straordinario","Sì, fino a 2 ore al giorno","Sì, se il datore di lavoro è d'accordo","Sì, una volta a settimana"]}},
{s:1,en:{q:"Which activity always counts fully as driving time?",a:["Every period in which the vehicle is moving in traffic","Waiting at a taxi rank with the engine off","Cleaning the vehicle","Filling in the work book at home"]},it:{q:"Quale attività conta sempre interamente come tempo di guida?",a:["Ogni periodo in cui il veicolo è in movimento nel traffico","L'attesa a un posteggio taxi con il motore spento","La pulizia del veicolo","La compilazione del libretto di lavoro a casa"]}},
{s:1,en:{q:"A self-employed taxi driver has already driven 9 hours today. What may he still do today?",a:["No more driving under the ARV2 until after a daily rest","Drive 2 more hours if business is good","Drive 1 more hour with a customer's consent","Drive as long as he feels awake"]},it:{q:"Un tassista indipendente ha già guidato 9 ore oggi. Cosa può ancora fare oggi?",a:["Nessun'altra guida secondo l'OLR2 fino a dopo un riposo giornaliero","Guidare altre 2 ore se gli affari vanno bene","Guidare 1 ora in più con il consenso di un cliente","Guidare finché si sente sveglio"]}},
{s:1,en:{q:"The driving-time limits of the ARV2 exist mainly to...",a:["Ensure road safety by preventing driver fatigue","Increase company profits","Reduce fuel consumption","Limit the number of taxis in a city"]},it:{q:"I limiti del tempo di guida dell'OLR2 esistono principalmente per...",a:["Garantire la sicurezza stradale evitando la stanchezza del conducente","Aumentare i profitti dell'azienda","Ridurre il consumo di carburante","Limitare il numero di taxi in una città"]}},
{s:2,en:{q:"After how much continuous driving time must a break of at least 45 minutes be taken?",a:["After 4½ hours of driving","After 6 hours of driving","After 2 hours of driving","After 8 hours of driving"]},it:{q:"Dopo quanto tempo di guida continuativa deve essere effettuata una pausa di almeno 45 minuti?",a:["Dopo 4 ore e mezza di guida","Dopo 6 ore di guida","Dopo 2 ore di guida","Dopo 8 ore di guida"]}},
{s:2,en:{q:"If the break is placed BEFORE 4½ hours of driving elapse, what is sufficient?",a:["One break of 30 minutes, or two breaks of 20 minutes each","One break of 10 minutes","No break at all","One break of 60 minutes only"]},it:{q:"Se la pausa è collocata PRIMA che siano trascorse 4 ore e mezza di guida, cosa è sufficiente?",a:["Una pausa di 30 minuti, oppure due pause di 20 minuti ciascuna","Una pausa di 10 minuti","Nessuna pausa","Solo una pausa di 60 minuti"]}},
{s:2,en:{q:"What may the driver NOT do during a driving break?",a:["Drive a vehicle","Have a coffee","Rest in the car","Read a newspaper"]},it:{q:"Cosa NON può fare il conducente durante una pausa di guida?",a:["Guidare un veicolo","Bere un caffè","Riposare in auto","Leggere un giornale"]}},
{s:2,en:{q:"When is the 45-minute driving break not required after 4½ hours?",a:["If a daily or weekly rest begins immediately afterwards","If the driver is not tired","If there are still customers waiting","If it is raining"]},it:{q:"Quando la pausa di guida di 45 minuti non è richiesta dopo 4 ore e mezza?",a:["Se subito dopo inizia un riposo giornaliero o settimanale","Se il conducente non è stanco","Se ci sono ancora clienti in attesa","Se piove"]}},
{s:2,en:{q:"A driver takes his break as two separate parts before 4½ h of driving. Each part must be at least...",a:["20 minutes","10 minutes","5 minutes","45 minutes"]},it:{q:"Un conducente fraziona la pausa in due parti prima di 4 ore e mezza di guida. Ogni parte deve durare almeno...",a:["20 minuti","10 minuti","5 minuti","45 minuti"]}},
{s:2,en:{q:"The purpose of the driving break is primarily to...",a:["Counter fatigue and keep the driver alert","Allow time to clean the taxi","Let the meter reset","Give the employer time to check the vehicle"]},it:{q:"Lo scopo della pausa di guida è principalmente quello di...",a:["Contrastare la stanchezza e mantenere il conducente vigile","Dare tempo per pulire il taxi","Permettere il reset del tassametro","Dare tempo al datore di lavoro di controllare il veicolo"]}},
{s:3,en:{q:"What is the maximum weekly working time for an EMPLOYED driver in a taxi business?",a:["53 hours","45 hours","48 hours","60 hours"]},it:{q:"Qual è il tempo di lavoro settimanale massimo per un conducente DIPENDENTE in un'azienda di taxi?",a:["53 ore","45 ore","48 ore","60 ore"]}},
{s:3,en:{q:"Outside taxi businesses, the maximum weekly working time for an employed driver is...",a:["48 hours","53 hours","56 hours","40 hours"]},it:{q:"Al di fuori delle aziende di taxi, il tempo di lavoro settimanale massimo per un conducente dipendente è...",a:["48 ore","53 ore","56 ore","40 ore"]}},
{s:3,en:{q:"For a SELF-EMPLOYED driver, the working time is...",a:["Not limited by the ARV2 (but driving time, breaks and rest still apply)","Limited to 53 hours per week","Limited to 40 hours per week","Unlimited including driving time"]},it:{q:"Per un conducente INDIPENDENTE, il tempo di lavoro è...",a:["Non limitato dall'OLR2 (ma restano validi tempo di guida, pause e riposo)","Limitato a 53 ore a settimana","Limitato a 40 ore a settimana","Illimitato incluso il tempo di guida"]}},
{s:3,en:{q:"At the latest after how much working time must an employed driver take a work break?",a:["After 5½ hours of working time","After 8 hours of working time","After 4½ hours of working time","After 7 hours of working time"]},it:{q:"Al più tardi dopo quanto tempo di lavoro un conducente dipendente deve fare una pausa di lavoro?",a:["Dopo 5 ore e mezza di lavoro","Dopo 8 ore di lavoro","Dopo 4 ore e mezza di lavoro","Dopo 7 ore di lavoro"]}},
{s:3,en:{q:"For a daily working time of UP TO 7 hours, the minimum work break is...",a:["20 minutes","30 minutes","45 minutes","60 minutes"]},it:{q:"Per un tempo di lavoro giornaliero FINO A 7 ore, la pausa lavorativa minima è di...",a:["20 minuti","30 minuti","45 minuti","60 minuti"]}},
{s:3,en:{q:"For a daily working time of MORE THAN 9 hours, the work break must be...",a:["1 hour, or 2×30 minutes, or 3×20 minutes","Exactly 20 minutes","Only 30 minutes","No break is required"]},it:{q:"Per un tempo di lavoro giornaliero SUPERIORE a 9 ore, la pausa lavorativa deve essere di...",a:["1 ora, oppure 2×30 minuti, oppure 3×20 minuti","Esattamente 20 minuti","Solo 30 minuti","Nessuna pausa richiesta"]}},
{s:3,en:{q:"Regular overtime work is limited to how many hours per week?",a:["4 hours per week","10 hours per week","8 hours per week","2 hours per week"]},it:{q:"Il lavoro straordinario ordinario è limitato a quante ore a settimana?",a:["4 ore a settimana","10 ore a settimana","8 ore a settimana","2 ore a settimana"]}},
{s:3,en:{q:"Overtime work per calendar year may not exceed...",a:["208 hours","300 hours","150 hours","100 hours"]},it:{q:"Il lavoro straordinario per anno civile non può superare...",a:["208 ore","300 ore","150 ore","100 ore"]}},
{s:4,en:{q:"What is the regular minimum daily rest period?",a:["11 consecutive hours","9 consecutive hours","8 consecutive hours","12 consecutive hours"]},it:{q:"Qual è il riposo giornaliero minimo ordinario?",a:["11 ore consecutive","9 ore consecutive","8 ore consecutive","12 ore consecutive"]}},
{s:4,en:{q:"The daily rest may be reduced to 9 hours at most how many times per week?",a:["3 times per week","1 time per week","5 times per week","It may never be reduced"]},it:{q:"Il riposo giornaliero può essere ridotto a 9 ore al massimo quante volte a settimana?",a:["3 volte a settimana","1 volta a settimana","5 volte a settimana","Non può mai essere ridotto"]}},
{s:4,en:{q:"Does a reduced (9-hour) daily rest have to be compensated later?",a:["No, a reduced daily rest does not have to be compensated","Yes, always the next day","Yes, within the same week","Yes, doubled"]},it:{q:"Un riposo giornaliero ridotto (9 ore) deve essere recuperato in seguito?",a:["No, un riposo giornaliero ridotto non deve essere recuperato","Sì, sempre il giorno dopo","Sì, entro la stessa settimana","Sì, in misura doppia"]}},
{s:4,en:{q:"At any moment of professional activity, how much of the previous 24 hours must have been consecutive rest?",a:["11 hours","8 hours","6 hours","24 hours"]},it:{q:"In ogni momento dell'attività professionale, quanta parte delle 24 ore precedenti deve essere stata riposo consecutivo?",a:["11 ore","8 ore","6 ore","24 ore"]}},
{s:4,en:{q:"If the daily rest is split within 24 hours, how many parts are allowed and how long must one part be?",a:["Up to 3 parts, with one part of at least 8 hours","Up to 5 parts of 2 hours each","Only 2 parts of 4 hours each","Splitting is never allowed"]},it:{q:"Se il riposo giornaliero è frazionato nelle 24 ore, quante parti sono ammesse e quanto deve durare una parte?",a:["Fino a 3 parti, con una parte di almeno 8 ore","Fino a 5 parti di 2 ore ciascuna","Solo 2 parti di 4 ore ciascuna","Il frazionamento non è mai ammesso"]}},
{s:4,en:{q:"Rest time may be replaced by a payment (money) instead of actually being taken.",a:["False – rest may not be replaced by money (compensation ban)","True – if the driver agrees","True – for self-employed only","True – up to 4 hours per week"]},it:{q:"Il tempo di riposo può essere sostituito da un pagamento (denaro) invece di essere effettivamente goduto.",a:["Falso – il riposo non può essere sostituito con denaro (divieto di indennizzo)","Vero – se il conducente è d'accordo","Vero – solo per gli indipendenti","Vero – fino a 4 ore a settimana"]}},
{s:5,en:{q:"An EMPLOYED driver must have a weekly rest day of at least...",a:["24 consecutive hours","12 consecutive hours","48 consecutive hours","8 consecutive hours"]},it:{q:"Un conducente DIPENDENTE deve avere un giorno di riposo settimanale di almeno...",a:["24 ore consecutive","12 ore consecutive","48 ore consecutive","8 ore consecutive"]}},
{s:5,en:{q:"A SELF-EMPLOYED driver must, within two weeks, take how many rest days?",a:["Two rest days of at least 24 consecutive hours each","One rest day of 24 hours","Four rest days of 12 hours","No rest day is required"]},it:{q:"Un conducente INDIPENDENTE deve, nell'arco di due settimane, prendere quanti giorni di riposo?",a:["Due giorni di riposo di almeno 24 ore consecutive ciascuno","Un giorno di riposo di 24 ore","Quattro giorni di riposo di 12 ore","Nessun giorno di riposo richiesto"]}},
{s:5,en:{q:"Between two rest days of a self-employed driver, at most how many days of professional activity may lie?",a:["12 days","6 days","14 days","8 days"]},it:{q:"Tra due giorni di riposo di un conducente indipendente, quanti giorni di attività professionale al massimo possono trascorrere?",a:["12 giorni","6 giorni","14 giorni","8 giorni"]}},
{s:5,en:{q:"The rest day counts as taken on a Sunday/holiday if at least how many of the 24 hours fall on it?",a:["18 hours","12 hours","24 hours","6 hours"]},it:{q:"Il giorno di riposo è considerato goduto in una domenica/festivo se almeno quante delle 24 ore vi cadono?",a:["18 ore","12 ore","24 ore","6 ore"]}},
{s:5,en:{q:"Who is entitled to a free half-day per week in addition to the weekly rest day?",a:["An employee whose work is spread over more than 5 mornings and afternoons of the week","Every driver, always","Only self-employed drivers","Only drivers over 50 years old"]},it:{q:"Chi ha diritto a una mezza giornata libera a settimana oltre al giorno di riposo settimanale?",a:["Un dipendente il cui lavoro è distribuito su più di 5 mattine e pomeriggi della settimana","Ogni conducente, sempre","Solo i conducenti indipendenti","Solo i conducenti over 50"]}},
{s:5,en:{q:"The free half-day consists of 5 consecutive hours between which times?",a:["Between 07:00 and 18:00","Between 00:00 and 05:00","Between 18:00 and 23:00","Any 5 hours at night"]},it:{q:"La mezza giornata libera consiste in 5 ore consecutive tra quali orari?",a:["Tra le 07:00 e le 18:00","Tra le 00:00 e le 05:00","Tra le 18:00 e le 23:00","5 ore qualsiasi di notte"]}},
{s:6,en:{q:"For an EMPLOYED taxi driver, time spent waiting for customers while available for the employer counts as...",a:["Working time","Rest time","A driving break","Free time"]},it:{q:"Per un tassista DIPENDENTE, il tempo trascorso in attesa dei clienti restando a disposizione del datore di lavoro conta come...",a:["Tempo di lavoro","Tempo di riposo","Una pausa di guida","Tempo libero"]}},
{s:6,en:{q:"Standby time (Bereitschaftszeit) is best described as...",a:["Time when the driver is not driving but must remain available to work","Time spent sleeping at home","The weekly rest day","The 45-minute driving break"]},it:{q:"Il tempo di disponibilità (Bereitschaftszeit) è descritto meglio come...",a:["Tempo in cui il conducente non guida ma deve restare disponibile a lavorare","Tempo trascorso dormendo a casa","Il giorno di riposo settimanale","La pausa di guida di 45 minuti"]}},
{s:6,en:{q:"Why does waiting time matter for an employed driver's limits?",a:["Because it counts toward the maximum working time, not as rest","Because it counts as a driving break","Because it reduces the weekly rest day","Because it has no effect at all"]},it:{q:"Perché il tempo di attesa è rilevante per i limiti di un conducente dipendente?",a:["Perché conta ai fini del tempo di lavoro massimo, non come riposo","Perché conta come pausa di guida","Perché riduce il giorno di riposo settimanale","Perché non ha alcun effetto"]}},
{s:7,en:{q:"A self-employed driver records his times in a...",a:["Work book (Arbeitsbuch)","Company tax return","Customer receipt only","Vehicle service booklet"]},it:{q:"Un conducente indipendente registra i suoi tempi in un...",a:["Libretto di lavoro (Arbeitsbuch)","Dichiarazione fiscale aziendale","Solo scontrino cliente","Libretto di manutenzione del veicolo"]}},
{s:7,en:{q:"Before starting the trip, what must a self-employed driver enter in the work book?",a:["The consecutive rest before starting, the start time and the licence-plate number","The customer's name and destination","The fuel price of the day","Nothing until the end of the day"]},it:{q:"Prima di iniziare la corsa, cosa deve annotare un conducente indipendente nel libretto di lavoro?",a:["Il riposo consecutivo prima dell'inizio, l'ora di inizio e il numero di targa","Il nome del cliente e la destinazione","Il prezzo del carburante del giorno","Nulla fino a fine giornata"]}},
{s:7,en:{q:"At the end of the working day, what must the self-employed driver additionally record?",a:["The total driving time and the new odometer reading","The weather conditions","The number of passengers only","The colour of the vehicle"]},it:{q:"Alla fine della giornata lavorativa, cosa deve annotare in più il conducente indipendente?",a:["Il tempo di guida totale e il nuovo chilometraggio","Le condizioni meteo","Solo il numero di passeggeri","Il colore del veicolo"]}},
{s:7,en:{q:"What is the purpose of the driving/rest-time records?",a:["To allow the authorities to check compliance with the ARV2","To calculate the fare for the customer","To advertise the taxi company","To register the vehicle for the first time"]},it:{q:"Qual è lo scopo delle registrazioni dei tempi di guida/riposo?",a:["Permettere alle autorità di verificare il rispetto dell'OLR2","Calcolare la tariffa per il cliente","Pubblicizzare l'azienda di taxi","Immatricolare il veicolo per la prima volta"]}},
{s:7,en:{q:"A digital tachograph or equivalent recording is used mainly to...",a:["Record driving, work and rest periods reliably","Play music for passengers","Navigate to the destination","Calculate the tip"]},it:{q:"Un tachigrafo digitale o registrazione equivalente serve principalmente a...",a:["Registrare in modo affidabile i periodi di guida, lavoro e riposo","Riprodurre musica per i passeggeri","Navigare fino alla destinazione","Calcolare la mancia"]}},
{s:7,en:{q:"Records of working, driving and rest time must be...",a:["Kept and made available for control","Destroyed at the end of each shift","Shown to passengers","Sent to other taxi drivers"]},it:{q:"Le registrazioni di tempo di lavoro, guida e riposo devono essere...",a:["Conservate e messe a disposizione per il controllo","Distrutte alla fine di ogni turno","Mostrate ai passeggeri","Inviate ad altri tassisti"]}},
{s:8,en:{q:"A key duty of the employer under the ARV2 is to...",a:["Monitor that working, driving and rest-time rules are respected","Choose the driver's clothes","Set the fuel price","Drive the taxi personally"]},it:{q:"Un dovere fondamentale del datore di lavoro secondo l'OLR2 è...",a:["Vigilare sul rispetto delle norme su tempo di lavoro, guida e riposo","Scegliere l'abbigliamento del conducente","Fissare il prezzo del carburante","Guidare personalmente il taxi"]}},
{s:8,en:{q:"The employer's record (Aufstellung) of times must contain, among other things...",a:["Daily driving time, total daily/weekly working time and overtime","Only the driver's home address","Only the customers' phone numbers","Only the vehicle's colour"]},it:{q:"Il registro (Aufstellung) dei tempi tenuto dal datore di lavoro deve contenere, tra l'altro...",a:["Tempo di guida giornaliero, tempo di lavoro totale giornaliero/settimanale e straordinari","Solo l'indirizzo di casa del conducente","Solo i numeri di telefono dei clienti","Solo il colore del veicolo"]}},
{s:8,en:{q:"Who is generally responsible for controlling compliance on the road and in businesses?",a:["The competent cantonal enforcement authority","The passengers","The vehicle importer","The fuel station"]},it:{q:"Chi è generalmente responsabile del controllo del rispetto delle norme su strada e nelle aziende?",a:["L'autorità cantonale di esecuzione competente","I passeggeri","L'importatore del veicolo","La stazione di servizio"]}},
{s:9,en:{q:"What driving experience is normally required before obtaining the B121 (professional passenger transport)?",a:["At least 1 year of category B experience without licence withdrawal","At least 5 years of any driving","No previous experience is needed","A category C (truck) licence"]},it:{q:"Quale esperienza di guida è normalmente richiesta prima di ottenere il B121 (trasporto professionale di persone)?",a:["Almeno 1 anno di esperienza in categoria B senza revoca della licenza","Almeno 5 anni di guida qualsiasi","Nessuna esperienza precedente","Una licenza categoria C (camion)"]}},
{s:9,en:{q:"Before registering, the candidate normally must pass a...",a:["Medical examination by an approved physician","Physical fitness sports test","Language exam in three national languages","Mechanics apprenticeship"]},it:{q:"Prima di iscriversi, il candidato deve normalmente superare una...",a:["Visita medica presso un medico riconosciuto","Prova sportiva di forma fisica","Esame di lingua in tre lingue nazionali","Apprendistato da meccanico"]}},
{s:9,en:{q:"How often is the medical control examination repeated up to age 50?",a:["Every 5 years","Every year","Every 10 years","Only once"]},it:{q:"Ogni quanto viene ripetuta la visita medica di controllo fino ai 50 anni?",a:["Ogni 5 anni","Ogni anno","Ogni 10 anni","Solo una volta"]}},
{s:9,en:{q:"After age 50, how often must the medical control examination be repeated?",a:["Every 3 years","Every 5 years","Every year","Never again"]},it:{q:"Dopo i 50 anni, ogni quanto deve essere ripetuta la visita medica di controllo?",a:["Ogni 3 anni","Ogni 5 anni","Ogni anno","Mai più"]}},
{s:9,en:{q:"The B121 authorises professional passenger transport with vehicles up to how many seats in total?",a:["9 seats (8 passengers + driver)","16 seats","20 seats","5 seats"]},it:{q:"Il B121 autorizza il trasporto professionale di persone con veicoli fino a quanti posti in totale?",a:["9 posti (8 passeggeri + conducente)","16 posti","20 posti","5 posti"]}},
{s:9,en:{q:"In addition to passing the B121 steps, a driver may also need, depending on the canton...",a:["A separate cantonal operating permit (local knowledge, local rules, language)","A pilot's licence","A federal firearms permit","A university degree"]},it:{q:"Oltre a superare le tappe del B121, un conducente può inoltre necessitare, a seconda del cantone...",a:["Un'autorizzazione cantonale d'esercizio separata (conoscenze locali, regole locali, lingua)","Una licenza di pilota","Un permesso federale per armi da fuoco","Un titolo universitario"]}},
{s:10,en:{q:"While the driver is in or near the vehicle, how must the tachograph be handled during professional activity?",a:["It must be kept running continuously and operated so that driving time, other working time and breaks are recorded correctly","It only needs to run while a passenger is on board","It may be switched off during waiting times","It only needs to run at night"]},it:{q:"Mentre il conducente si trova nel veicolo o nelle sue vicinanze, come deve essere gestito il tachigrafo durante l'attività professionale?",a:["Deve essere tenuto costantemente in funzione e usato in modo che tempo di guida, altro tempo di lavoro e pause siano registrati correttamente","Deve funzionare solo quando un passeggero è a bordo","Può essere spento durante i tempi di attesa","Deve funzionare solo di notte"]}},
{s:10,en:{q:"Why must a self-employed taxi driver also operate the tachograph switch during professional activity?",a:["So that taxi trips and private trips can be distinguished on the record sheet","To save fuel","To switch the taximeter tariff","Because the switch starts the engine"]},it:{q:"Perché un tassista indipendente deve azionare anche il selettore del tachigrafo durante l'attività professionale?",a:["Affinché sul foglio di registrazione si possano distinguere le corse in taxi dalle corse private","Per risparmiare carburante","Per cambiare la tariffa del tassametro","Perché il selettore avvia il motore"]}},
{s:10,en:{q:"How many record sheets (Einlageblätter) may be used per vehicle and per day?",a:["Only one record sheet per vehicle per day, and each sheet may be used only once","As many as the driver wants","One sheet per trip","One sheet per week"]},it:{q:"Quanti fogli di registrazione (Einlageblätter) si possono usare per veicolo e per giorno?",a:["Un solo foglio di registrazione per veicolo al giorno, e ogni foglio può essere usato una sola volta","Quanti ne vuole il conducente","Un foglio per corsa","Un foglio a settimana"]}},
{s:10,en:{q:"Which record sheets must be carried on the vehicle?",a:["Enough blank sheets matching the tachograph and, if the previous day was a working day, the completed sheet of that day (or a copy)","Only the sheets of the past year","No sheets need to be carried","Only photocopies of old sheets"]},it:{q:"Quali fogli di registrazione devono essere presenti sul veicolo?",a:["Un numero sufficiente di fogli vergini adatti al tachigrafo e, se il giorno precedente era lavorativo, il foglio compilato di quel giorno (o una copia)","Solo i fogli dell'anno passato","Non è necessario avere fogli a bordo","Solo fotocopie di vecchi fogli"]}},
{s:10,en:{q:"What are the driver's duties regarding the work book during trips?",a:["Carry it along, present it to the enforcement authority on request and fill it in legibly and indelibly","Keep it at home in a safe place","Give it to the customer to sign","Fill it in only at the end of the month"]},it:{q:"Quali sono i doveri del conducente riguardo al libretto di lavoro durante le corse?",a:["Portarlo con sé, presentarlo all'autorità di esecuzione su richiesta e compilarlo in modo leggibile e indelebile","Tenerlo a casa in un luogo sicuro","Farlo firmare al cliente","Compilarlo solo a fine mese"]}},
{s:10,en:{q:"A driver works for two different taxi companies. How many work books may he use at the same time?",a:["Only one work book – it is personal and not transferable","One per employer","Two, one as a backup","As many as he likes"]},it:{q:"Un conducente lavora per due aziende di taxi diverse. Quanti libretti di lavoro può usare contemporaneamente?",a:["Un solo libretto di lavoro – è personale e non trasferibile","Uno per ogni datore di lavoro","Due, uno di riserva","Quanti ne vuole"]}},
{s:10,en:{q:"In addition to the weekly sheet, when must the driver also fill in the daily sheets of the work book?",a:["When the tachograph is not working or the vehicle has already been driven by two drivers that day","Every day without exception","Only on Sundays","Never – daily sheets are optional"]},it:{q:"Oltre al foglio settimanale, quando il conducente deve compilare anche i fogli giornalieri del libretto di lavoro?",a:["Quando il tachigrafo non funziona o il veicolo è già stato guidato da due conducenti quel giorno","Ogni giorno senza eccezioni","Solo la domenica","Mai – i fogli giornalieri sono facoltativi"]}},
{s:10,en:{q:"By when must an employed driver hand the completed weekly and daily sheets of the work book to the employer?",a:["At the latest on the first working day of the following week","Within two weeks","At the end of the month","Only when the employer asks for them"]},it:{q:"Entro quando un conducente dipendente deve consegnare al datore di lavoro i fogli settimanali e giornalieri compilati del libretto di lavoro?",a:["Al più tardi il primo giorno lavorativo della settimana successiva","Entro due settimane","Alla fine del mese","Solo quando il datore di lavoro li richiede"]}},
{s:10,en:{q:"Under what condition can the enforcement authority exempt a driver from filling in the weekly sheets of the work book?",a:["If the working time and required data are entered daily in company-internal daily reports","If the driver has more than 10 years of experience","If the driver only works at night","An exemption is never possible"]},it:{q:"A quale condizione l'autorità di esecuzione può esonerare un conducente dalla compilazione dei fogli settimanali del libretto di lavoro?",a:["Se il tempo di lavoro e i dati richiesti vengono annotati ogni giorno in rapporti giornalieri interni all'azienda","Se il conducente ha più di 10 anni di esperienza","Se il conducente lavora solo di notte","Un esonero non è mai possibile"]}},
{s:10,en:{q:"How long must employers and self-employed drivers keep the control documents (record sheets, work book entries, registers) at the place of business?",a:["2 years, in chronological order and sorted by vehicle","6 months","5 years","10 years"]},it:{q:"Per quanto tempo datori di lavoro e conducenti indipendenti devono conservare i mezzi di controllo (fogli di registrazione, annotazioni del libretto di lavoro, registri) presso la sede aziendale?",a:["2 anni, in ordine cronologico e ordinati per veicolo","6 mesi","5 anni","10 anni"]}},
{s:10,en:{q:"How long is a driver card for the digital tachograph valid?",a:["5 years","1 year","10 years","Unlimited"]},it:{q:"Quanto è valida la carta del conducente per il tachigrafo digitale?",a:["5 anni","1 anno","10 anni","Illimitata"]}},
{s:11,en:{q:"Since 1 January 2024, what is required to offer taxi services in the Canton of Zurich?",a:["A cantonal taxi driver's permit (Taxiausweis) and a cantonal taxi vehicle permit","Only a city licence plate","Only membership in a taxi association","No permit at all"]},it:{q:"Dal 1° gennaio 2024, cosa è richiesto per offrire servizi taxi nel Canton Zurigo?",a:["Una licenza cantonale di tassista (Taxiausweis) e un'autorizzazione cantonale per il veicolo taxi","Solo una targa cittadina","Solo l'adesione a un'associazione di taxi","Nessuna autorizzazione"]}},
{s:11,en:{q:"When may taxi trips be carried out in the Canton of Zurich?",a:["Only once both the taxi vehicle permit and the taxi driver's permit have been issued","As soon as the vehicle has a taximeter","Immediately after passing the B121 theory exam","As soon as the application has been submitted"]},it:{q:"Quando si possono effettuare corse in taxi nel Canton Zurigo?",a:["Solo quando sono state rilasciate sia l'autorizzazione per il veicolo taxi sia la licenza di tassista","Non appena il veicolo ha un tassametro","Subito dopo aver superato l'esame di teoria B121","Non appena la domanda è stata presentata"]}},
{s:11,en:{q:"Which authority issues the taxi driver's permit and the taxi vehicle permit in the Canton of Zurich?",a:["The cantonal Office for Mobility (Amt für Mobilität)","The city police of Zurich","The federal customs office","The taxi drivers' union"]},it:{q:"Quale autorità rilascia la licenza di tassista e l'autorizzazione per il veicolo taxi nel Canton Zurigo?",a:["L'Ufficio cantonale della mobilità (Amt für Mobilität)","La polizia municipale di Zurigo","L'ufficio doganale federale","Il sindacato dei tassisti"]}},
{s:11,en:{q:"What language requirement applies to taxi drivers in the Canton of Zurich?",a:["Sufficient German, e.g. proven by an oral language test at level B1 (or equivalent schooling in German)","Fluent English only","All three national languages","No language requirement"]},it:{q:"Quale requisito linguistico si applica ai tassisti nel Canton Zurigo?",a:["Tedesco sufficiente, ad es. dimostrato con un esame orale di livello B1 (o scolarità equivalente in tedesco)","Solo inglese fluente","Tutte e tre le lingue nazionali","Nessun requisito linguistico"]}},
{s:11,en:{q:"What happened to the local knowledge exam (Ortskundeprüfung) under the Zurich cantonal taxi law?",a:["It was abolished; instead the driver's record/reputation is checked","It became mandatory for all of Switzerland","It must be repeated every year","It replaced the ARV2 theory exam"]},it:{q:"Cosa è successo all'esame di conoscenza locale (Ortskundeprüfung) con la legge cantonale zurighese sui taxi?",a:["È stato abolito; al suo posto viene verificata la buona reputazione del conducente","È diventato obbligatorio per tutta la Svizzera","Deve essere ripetuto ogni anno","Ha sostituito l'esame di teoria OLR2"]}},
{s:11,en:{q:"Which reputation requirement applies to taxi drivers in the Canton of Zurich?",a:["In the past 5 years they must not have been repeatedly convicted of offences connected with practising the taxi trade","They must never have had a parking fine","They must present a university certificate","There is no reputation requirement"]},it:{q:"Quale requisito di buona reputazione si applica ai tassisti nel Canton Zurigo?",a:["Negli ultimi 5 anni non devono essere stati ripetutamente condannati per infrazioni legate all'esercizio della professione di tassista","Non devono mai aver avuto una multa per parcheggio","Devono presentare un certificato universitario","Non esiste alcun requisito di reputazione"]}},
{s:11,en:{q:"How is the official ARV2 additional theory exam (B121) structured at the road traffic office?",a:["30 multiple-choice questions on the computer in 45 minutes, with a maximum of 3 errors allowed","100 questions in 2 hours, no errors allowed","10 oral questions","A written essay about traffic rules"]},it:{q:"Come è strutturato l'esame di teoria supplementare ufficiale OLR2 (B121) presso l'ufficio della circolazione?",a:["30 domande a scelta multipla al computer in 45 minuti, con al massimo 3 errori ammessi","100 domande in 2 ore, nessun errore ammesso","10 domande orali","Un tema scritto sulle norme di circolazione"]}},
{s:11,en:{q:"In which languages can the official ARV2 theory exam be taken?",a:["German, French or Italian","Only German","Any language with an interpreter","Only English"]},it:{q:"In quali lingue si può sostenere l'esame di teoria ufficiale OLR2?",a:["Tedesco, francese o italiano","Solo tedesco","Qualsiasi lingua con un interprete","Solo inglese"]}},
{s:11,en:{q:"After the cantonal reform, what does the City of Zurich itself still regulate?",a:["Public taxi stands (allocation of stand permits) and any release of bus lanes","The ARV2 theory exam","Medical examinations","The price of fuel"]},it:{q:"Dopo la riforma cantonale, cosa continua a regolare la Città di Zurigo?",a:["I posteggi pubblici per taxi (assegnazione dei permessi di posteggio) e l'eventuale apertura delle corsie dei bus","L'esame di teoria OLR2","Le visite mediche","Il prezzo del carburante"]}}

let view = 'start';    // start | exam | results

const LETTERS = ['a','b','c','d'];
const $ = id => document.getElementById(id);

function shuffled(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function setLang(l){
  lang = l;
  localStorage.setItem('b121lang', l);
  render();
}

function startExam(){
  perms = Q.map(()=>shuffled([0,1,2,3]));
  answers = Q.map(()=>null);
  cur = 0;
  view = 'exam';
  render();
  window.scrollTo(0,0);
}

function choose(orig){
  answers[cur] = orig;
  render();
}

function nav(d){
  cur = Math.min(Q.length-1, Math.max(0, cur+d));
  render();
  window.scrollTo(0,0);
}

function goto(i){ cur = i; render(); window.scrollTo(0,0); }

function finishExam(){
  const un = answers.filter(a=>a===null).length;
  if(un>0 && !confirm(UI[lang].confirmUnanswered(un))) return;
  view = 'results';
  render();
  window.scrollTo(0,0);
}

function restart(){
  view = 'start';
  render();
  window.scrollTo(0,0);
}

function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ---------- Render ---------- */
function render(){
  const t = UI[lang];
  $('lang-en').classList.toggle('active', lang==='en');
  $('lang-it').classList.toggle('active', lang==='it');
  $('hd-title').textContent = t.title;
  $('hd-sub').textContent = t.sub;
  $('ft').textContent = t.ft;

  $('start').style.display   = view==='start'   ? '' : 'none';
  $('exam').style.display    = view==='exam'    ? '' : 'none';
  $('results').style.display = view==='results' ? '' : 'none';

  if(view==='start'){
    $('st-h').textContent = t.stH;
    $('st-p1').textContent = t.stP1;
    $('st-p2').textContent = t.stP2(Q.length);
    $('st-nq').textContent = Q.length;
    $('st-ns').textContent = SECTIONS.length;
    $('st-mq').textContent = t.stMQ;
    $('st-ms').textContent = t.stMS;
    $('st-ml').textContent = t.stML;
    $('st-go').textContent = t.stGo;
  }
  else if(view==='exam'){
    const q = Q[cur], perm = perms[cur];
    $('ex-count').textContent = t.count(cur+1, Q.length);
    $('ex-finish').textContent = t.finish;
    $('ex-bar').style.width = ((answers.filter(a=>a!==null).length)/Q.length*100)+'%';
    $('ex-sec').textContent = SECTIONS[q.s][lang];
    $('ex-q').textContent = q[lang].q;

    $('ex-opts').innerHTML = perm.map((orig,pos)=>
      `<button class="opt${answers[cur]===orig?' selected':''}" onclick="choose(${orig})">`+
      `<span class="letter">${LETTERS[pos]}</span><span>${esc(q[lang].a[orig])}</span></button>`
    ).join('');

    $('ex-prev').textContent = t.prev;
    $('ex-prev').disabled = cur===0;
    $('ex-next').textContent = t.next;
    $('ex-next').disabled = cur===Q.length-1;

    $('ex-grid').innerHTML = Q.map((_,i)=>
      `<button class="${answers[i]!==null?'answered':''}${i===cur?' current':''}" onclick="goto(${i})">${i+1}</button>`
    ).join('');
  }
  else if(view==='results'){
    const correct = answers.filter(a=>a===0).length;
    const pct = Math.round(correct/Q.length*100);
    $('rs-pct').textContent = pct+'%';
    $('rs-pct').style.color = pct>=90 ? 'var(--good)' : pct>=70 ? 'var(--warn)' : 'var(--bad)';
    $('rs-sub').innerHTML = t.rsSub(correct, Q.length);
    $('rs-again').textContent = t.rsAgain;
    $('rs-revh').textContent = t.rsRevH;

    $('rs-secs').innerHTML = SECTIONS.map((sec,si)=>{
      const idx = Q.map((q,i)=>({q,i})).filter(x=>x.q.s===si);
      const c = idx.filter(x=>answers[x.i]===0).length;
      return `<div class="secstat"><span class="name">${esc(sec[lang])}</span>`+
        `<span class="bar"><i style="width:${idx.length?c/idx.length*100:0}%"></i></span>`+
        `<span class="num">${c}/${idx.length}</span></div>`;
    }).join('');

    $('rs-review').innerHTML = Q.map((q,i)=>{
      const perm = perms[i], user = answers[i];
      const opts = perm.map((orig,pos)=>{
        let cls = 'opt';
        if(orig===0) cls += ' correct';
        else if(orig===user) cls += ' wrong';
        return `<div class="${cls}"><span class="letter">${LETTERS[pos]}</span><span>${esc(q[lang].a[orig])}</span></div>`;
      }).join('');
      const note = user===null ? `<div style="color:var(--warn); font-size:.8rem; margin-top:8px;">⚠ ${t.notAnswered}</div>` : '';
      return `<div class="review-item">`+
        `<span class="section-tag">${esc(SECTIONS[q.s][lang])}</span>`+
        `<div class="qtext">${i+1}. ${esc(q[lang].q)}</div>`+
        `<div class="opts">${opts}</div>${note}</div>`;
    }).join('');
  }
}

render();
</script>
</body>
</html>
