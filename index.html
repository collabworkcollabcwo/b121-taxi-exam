{en:{q:"A taxi is a light motor vehicle up to 3,500 kg with a maximum of how many PASSENGER seats (NOT counting the driver) under the ARV2?",a:["8 passenger seats","16 passenger seats","4 passenger seats","12 passenger seats"]},it:{q:"Un taxi è un veicolo leggero fino a 3'500 kg con al massimo quanti posti PER PASSEGGERI (SENZA contare il conducente) secondo l'OLR2?",a:["8 posti passeggeri","16 posti passeggeri","4 posti passeggeri","12 posti passeggeri"]},x:{en:"8 passenger seats + 1 driver = 9 seats in total. Both numbers describe the same vehicle limit — read carefully whether the driver is counted.",it:"8 posti passeggeri + 1 conducente = 9 posti in totale. Entrambi i numeri descrivono lo stesso limite del veicolo — leggi attentamente se il conducente è contato."}},
{en:{q:"What is the legal reference number of the ARV2?",a:["SR 822.222","SR 741.01","SR 822.221","SR 741.51"]},it:{q:"Qual è il numero di riferimento legale dell'OLR2?",a:["RS 822.222","RS 741.01","RS 822.221","RS 741.51"]}},
{en:{q:"How is \"driving time\" (Lenkzeit) defined?",a:["The time during which the vehicle is actually in motion (pure driving)","The whole working day including all breaks and pauses","The time spent on duty waiting for customers","The time from leaving home until returning home"]},it:{q:"Come è definito il \"tempo di guida\" (Lenkzeit)?",a:["Il tempo durante il quale il veicolo è effettivamente in movimento (guida vera e propria)","L'intera giornata lavorativa dall'inizio alla fine, comprese tutte le pause e le attese","Il tempo trascorso in servizio in attesa dei clienti ai posteggi taxi (tempo di attesa)","Il tempo da quando il conducente esce di casa fino al momento del rientro a casa"]}},
{en:{q:"What does \"working time\" (Arbeitszeit) include?",a:["Driving time plus all other work-related activity","All work-related activity except the driving time","Driving time plus breaks, but not the waiting time","Driving time plus the daily rest period"]},it:{q:"Cosa comprende il \"tempo di lavoro\" (Arbeitszeit)?",a:["Il tempo di guida più ogni altra attività lavorativa","Ogni attività lavorativa escluso il tempo di guida","Il tempo di guida più le pause, ma senza il tempo di attesa","Il tempo di guida più il periodo di riposo giornaliero"]}},
{en:{q:"Interruptions or short pauses of less than 15 minutes are counted as...",a:["Working time","Rest time","A driving break","Standby time"]},it:{q:"Le interruzioni o brevi pause di meno di 15 minuti sono considerate come...",a:["Tempo di lavoro","Tempo di riposo","Una pausa di guida","Tempo di disponibilità"]}},
{en:{q:"For a self-employed driver, what counts as \"professional activity\" for the rules?",a:["The driving time","The entire working time including waiting","The driving time plus the work breaks","The waiting time at taxi ranks only"]},it:{q:"Per un conducente indipendente, cosa conta come \"attività professionale\" ai fini delle regole?",a:["Il tempo di guida","L'intero tempo di lavoro compresa l'attesa","Il tempo di guida più le pause di lavoro","Solo il tempo di attesa ai posteggi taxi"]}},
{en:{q:"A vehicle may be used for professional passenger transport only if...",a:["It is marked/entered for professional passenger transport in the vehicle registration document","It is equipped with a taximeter approved by the enforcement authority","It has passed an inspection at the road traffic office within the last 12 months","It is registered in the name of a licensed taxi business"]},it:{q:"Un veicolo può essere impiegato per il trasporto professionale di persone solo se...",a:["È annotato/iscritto per il trasporto professionale di persone nella licenza di circolazione","È dotato di un tassametro approvato dall'autorità di esecuzione","Ha superato un controllo all'ufficio della circolazione negli ultimi 12 mesi","È immatricolato a nome di un'azienda di taxi autorizzata"]}},
{en:{q:"What is the maximum daily DRIVING time between two consecutive daily rest periods?",a:["9 hours","10 hours","8 hours","12 hours"]},it:{q:"Qual è il tempo massimo DI GUIDA giornaliero tra due periodi di riposo giornaliero consecutivi?",a:["9 ore","10 ore","8 ore","12 ore"]},x:{en:"Driving time = only the time at the wheel: max 9 h per day and 45 h per week. The working day may be longer, because waiting and other work are not driving time.",it:"Tempo di guida = solo il tempo al volante: max 9 ore al giorno e 45 ore a settimana. La giornata lavorativa può essere più lunga, perché attesa e altri lavori non sono tempo di guida."}},
{en:{q:"What is the maximum DRIVING time (Lenkzeit) within one week?",a:["45 hours","56 hours","48 hours","53 hours"]},it:{q:"Qual è il tempo massimo DI GUIDA (Lenkzeit) in una settimana?",a:["45 ore","56 ore","48 ore","53 ore"]},x:{en:"Do not confuse: DRIVING time (Lenkzeit) is limited to 45 h per week and 9 h per day. WORKING time (Arbeitszeit) is a different limit: 53 h per week in taxi businesses, 48 h outside.",it:"Non confondere: il tempo DI GUIDA (Lenkzeit) è limitato a 45 ore a settimana e 9 ore al giorno. Il tempo DI LAVORO (Arbeitszeit) è un limite diverso: 53 ore a settimana nelle aziende di taxi, 48 ore al di fuori."}},
{en:{q:"May the daily and weekly maximum driving times be exceeded when doing overtime?",a:["No, they may never be exceeded, not even with overtime","Yes, by up to 2 hours per day if compensated later","Yes, if the employer approves the overtime in writing","Yes, at most once per week for pre-booked trips"]},it:{q:"I tempi massimi di guida giornalieri e settimanali possono essere superati facendo straordinari?",a:["No, non possono mai essere superati, nemmeno con lo straordinario","Sì, fino a 2 ore al giorno se compensate in seguito","Sì, se il datore di lavoro approva lo straordinario per iscritto","Sì, al massimo una volta a settimana per corse prenotate"]}},
{en:{q:"Which activity always counts fully as driving time?",a:["Every period in which the vehicle is moving in traffic","Waiting at a taxi rank while ready to depart","Cleaning and refuelling the vehicle between trips","Filling in the work book at the end of the shift"]},it:{q:"Quale attività conta sempre interamente come tempo di guida?",a:["Ogni periodo in cui il veicolo è in movimento nel traffico","L'attesa a un posteggio taxi pronti a partire","La pulizia e il rifornimento del veicolo tra le corse","La compilazione del libretto di lavoro a fine turno"]}},
{en:{q:"A self-employed taxi driver has already driven 9 hours today. What may he still do today?",a:["No more driving under the ARV2 until after a daily rest","Drive up to 2 more hours after a 45-minute break","Drive 1 more hour if the trip was booked in advance","Keep driving as long as he does not feel tired"]},it:{q:"Un tassista indipendente ha già guidato 9 ore oggi. Cosa può ancora fare oggi?",a:["Nessun'altra guida secondo l'OLR2 fino a dopo un riposo giornaliero","Guidare fino a 2 ore in più dopo una pausa di 45 minuti","Guidare 1 ora in più se la corsa era prenotata in anticipo","Continuare a guidare finché non si sente stanco"]}},
{en:{q:"The driving-time limits of the ARV2 exist mainly to...",a:["Ensure road safety by preventing driver fatigue","Reduce traffic congestion in the city centres","Guarantee equal earnings among taxi businesses","Limit the number of taxis operating in a city"]},it:{q:"I limiti del tempo di guida dell'OLR2 esistono principalmente per...",a:["Garantire la sicurezza stradale evitando la stanchezza del conducente","Ridurre la congestione del traffico nei centri urbani","Garantire guadagni equi tra le aziende di taxi","Limitare il numero di taxi attivi in una città"]}},
{en:{q:"After how much continuous driving time must a DRIVING break of at least 45 minutes be taken?",a:["After 4½ hours of driving","After 5½ hours of driving","After 3½ hours of driving","After 6½ hours of driving"]},it:{q:"Dopo quanto tempo di guida continuativa deve essere effettuata una pausa DI GUIDA di almeno 45 minuti?",a:["Dopo 4 ore e mezza di guida","Dopo 5 ore e mezza di guida","Dopo 3 ore e mezza di guida","Dopo 6 ore e mezza di guida"]},x:{en:"DRIVING break: 45 min after 4½ h of driving. Do not confuse with the WORK break: at the latest after 5½ h of working time.",it:"Pausa DI GUIDA: 45 minuti dopo 4 ore e mezza di guida. Non confondere con la pausa DI LAVORO: al più tardi dopo 5 ore e mezza di lavoro."}},
{en:{q:"If the break is placed BEFORE 4½ hours of driving elapse, what is sufficient?",a:["One break of 30 minutes, or two breaks of 20 minutes each","One break of 20 minutes, or two breaks of 15 minutes each","One break of 15 minutes, or two breaks of 10 minutes each","One break of 45 minutes taken in a single block"]},it:{q:"Se la pausa è collocata PRIMA che siano trascorse 4 ore e mezza di guida, cosa è sufficiente?",a:["Una pausa di 30 minuti, oppure due pause di 20 minuti ciascuna","Una pausa di 20 minuti, oppure due pause di 15 minuti ciascuna","Una pausa di 15 minuti, oppure due pause di 10 minuti ciascuna","Una pausa di 45 minuti presa in un unico blocco"]}},
{en:{q:"What may the driver NOT do during a driving break?",a:["Drive a vehicle","Have a coffee","Rest in the car","Read a newspaper"]},it:{q:"Cosa NON può fare il conducente durante una pausa di guida?",a:["Guidare un veicolo","Bere un caffè","Riposare in auto","Leggere un giornale"]}},
{en:{q:"When is the 45-minute driving break not required after 4½ hours?",a:["If a daily or weekly rest begins immediately afterwards","If the total driving time of the day stays under 9 hours","If the driver takes the break within the following hour","If the next customer has already been confirmed"]},it:{q:"Quando la pausa di guida di 45 minuti non è richiesta dopo 4 ore e mezza?",a:["Se subito dopo inizia un riposo giornaliero o settimanale","Se il tempo di guida totale del giorno resta sotto le 9 ore","Se il conducente effettua la pausa entro l'ora successiva","Se il prossimo cliente è già stato confermato"]}},
{en:{q:"A driver takes his break as two separate parts before 4½ h of driving. Each part must be at least...",a:["20 minutes","10 minutes","5 minutes","45 minutes"]},it:{q:"Un conducente fraziona la pausa in due parti prima di 4 ore e mezza di guida. Ogni parte deve durare almeno...",a:["20 minuti","10 minuti","5 minuti","45 minuti"]}},
{en:{q:"The purpose of the driving break is primarily to...",a:["Counter fatigue and keep the driver alert","Give time to clean and refuel the taxi","Allow the taximeter to be reset between trips","Give the employer time to check the vehicle"]},it:{q:"Lo scopo della pausa di guida è principalmente quello di...",a:["Contrastare la stanchezza e mantenere il conducente vigile","Dare tempo per pulire e rifornire il taxi","Permettere il reset del tassametro tra le corse","Dare tempo al datore di lavoro di controllare il veicolo"]}},
{en:{q:"What is the maximum weekly WORKING time (Arbeitszeit) for an EMPLOYED driver in a taxi business?",a:["53 hours","45 hours","48 hours","60 hours"]},it:{q:"Qual è il tempo DI LAVORO settimanale massimo (Arbeitszeit) per un conducente DIPENDENTE in un'azienda di taxi?",a:["53 ore","45 ore","48 ore","60 ore"]},x:{en:"Working time includes driving plus all other work: 53 h/week in taxi businesses, 48 h/week outside. Driving alone is limited separately to 45 h/week.",it:"Il tempo di lavoro comprende la guida più ogni altro lavoro: 53 ore/settimana nelle aziende di taxi, 48 ore/settimana al di fuori. La sola guida è limitata separatamente a 45 ore/settimana."}},
{en:{q:"OUTSIDE taxi businesses, the maximum weekly WORKING time for an employed driver is...",a:["48 hours","53 hours","56 hours","40 hours"]},it:{q:"AL DI FUORI delle aziende di taxi, il tempo DI LAVORO settimanale massimo per un conducente dipendente è...",a:["48 ore","53 ore","56 ore","40 ore"]},x:{en:"48 h/week outside taxi businesses; 53 h/week inside taxi businesses; weekly DRIVING time is limited separately to 45 h.",it:"48 ore/settimana al di fuori delle aziende di taxi; 53 ore/settimana nelle aziende di taxi; il tempo DI GUIDA settimanale è limitato separatamente a 45 ore."}},
{en:{q:"For a SELF-EMPLOYED driver, the working time is...",a:["Not limited by the ARV2 (but driving time, breaks and rest still apply)","Limited to 53 hours per week, like for employed drivers","Limited to 48 hours per week including the waiting time","Not regulated at all, not even driving time and rest"]},it:{q:"Per un conducente INDIPENDENTE, il tempo di lavoro è...",a:["Non limitato dall'OLR2 (ma restano validi tempo di guida, pause e riposo)","Limitato a 53 ore a settimana, come per i conducenti dipendenti","Limitato a 48 ore a settimana compreso il tempo di attesa","Non regolato affatto, nemmeno tempo di guida e riposo"]}},
{en:{q:"At the latest after how much working time must an employed driver take a WORK break (Arbeitspause)?",a:["After 5½ hours of working time","After 8 hours of working time","After 4½ hours of working time","After 7 hours of working time"]},it:{q:"Al più tardi dopo quanto tempo di lavoro un conducente dipendente deve fare una pausa DI LAVORO (Arbeitspause)?",a:["Dopo 5 ore e mezza di lavoro","Dopo 8 ore di lavoro","Dopo 4 ore e mezza di lavoro","Dopo 7 ore di lavoro"]},x:{en:"WORK break: at the latest after 5½ h of working time. Do not confuse with the DRIVING break: 45 min after 4½ h of driving.",it:"Pausa DI LAVORO: al più tardi dopo 5 ore e mezza di lavoro. Non confondere con la pausa DI GUIDA: 45 minuti dopo 4 ore e mezza di guida."}},
{en:{q:"For a daily working time of UP TO 7 hours, the minimum work break is...",a:["20 minutes","30 minutes","45 minutes","60 minutes"]},it:{q:"Per un tempo di lavoro giornaliero FINO A 7 ore, la pausa lavorativa minima è di...",a:["20 minuti","30 minuti","45 minuti","60 minuti"]},x:{en:"Work breaks by daily working time: up to 7 h → at least 20 min; over 7 and up to 9 h → 30 min or 2×20 min; over 9 h → 1 h, or 2×30, or 3×20. No part may be shorter than 20 minutes, and there may never be more than 5½ h of working time without a break.",it:"Pause di lavoro secondo il tempo di lavoro giornaliero: fino a 7 ore → almeno 20 min; oltre 7 e fino a 9 ore → 30 min oppure 2×20 min; oltre 9 ore → 1 ora, oppure 2×30, oppure 3×20. Nessuna parte può durare meno di 20 minuti e non ci possono mai essere più di 5 ore e mezza di lavoro senza pausa."}},
{en:{q:"For a daily working time of MORE THAN 9 hours, the work break must be...",a:["1 hour, or 2×30 minutes, or 3×20 minutes","45 minutes, or 2×25 minutes, or 3×15 minutes","30 minutes, or 2×15 minutes, or 3×10 minutes","20 minutes taken in one single block"]},it:{q:"Per un tempo di lavoro giornaliero SUPERIORE a 9 ore, la pausa lavorativa deve essere di...",a:["1 ora, oppure 2×30 minuti, oppure 3×20 minuti","45 minuti, oppure 2×25 minuti, oppure 3×15 minuti","30 minuti, oppure 2×15 minuti, oppure 3×10 minuti","20 minuti presi in un unico blocco"]},x:{en:"Work breaks by daily working time: up to 7 h → at least 20 min; over 7 and up to 9 h → 30 min or 2×20 min; over 9 h → 1 h, or 2×30, or 3×20. No part may be shorter than 20 minutes, and there may never be more than 5½ h of working time without a break.",it:"Pause di lavoro secondo il tempo di lavoro giornaliero: fino a 7 ore → almeno 20 min; oltre 7 e fino a 9 ore → 30 min oppure 2×20 min; oltre 9 ore → 1 ora, oppure 2×30, oppure 3×20. Nessuna parte può durare meno di 20 minuti e non ci possono mai essere più di 5 ore e mezza di lavoro senza pausa."}},
{en:{q:"Regular overtime work is limited to how many hours per week?",a:["4 hours per week","10 hours per week","8 hours per week","2 hours per week"]},it:{q:"Il lavoro straordinario ordinario è limitato a quante ore a settimana?",a:["4 ore a settimana","10 ore a settimana","8 ore a settimana","2 ore a settimana"]},x:{en:"Regular overtime: max 4 h per week above the maximum weekly working time. Only for temporary, exceptional needs are 2 further hours allowed. Yearly cap: 208 h.",it:"Straordinario ordinario: max 4 ore a settimana oltre il tempo di lavoro settimanale massimo. Solo per esigenze straordinarie temporanee sono ammesse altre 2 ore. Tetto annuo: 208 ore."}},
{en:{q:"Overtime work per calendar year may not exceed...",a:["208 hours","300 hours","150 hours","100 hours"]},it:{q:"Il lavoro straordinario per anno civile non può superare...",a:["208 ore","300 ore","150 ore","100 ore"]},x:{en:"208 h per calendar year = 52 weeks × 4 h of regular weekly overtime.",it:"208 ore per anno civile = 52 settimane × 4 ore di straordinario settimanale ordinario."}},
{en:{q:"What is the regular minimum daily rest period?",a:["11 consecutive hours","9 consecutive hours","8 consecutive hours","12 consecutive hours"]},it:{q:"Qual è il riposo giornaliero minimo ordinario?",a:["11 ore consecutive","9 ore consecutive","8 ore consecutive","12 ore consecutive"]},x:{en:"Regular daily rest: 11 consecutive hours; may be reduced to 9 h up to 3× per week without compensation.",it:"Riposo giornaliero ordinario: 11 ore consecutive; riducibile a 9 ore fino a 3 volte a settimana senza recupero."}},
{en:{q:"The daily rest may be reduced to 9 hours at most how many times per week?",a:["3 times per week","1 time per week","5 times per week","It may never be reduced"]},it:{q:"Il riposo giornaliero può essere ridotto a 9 ore al massimo quante volte a settimana?",a:["3 volte a settimana","1 volta a settimana","5 volte a settimana","Non può mai essere ridotto"]},x:{en:"The 11-hour daily rest may be reduced to 9 hours up to 3 times per week — and the reduction does not have to be compensated.",it:"Il riposo giornaliero di 11 ore può essere ridotto a 9 ore fino a 3 volte a settimana — e la riduzione non deve essere recuperata."}},
{en:{q:"Does a reduced (9-hour) daily rest have to be compensated later?",a:["No, a reduced daily rest does not have to be compensated","Yes, before the end of the following week","Yes, attached to another rest of at least 8 hours","Yes, but only in the case of employed drivers"]},it:{q:"Un riposo giornaliero ridotto (9 ore) deve essere recuperato in seguito?",a:["No, un riposo giornaliero ridotto non deve essere recuperato","Sì, entro la fine della settimana successiva","Sì, unito a un altro riposo di almeno 8 ore","Sì, ma solo nel caso dei conducenti dipendenti"]},x:{en:"No. Reducing the daily rest to 9 h (allowed up to 3× per week) requires no later compensation under the ARV2.",it:"No. La riduzione del riposo giornaliero a 9 ore (ammessa fino a 3 volte a settimana) non richiede alcun recupero secondo l'OLR2."}},
{en:{q:"At any moment of professional activity, how much of the previous 24 hours must have been consecutive rest?",a:["11 hours","8 hours","6 hours","24 hours"]},it:{q:"In ogni momento dell'attività professionale, quanta parte delle 24 ore precedenti deve essere stata riposo consecutivo?",a:["11 ore","8 ore","6 ore","24 ore"]}},
{en:{q:"If the daily rest is split within 24 hours, how many parts are allowed and how long must one part be?",a:["Up to 3 parts: one part of at least 8 hours, no part under 1 hour, and at least 12 hours in total","Up to 3 parts: one part of at least 6 hours, no part under 30 minutes, at least 10 hours in total","Up to 2 parts: one part of at least 9 hours, no part under 2 hours, at least 11 hours in total","Up to 4 parts: each part of at least 3 hours, and at least 12 hours in total"]},it:{q:"Se il riposo giornaliero è frazionato nelle 24 ore, quante parti sono ammesse e quanto deve durare una parte?",a:["Fino a 3 parti: una parte di almeno 8 ore, nessuna parte sotto 1 ora, e in totale almeno 12 ore","Fino a 3 parti: una parte di almeno 6 ore, nessuna parte sotto 30 minuti, in totale almeno 10 ore","Fino a 2 parti: una parte di almeno 9 ore, nessuna parte sotto 2 ore, in totale almeno 11 ore","Fino a 4 parti: ogni parte di almeno 3 ore, e in totale almeno 12 ore"]},x:{en:"Splitting the daily rest: at most 3 parts; one part at least 8 hours; no part under 1 hour; the total must reach at least 12 hours.",it:"Frazionamento del riposo giornaliero: al massimo 3 parti; una parte di almeno 8 ore; nessuna parte sotto 1 ora; il totale deve raggiungere almeno 12 ore."}},
{en:{q:"Rest time may be replaced by a payment (money) instead of actually being taken.",a:["False – rest may not be replaced by money (compensation ban)","True – if the driver agrees to the payment in writing","True – but only in the case of self-employed drivers","True – for at most 4 hours of rest time per week"]},it:{q:"Il tempo di riposo può essere sostituito da un pagamento (denaro) invece di essere effettivamente goduto.",a:["Falso – il riposo non può essere sostituito con denaro (divieto di indennizzo)","Vero – se il conducente acconsente al pagamento per iscritto","Vero – ma solo nel caso dei conducenti indipendenti","Vero – per al massimo 4 ore di riposo a settimana"]},x:{en:"Daily rest, the weekly rest day and the free half-day may never be paid out in money – the only exception is when the employment relationship ends.",it:"Il riposo giornaliero, il giorno di riposo settimanale e la mezza giornata libera non possono mai essere pagati in denaro – l'unica eccezione è quando il rapporto di lavoro termina."}},
{en:{q:"An EMPLOYED driver must have a weekly rest day of at least...",a:["24 consecutive hours","12 consecutive hours","48 consecutive hours","8 consecutive hours"]},it:{q:"Un conducente DIPENDENTE deve avere un giorno di riposo settimanale di almeno...",a:["24 ore consecutive","12 ore consecutive","48 ore consecutive","8 ore consecutive"]}},
{en:{q:"A SELF-EMPLOYED driver must, within two weeks, take how many rest days?",a:["Two rest days of at least 24 consecutive hours each","One rest day of at least 24 consecutive hours","Two rest days of at least 12 consecutive hours each","Four rest days of at least 8 consecutive hours each"]},it:{q:"Un conducente INDIPENDENTE deve, nell'arco di due settimane, prendere quanti giorni di riposo?",a:["Due giorni di riposo di almeno 24 ore consecutive ciascuno","Un giorno di riposo di almeno 24 ore consecutive","Due giorni di riposo di almeno 12 ore consecutive ciascuno","Quattro giorni di riposo di almeno 8 ore consecutive ciascuno"]}},
{en:{q:"Between two rest days of a self-employed driver, at most how many days of professional activity may lie?",a:["12 days","6 days","14 days","8 days"]},it:{q:"Tra due giorni di riposo di un conducente indipendente, quanti giorni di attività professionale al massimo possono trascorrere?",a:["12 giorni","6 giorni","14 giorni","8 giorni"]}},
{en:{q:"The rest day counts as taken on a Sunday/holiday if at least how many of the 24 hours fall on it?",a:["18 hours","12 hours","24 hours","6 hours"]},it:{q:"Il giorno di riposo è considerato goduto in una domenica/festivo se almeno quante delle 24 ore vi cadono?",a:["18 ore","12 ore","24 ore","6 ore"]}},
{en:{q:"Who is entitled to a free half-day per week in addition to the weekly rest day?",a:["An employee whose work is spread over more than 5 mornings and afternoons of the week","An employee whose weekly working time regularly exceeds 45 hours","An employee who regularly works on Sundays and public holidays","Every employed driver, regardless of how the work is distributed"]},it:{q:"Chi ha diritto a una mezza giornata libera a settimana oltre al giorno di riposo settimanale?",a:["Un dipendente il cui lavoro è distribuito su più di 5 mattine e pomeriggi della settimana","Un dipendente il cui tempo di lavoro settimanale supera regolarmente le 45 ore","Un dipendente che lavora regolarmente la domenica e nei giorni festivi","Ogni conducente dipendente, indipendentemente da come è distribuito il lavoro"]}},
{en:{q:"The free half-day consists of 5 consecutive hours between which times?",a:["Between 07:00 and 18:00","Between 00:00 and 05:00","Between 18:00 and 23:00","Between 06:00 and 12:00"]},it:{q:"La mezza giornata libera consiste in 5 ore consecutive tra quali orari?",a:["Tra le 07:00 e le 18:00","Tra le 00:00 e le 05:00","Tra le 18:00 e le 23:00","Tra le 06:00 e le 12:00"]}},
{en:{q:"For an EMPLOYED taxi driver, time spent waiting for customers while available for the employer counts as...",a:["Working time","Rest time","A driving break","Free time"]},it:{q:"Per un tassista DIPENDENTE, il tempo trascorso in attesa dei clienti restando a disposizione del datore di lavoro conta come...",a:["Tempo di lavoro","Tempo di riposo","Una pausa di guida","Tempo libero"]}},
{en:{q:"Standby time (Bereitschaftszeit) is best described as...",a:["Time when the driver is not driving but must remain available to work","Time when the driver may leave the workplace and use the time freely","Time between two shifts that the driver spends at home","The statutory break after 4½ hours of driving"]},it:{q:"Il tempo di disponibilità (Bereitschaftszeit) è descritto meglio come...",a:["Tempo in cui il conducente non guida ma deve restare disponibile a lavorare","Tempo in cui il conducente può lasciare il posto di lavoro e disporre liberamente del tempo","Tempo tra due turni che il conducente trascorre a casa","La pausa obbligatoria dopo 4 ore e mezza di guida"]}},
{en:{q:"Why does waiting time matter for an employed driver's limits?",a:["Because it counts toward the maximum working time, not as rest","Because it counts as rest time and extends the working day","Because it counts as a driving break and replaces the 45 minutes","Because it is deducted from the daily driving time"]},it:{q:"Perché il tempo di attesa è rilevante per i limiti di un conducente dipendente?",a:["Perché conta ai fini del tempo di lavoro massimo, non come riposo","Perché conta come tempo di riposo e allunga la giornata lavorativa","Perché conta come pausa di guida e sostituisce i 45 minuti","Perché viene dedotto dal tempo di guida giornaliero"]}},
{en:{q:"A self-employed driver records his times in a...",a:["Work book (Arbeitsbuch)","Company logbook (Fahrtenbuch)","Weekly report (Wochenrapport)","Vehicle service booklet"]},it:{q:"Un conducente indipendente registra i suoi tempi in un...",a:["Libretto di lavoro (Arbeitsbuch)","Libro di bordo aziendale (Fahrtenbuch)","Rapporto settimanale (Wochenrapport)","Libretto di manutenzione del veicolo"]}},
{en:{q:"Before starting the trip, what must a self-employed driver enter in the work book?",a:["The consecutive rest before starting, the start time and the licence-plate number","The customer's name, the destination and the agreed fare","The odometer reading, the fuel level and the vehicle's condition","Only the date and the signature; everything else in the evening"]},it:{q:"Prima di iniziare la corsa, cosa deve annotare un conducente indipendente nel libretto di lavoro?",a:["Il riposo consecutivo prima dell'inizio, l'ora di inizio e il numero di targa","Il nome del cliente, la destinazione e la tariffa concordata","Il chilometraggio, il livello del carburante e lo stato del veicolo","Solo la data e la firma; tutto il resto alla sera"]}},
{en:{q:"At the end of the working day, what must the self-employed driver additionally record?",a:["The total driving time and the new odometer reading","The number of trips and the total fares collected","The weather conditions and the traffic situation","The names of all passengers transported that day"]},it:{q:"Alla fine della giornata lavorativa, cosa deve annotare in più il conducente indipendente?",a:["Il tempo di guida totale e il nuovo chilometraggio","Il numero di corse e l'incasso totale","Le condizioni meteo e la situazione del traffico","I nomi di tutti i passeggeri trasportati quel giorno"]}},
{en:{q:"What is the purpose of the driving/rest-time records?",a:["To allow the authorities to check compliance with the ARV2","To let the employer calculate the wages correctly","To provide statistics for the federal roads office","To document the fares charged to the customers"]},it:{q:"Qual è lo scopo delle registrazioni dei tempi di guida/riposo?",a:["Permettere alle autorità di verificare il rispetto dell'OLR2","Permettere al datore di lavoro di calcolare correttamente i salari","Fornire statistiche all'ufficio federale delle strade","Documentare le tariffe applicate ai clienti"]}},
{en:{q:"A digital tachograph or equivalent recording is used mainly to...",a:["Record driving, work and rest periods reliably","Record the route taken and the average speed","Record the fares and distances of each trip","Monitor the vehicle's fuel consumption"]},it:{q:"Un tachigrafo digitale o registrazione equivalente serve principalmente a...",a:["Registrare in modo affidabile i periodi di guida, lavoro e riposo","Registrare il percorso effettuato e la velocità media","Registrare le tariffe e le distanze di ogni corsa","Monitorare il consumo di carburante del veicolo"]}},
{en:{q:"Records of working, driving and rest time must be...",a:["Kept and made available for control","Archived by the canton for ten years","Handed over to the passengers on request","Destroyed as soon as the wages have been paid"]},it:{q:"Le registrazioni di tempo di lavoro, guida e riposo devono essere...",a:["Conservate e messe a disposizione per il controllo","Archiviate dal cantone per dieci anni","Consegnate ai passeggeri su richiesta","Distrutte non appena i salari sono stati pagati"]}},
{en:{q:"A key duty of the employer under the ARV2 is to...",a:["Monitor that working, driving and rest-time rules are respected","Pay any fines the drivers receive while on duty","Provide every driver with a personal vehicle","Check the taximeter tariffs every month"]},it:{q:"Un dovere fondamentale del datore di lavoro secondo l'OLR2 è...",a:["Vigilare sul rispetto delle norme su tempo di lavoro, guida e riposo","Pagare le multe ricevute dai conducenti in servizio","Fornire a ogni conducente un veicolo personale","Controllare ogni mese le tariffe del tassametro"]}},
{en:{q:"The employer's record (Aufstellung) of times must contain, among other things...",a:["Daily driving time, total daily/weekly working time and overtime","The routes driven and the customers served each day","The wages, tips and expenses of every driver","The fuel consumption and service intervals of the vehicles"]},it:{q:"Il registro (Aufstellung) dei tempi tenuto dal datore di lavoro deve contenere, tra l'altro...",a:["Tempo di guida giornaliero, tempo di lavoro totale giornaliero/settimanale e straordinari","I percorsi effettuati ogni giorno e l'elenco completo dei clienti serviti","I salari mensili, le mance e le spese di servizio di ogni singolo conducente","Il consumo di carburante e gli intervalli di manutenzione di tutti i veicoli"]}},
{en:{q:"Who is generally responsible for controlling compliance on the road and in businesses?",a:["The competent cantonal enforcement authority","The federal customs administration","The communal taxi commission","The accredited vehicle inspection centres"]},it:{q:"Chi è generalmente responsabile del controllo del rispetto delle norme su strada e nelle aziende?",a:["L'autorità cantonale di esecuzione competente","L'amministrazione federale delle dogane","La commissione comunale dei taxi","I centri accreditati di controllo dei veicoli"]}},
{en:{q:"What driving experience is normally required before obtaining the B121 (professional passenger transport)?",a:["At least 1 year of category B experience without licence withdrawal","At least 3 years of category B experience without any fines","At least 2 years of driving experience in any category","No minimum experience, but a completed driving course"]},it:{q:"Quale esperienza di guida è normalmente richiesta prima di ottenere il B121 (trasporto professionale di persone)?",a:["Almeno 1 anno di esperienza in categoria B senza revoca della licenza","Almeno 3 anni di esperienza in categoria B senza alcuna multa","Almeno 2 anni di esperienza di guida in qualsiasi categoria","Nessuna esperienza minima, ma un corso di guida completato"]}},
{en:{q:"Before registering, the candidate normally must pass a...",a:["Medical examination by an approved physician","Eye test at a recognised optician only","Psychological aptitude assessment","First-aid course taken within the last two years"]},it:{q:"Prima di iscriversi, il candidato deve normalmente superare una...",a:["Visita medica presso un medico riconosciuto","Solo esame della vista presso un ottico riconosciuto","Valutazione psicologica dell'idoneità","Corso di primo soccorso svolto negli ultimi due anni"]}},
{en:{q:"How often is the medical control examination repeated UP TO age 50?",a:["Every 5 years","Every year","Every 10 years","Only once"]},it:{q:"Ogni quanto viene ripetuta la visita medica di controllo FINO ai 50 anni?",a:["Ogni 5 anni","Ogni anno","Ogni 10 anni","Solo una volta"]},x:{en:"Up to age 50: every 5 years. After age 50: every 3 years.",it:"Fino ai 50 anni: ogni 5 anni. Dopo i 50 anni: ogni 3 anni."}},
{en:{q:"AFTER age 50, how often must the medical control examination be repeated?",a:["Every 3 years","Every 5 years","Every year","Never again"]},it:{q:"DOPO i 50 anni, ogni quanto deve essere ripetuta la visita medica di controllo?",a:["Ogni 3 anni","Ogni 5 anni","Ogni anno","Mai più"]},x:{en:"Up to age 50: every 5 years. After age 50: every 3 years.",it:"Fino ai 50 anni: ogni 5 anni. Dopo i 50 anni: ogni 3 anni."}},
{en:{q:"The B121 authorises professional passenger transport with vehicles up to how many seats IN TOTAL (driver INCLUDED)?",a:["9 seats (8 passengers + driver)","16 seats (15 passengers + driver)","20 seats (19 passengers + driver)","5 seats (4 passengers + driver)"]},it:{q:"Il B121 autorizza il trasporto professionale di persone con veicoli fino a quanti posti IN TOTALE (conducente INCLUSO)?",a:["9 posti (8 passeggeri + conducente)","16 posti (15 passeggeri + conducente)","20 posti (19 passeggeri + conducente)","5 posti (4 passeggeri + conducente)"]},x:{en:"8 passenger seats + 1 driver = 9 seats in total. Both numbers describe the same vehicle limit — read carefully whether the driver is counted.",it:"8 posti passeggeri + 1 conducente = 9 posti in totale. Entrambi i numeri descrivono lo stesso limite del veicolo — leggi attentamente se il conducente è contato."}},
{en:{q:"In addition to passing the B121 steps, a driver may also need, depending on the canton...",a:["A separate cantonal operating permit (local knowledge, local rules, language)","A federal passenger-transport concession issued by the FOT","Membership in the regional taxi association","A certificate of completed commercial training"]},it:{q:"Oltre a superare le tappe del B121, un conducente può inoltre necessitare, a seconda del cantone...",a:["Un'autorizzazione cantonale d'esercizio separata (conoscenze locali, regole locali, lingua)","Una concessione federale per il trasporto di persone rilasciata dall'UFT","L'adesione all'associazione regionale dei taxi","Un certificato di formazione commerciale completata"]}},
{en:{q:"While the driver is in or near the vehicle, how must the tachograph be handled during professional activity?",a:["It must be kept running continuously and operated so that driving, other work and breaks are recorded correctly","It must run only while passengers are on board and may be paused while waiting at the rank","It must be started at the beginning of the week and read out at the end of the week","It must run on night trips; daytime trips may be recorded in the work book instead"]},it:{q:"Mentre il conducente si trova nel veicolo o nelle sue vicinanze, come deve essere gestito il tachigrafo durante l'attività professionale?",a:["Deve essere tenuto costantemente in funzione e usato in modo che guida, altro lavoro e pause siano registrati correttamente","Deve funzionare solo con passeggeri a bordo e può essere fermato durante l'attesa al posteggio","Deve essere avviato all'inizio della settimana e letto alla fine della settimana","Deve funzionare nelle corse notturne; le corse diurne possono essere annotate nel libretto di lavoro"]}},
{en:{q:"Why must a self-employed taxi driver also operate the tachograph switch during professional activity?",a:["So that taxi trips and private trips can be distinguished on the record sheet","So that the taximeter and the tachograph always show the same totals","So that the employer can invoice the customers correctly","So that the authority can verify the routes that were driven"]},it:{q:"Perché un tassista indipendente deve azionare anche il selettore del tachigrafo durante l'attività professionale?",a:["Affinché sul foglio di registrazione si possano distinguere le corse in taxi dalle corse private","Affinché il tassametro e il tachigrafo mostrino sempre gli stessi totali","Affinché il datore di lavoro possa fatturare correttamente ai clienti","Affinché l'autorità possa verificare i percorsi effettuati"]}},
{en:{q:"During PRIVATE trips with the vehicle, the tachograph must...",a:["Keep running, set to the pause/rest position (\"0\" / chair symbol)","Be switched off, because private trips are not recorded","Be set to the driving position, exactly like on professional trips","Be sealed by the employer until the next professional trip"]},it:{q:"Durante le corse PRIVATE con il veicolo, il tachigrafo deve...",a:["Restare in funzione, impostato sulla posizione di pausa/riposo (\"0\" / simbolo della sedia)","Essere spento, perché le corse private non vengono registrate","Essere impostato sulla posizione di guida, esattamente come nelle corse professionali","Essere sigillato dal datore di lavoro fino alla prossima corsa professionale"]}},
{en:{q:"How many record sheets (Einlageblätter) may be used per vehicle and per day?",a:["Only one record sheet per vehicle per day, and each sheet may be used only once","One record sheet per driver per week, used again each day","A new record sheet for every single trip that is carried out","Two record sheets per day: one for the day, one for the night"]},it:{q:"Quanti fogli di registrazione (Einlageblätter) si possono usare per veicolo e per giorno?",a:["Un solo foglio di registrazione per veicolo al giorno, e ogni foglio può essere usato una sola volta","Un foglio di registrazione per conducente a settimana, riutilizzato ogni giorno","Un nuovo foglio di registrazione per ogni singola corsa effettuata","Due fogli di registrazione al giorno: uno per il giorno, uno per la notte"]}},
{en:{q:"Which record sheets must be carried on the vehicle?",a:["Enough blank sheets matching the tachograph and, if the previous day was a working day, that day's completed sheet (or a copy)","All completed record sheets of the current calendar month in the original, together with enough blank sheets for one week","Only enough blank sheets for the current day; all used sheets must remain at the business premises of the employer","The completed sheets of the last three months sorted by date, but no blank sheets, as these are kept by the employer"]},it:{q:"Quali fogli di registrazione devono essere presenti sul veicolo?",a:["Un numero sufficiente di fogli vergini adatti al tachigrafo e, se il giorno precedente era lavorativo, il foglio compilato di quel giorno (o una copia)","Tutti i fogli di registrazione compilati del mese civile in corso in originale, insieme a fogli vergini sufficienti per una settimana","Solo fogli vergini sufficienti per il giorno corrente; tutti i fogli usati devono restare presso la sede del datore di lavoro","I fogli compilati degli ultimi tre mesi ordinati per data, ma nessun foglio vergine, poiché questi restano al datore di lavoro"]}},
{en:{q:"At a roadside check with a digital tachograph, the driver must be able to present...",a:["The driver card and the records of the current day and the previous 28 days","The driver card and the records of the current week only","The records of the previous 7 days, without the driver card","Only the driver card; the records can be shown later at the office"]},it:{q:"A un controllo stradale con tachigrafo digitale, il conducente deve poter presentare...",a:["La carta del conducente e le registrazioni del giorno corrente e dei 28 giorni precedenti","La carta del conducente e le registrazioni solo della settimana corrente","Le registrazioni dei 7 giorni precedenti, senza la carta del conducente","Solo la carta del conducente; le registrazioni possono essere mostrate più tardi in ufficio"]},x:{en:"Analog tachograph: present the sheets of the current week + the last day of the previous week driven. Digital tachograph: driver card with the current day + the previous 28 days. Used sheets go to the employer, who keeps them at least 2 years.",it:"Tachigrafo analogico: presentare i dischi della settimana in corso + l'ultimo giorno di guida della settimana precedente. Tachigrafo digitale: carta del conducente con il giorno corrente + i 28 giorni precedenti. I dischi usati vanno al datore di lavoro, che li conserva per almeno 2 anni."}},
{en:{q:"What must the driver do if the vehicle's tachograph is defective?",a:["Fill in the daily sheets of the work book until the tachograph is repaired","Note the times on a separate sheet of paper and transfer them later","Continue driving normally; the repair can wait until the next service","Stop all professional trips immediately until it has been repaired"]},it:{q:"Cosa deve fare il conducente se il tachigrafo del veicolo è difettoso?",a:["Compilare i fogli giornalieri del libretto di lavoro finché il tachigrafo non viene riparato","Annotare i tempi su un foglio separato e trasferirli in seguito","Continuare a guidare normalmente; la riparazione può attendere il prossimo servizio","Fermare subito tutte le corse professionali finché non è stato riparato"]}},
{en:{q:"What are the driver's duties regarding the work book during trips?",a:["Carry it along, present it to the enforcement authority on request and fill it in legibly and indelibly","Keep it at the business premises and bring it up to date at the end of each week","Carry a copy with him; the original always remains with the employer","Fill it in with pencil so that corrections remain possible at any time"]},it:{q:"Quali sono i doveri del conducente riguardo al libretto di lavoro durante le corse?",a:["Portarlo con sé, presentarlo all'autorità di esecuzione su richiesta e compilarlo in modo leggibile e indelebile","Tenerlo presso la sede aziendale del datore di lavoro e aggiornarlo regolarmente alla fine di ogni settimana","Portare con sé soltanto una copia; l'originale resta sempre custodito presso il datore di lavoro","Compilarlo a matita in modo che eventuali correzioni restino possibili in qualsiasi momento"]}},
{en:{q:"A driver works for two different taxi companies. How many work books may he use at the same time?",a:["Only one work book – it is personal and not transferable","One work book per employer, kept strictly separate","Two work books: one original and one backup copy","None – in this case the employers keep the records"]},it:{q:"Un conducente lavora per due aziende di taxi diverse. Quanti libretti di lavoro può usare contemporaneamente?",a:["Un solo libretto di lavoro – è personale e non trasferibile","Un libretto di lavoro per ogni datore di lavoro, tenuti rigorosamente separati","Due libretti di lavoro: un originale e una copia di riserva","Nessuno – in questo caso le registrazioni le tengono i datori di lavoro"]}},
{en:{q:"In addition to the weekly sheet, when must the driver also fill in the daily sheets of the work book?",a:["When the tachograph is not working or the vehicle has already been driven by two drivers that day","On every working day without exception, in addition to the record sheets of the tachograph","Only when the enforcement authority has ordered it in writing for a limited period of time","Whenever the daily working time exceeds 9 hours or the weekly rest day has been postponed"]},it:{q:"Oltre al foglio settimanale, quando il conducente deve compilare anche i fogli giornalieri del libretto di lavoro?",a:["Quando il tachigrafo non funziona o il veicolo è già stato guidato da due conducenti quel giorno","In ogni giorno lavorativo senza eccezione, in aggiunta ai fogli di registrazione del tachigrafo","Solo quando l'autorità di esecuzione lo ha ordinato per iscritto per un periodo limitato","Ogni volta che il tempo di lavoro giornaliero supera le 9 ore o il giorno di riposo è stato rinviato"]}},
{en:{q:"By when must an employed driver hand the completed weekly and daily sheets of the work book to the employer?",a:["At the latest on the first working day of the following week","At the latest at the end of the current working day","Within one month of completing the weekly sheet","Only at the end of each calendar quarter"]},it:{q:"Entro quando un conducente dipendente deve consegnare al datore di lavoro i fogli settimanali e giornalieri compilati del libretto di lavoro?",a:["Al più tardi il primo giorno lavorativo della settimana successiva","Al più tardi alla fine della giornata lavorativa in corso","Entro un mese dalla compilazione del foglio settimanale","Solo alla fine di ogni trimestre civile"]}},
{en:{q:"Under what condition can the enforcement authority exempt a driver from filling in the weekly sheets of the work book?",a:["If the working time and required data are entered daily in company-internal daily reports","If the driver has worked for the same company for more than 5 years","If the vehicle is equipped with a digital tachograph","If the employer confirms the working times verbally every week"]},it:{q:"A quale condizione l'autorità di esecuzione può esonerare un conducente dalla compilazione dei fogli settimanali del libretto di lavoro?",a:["Se il tempo di lavoro e i dati richiesti vengono annotati ogni giorno in rapporti giornalieri interni all'azienda","Se il conducente lavora per la stessa azienda di taxi senza interruzioni da più di 5 anni","Se il veicolo è dotato di un tachigrafo digitale controllato ogni anno","Se il datore di lavoro conferma verbalmente i tempi di lavoro alla fine di ogni settimana"]}},
{en:{q:"How long must employers and self-employed drivers keep the control documents (record sheets, work book entries, registers) at the place of business?",a:["2 years, in chronological order and sorted by vehicle","1 year, in chronological order and sorted by driver","3 years, sorted by calendar month","5 years, together with the accounting records"]},it:{q:"Per quanto tempo datori di lavoro e conducenti indipendenti devono conservare i mezzi di controllo (fogli di registrazione, annotazioni del libretto di lavoro, registri) presso la sede aziendale?",a:["2 anni, in ordine cronologico e ordinati per veicolo","1 anno, in ordine cronologico e ordinati per conducente","3 anni, ordinati per mese civile","5 anni, insieme ai documenti contabili"]}},
{en:{q:"How long is a driver card for the digital tachograph valid?",a:["5 years","1 year","10 years","Unlimited"]},it:{q:"Quanto è valida la carta del conducente per il tachigrafo digitale?",a:["5 anni","1 anno","10 anni","Illimitata"]}},
{en:{q:"In an emergency (force majeure, giving assistance), the driver may deviate from the working, driving and rest time rules...",a:["As far as the emergency actually requires and road safety allows","As far as the customer's schedule makes it necessary","By at most one hour per day, whatever the reason","Only after informing the cantonal authority by telephone"]},it:{q:"In caso di emergenza (forza maggiore, prestazione di soccorso), il conducente può derogare alle norme su tempo di lavoro, guida e riposo...",a:["Nella misura in cui l'emergenza lo richiede effettivamente e la sicurezza stradale lo consente","Nella misura in cui l'orario concordato con il cliente lo rende strettamente necessario","Al massimo di un'ora al giorno, indipendentemente dal motivo dell'emergenza","Solo dopo aver informato telefonicamente l'autorità cantonale di esecuzione competente"]}},
{en:{q:"After deviating from the rules in an emergency, the driver must...",a:["Note the reason and extent in the work book / register and compensate the deviation at the latest by the end of the following week","Report the deviation in writing to the cantonal police within 24 hours and wait for their written confirmation","Compensate the deviation within the following three months; a written note in the work book is not required","Enter the deviation only in the employer's register; compensation is not necessary if it lasted under two hours"]},it:{q:"Dopo aver derogato alle norme in un'emergenza, il conducente deve...",a:["Annotare motivo ed entità nel libretto di lavoro / registro e compensare la deroga al più tardi entro la fine della settimana successiva","Segnalare la deroga per iscritto alla polizia cantonale entro 24 ore e attendere la loro conferma scritta","Compensare la deroga entro i tre mesi successivi; un'annotazione scritta nel libretto di lavoro non è richiesta","Annotare la deroga solo nel registro del datore di lavoro; la compensazione non è necessaria se è durata meno di due ore"]}},
{en:{q:"Regarding scheduling, the employer must...",a:["Organise the driver's work so that the working, driving and rest time rules can be respected","Schedule the shifts so that the vehicles remain in use around the clock every day","Leave the planning of the breaks and rest periods entirely to each individual driver","Plan the work so that the permitted overtime hours are fully used every single week"]},it:{q:"Per quanto riguarda la pianificazione, il datore di lavoro deve...",a:["Organizzare il lavoro del conducente in modo che le norme su tempo di lavoro, guida e riposo possano essere rispettate","Pianificare i turni in modo che i veicoli restino in uso 24 ore su 24 ogni giorno","Lasciare la pianificazione delle pause e dei riposi interamente a ogni singolo conducente","Pianificare il lavoro in modo da sfruttare completamente ogni settimana le ore di straordinario consentite"]}},
{"en":{"q":"For a daily working time of MORE THAN 7 hours but not more than 9 hours (e.g. 8 hours), the minimum work break is...","a":["At least 30 minutes, or two breaks of at least 20 minutes each","At least 20 minutes, taken in one single block","At least 10 minutes, taken before the end of the shift","At least 1 hour, or two breaks of at least 30 minutes each"]},"it":{"q":"Per un tempo di lavoro giornaliero SUPERIORE a 7 ore ma non più di 9 ore (es. 8 ore), la pausa lavorativa minima è di...","a":["Almeno 30 minuti, oppure due pause di almeno 20 minuti ciascuna","Almeno 20 minuti, presi in un unico blocco","Almeno 10 minuti, presi prima della fine del turno","Almeno 1 ora, oppure due pause di almeno 30 minuti ciascuna"]},"x":{"en":"Work breaks by daily working time: up to 7 h → at least 20 min; over 7 and up to 9 h → 30 min or 2×20 min; over 9 h → 1 h, or 2×30, or 3×20. No part may be shorter than 20 minutes, and there may never be more than 5½ h of working time without a break.","it":"Pause di lavoro secondo il tempo di lavoro giornaliero: fino a 7 ore → almeno 20 min; oltre 7 e fino a 9 ore → 30 min oppure 2×20 min; oltre 9 ore → 1 ora, oppure 2×30, oppure 3×20. Nessuna parte può durare meno di 20 minuti e non ci possono mai essere più di 5 ore e mezza di lavoro senza pausa."}},
{"en":{"q":"Into how many parts may the 1-hour work break (daily working time over 9 hours) be divided at most?","a":["Into 3 parts of at least 20 minutes each, or 2 parts of at least 30 minutes","Into 2 parts of at least 15 minutes each, but never into 3 parts","Into 4 parts of at least 10 minutes each","It may not be divided; it must be taken as one full hour"]},"it":{"q":"In quante parti può essere divisa al massimo la pausa lavorativa di 1 ora (tempo di lavoro giornaliero oltre 9 ore)?","a":["In 3 parti di almeno 20 minuti ciascuna, oppure 2 parti di almeno 30 minuti","In 2 parti di almeno 15 minuti ciascuna, ma mai in 3 parti","In 4 parti di almeno 10 minuti ciascuna","Non può essere divisa; deve essere presa come un'ora intera"]},"x":{"en":"Work breaks by daily working time: up to 7 h → at least 20 min; over 7 and up to 9 h → 30 min or 2×20 min; over 9 h → 1 h, or 2×30, or 3×20. No part may be shorter than 20 minutes, and there may never be more than 5½ h of working time without a break.","it":"Pause di lavoro secondo il tempo di lavoro giornaliero: fino a 7 ore → almeno 20 min; oltre 7 e fino a 9 ore → 30 min oppure 2×20 min; oltre 9 ore → 1 ora, oppure 2×30, oppure 3×20. Nessuna parte può durare meno di 20 minuti e non ci possono mai essere più di 5 ore e mezza di lavoro senza pausa."}},
{"en":{"q":"How must the work breaks be distributed over the working day?","a":["So that no more than 5½ hours of working time lie between two breaks or between a break and a rest period","So that a break is taken after every 4 hours of working time at the latest, regardless of the rest periods","So that all the breaks of the day are taken together in one single block in the middle of the shift","So that at least half of the total break time falls in the first half of the working day"]},"it":{"q":"Come devono essere distribuite le pause di lavoro nella giornata lavorativa?","a":["In modo che tra due pause, o tra una pausa e un periodo di riposo, non cadano più di 5 ore e mezza di lavoro","In modo che una pausa sia presa al più tardi dopo ogni 4 ore di lavoro, indipendentemente dai riposi","In modo che tutte le pause della giornata siano prese insieme in un unico blocco a metà turno","In modo che almeno la metà del tempo totale di pausa cada nella prima metà della giornata lavorativa"]}},
{"en":{"q":"What is the shortest time that can count as part of a work break?","a":["20 minutes – interruptions of less than 15 minutes even count as working time","15 minutes – anything shorter than that counts as ordinary working time","10 minutes – shorter interruptions are counted as rest time instead","5 minutes – every short interruption of the work counts as a break"]},"it":{"q":"Qual è la durata minima che può contare come parte di una pausa di lavoro?","a":["20 minuti – le interruzioni di meno di 15 minuti contano addirittura come tempo di lavoro","15 minuti – tutto ciò che è più breve conta come normale tempo di lavoro","10 minuti – le interruzioni più brevi vengono contate come tempo di riposo","5 minuti – ogni breve interruzione del lavoro conta come una pausa"]},"x":{"en":"Work breaks by daily working time: up to 7 h → at least 20 min; over 7 and up to 9 h → 30 min or 2×20 min; over 9 h → 1 h, or 2×30, or 3×20. No part may be shorter than 20 minutes, and there may never be more than 5½ h of working time without a break.","it":"Pause di lavoro secondo il tempo di lavoro giornaliero: fino a 7 ore → almeno 20 min; oltre 7 e fino a 9 ore → 30 min oppure 2×20 min; oltre 9 ore → 1 ora, oppure 2×30, oppure 3×20. Nessuna parte può durare meno di 20 minuti e non ci possono mai essere più di 5 ore e mezza di lavoro senza pausa."}},
{"en":{"q":"How is the record sheet correctly inserted into the analog tachograph?","a":["Lift the knob, insert the sheet with the green/black side facing up, lower the knob, close the cover and set the time-group switches","Open the cover, place the sheet with the printed side facing down, lock it with the key and note the time on the back","Slide the sheet into the side slot of the device while the vehicle is moving slowly and press the warning lamp","Write the odometer reading on the sheet, fold it slightly and clamp it under the clock hand of the device"]},"it":{"q":"Come si inserisce correttamente il disco nel tachigrafo analogico?","a":["Alzare il pomello, inserire il disco con la parte verde o nera verso l'alto, abbassare il pomello, chiudere il coperchio e posizionare i commutatori dei gruppi di tempo","Aprire il coperchio, mettere il disco con il lato stampato verso il basso, bloccarlo con la chiave e annotare l'ora sul retro","Infilare il disco nella fessura laterale dell'apparecchio mentre il veicolo si muove lentamente e premere la lampada di avvertimento","Scrivere il chilometraggio sul disco, piegarlo leggermente e fissarlo sotto la lancetta dell'orologio dell'apparecchio"]}},
{"en":{"q":"A driver changes vehicle during the working day (EU tachograph). What happens with his record sheet?","a":["The sheet is personal: he takes it with him and notes the vehicle change by hand on the back of the sheet","The sheet belongs to the vehicle: it stays in the tachograph for the next driver","He destroys the old sheet and starts a fresh one in the new vehicle","He hands the sheet to the employer before entering the new vehicle"]},"it":{"q":"Un conducente cambia veicolo durante la giornata lavorativa (tachigrafo UE). Cosa succede con il suo disco?","a":["Il disco è personale: lo porta con sé e annota il cambio di veicolo a mano sul retro del disco","Il disco appartiene al veicolo: resta nel tachigrafo per il conducente successivo","Distrugge il vecchio disco e ne inizia uno nuovo nel nuovo veicolo","Consegna il disco al datore di lavoro prima di salire sul nuovo veicolo"]},"x":{"en":"The back of the sheet has fields for up to three different vehicles per day.","it":"Il retro del disco ha campi per registrare fino a tre veicoli diversi al giorno."}},
{"en":{"q":"At a driver change, what happens with the record sheets?","a":["The driver who leaves the vehicle takes his own sheet; the new driver inserts his own filled-in sheet","Both drivers continue recording on the same sheet until the end of the working day","The new driver turns the old sheet over and continues recording on the back of it","The sheets remain in the vehicle and are exchanged only at the end of the week"]},"it":{"q":"Al cambio di conducente, cosa succede con i dischi?","a":["Il conducente che lascia il veicolo prende il proprio disco; il nuovo conducente inserisce il proprio disco compilato","Entrambi i conducenti continuano a registrare sullo stesso disco fino alla fine della giornata","Il nuovo conducente gira il vecchio disco e continua a registrare sul retro dello stesso","I dischi restano nel veicolo e vengono scambiati solo alla fine della settimana"]}},
{"en":{"q":"Which entries must be made on the record sheet BEFORE inserting it?","a":["Surname and first name, place of departure, date on the upper line, plate number and the odometer reading before the trip","Only the date and the signature; the other details are recorded automatically by the device","Surname and first name, the destination of the first trip and the expected fare for the day","The name of the employer, the service history of the vehicle and the tyre pressures"]},"it":{"q":"Quali iscrizioni si devono fare sul disco PRIMA di inserirlo?","a":["Cognome e nome, luogo di partenza, data sulla riga sopra, numero di targa e stato del contachilometri prima della corsa","Solo la data e la firma; gli altri dati vengono registrati automaticamente dall'apparecchio","Cognome e nome, la destinazione della prima corsa e l'incasso previsto per la giornata","Il nome del datore di lavoro, la cronologia di manutenzione del veicolo e la pressione delle gomme"]}},
{"en":{"q":"Which entries are made after removing the sheet at the end of the last trip of the day?","a":["Place of removal, date on the lower line, the new odometer reading and the total kilometres driven","The total working time of the day and the name of the last customer served","The number of trips carried out and the total fares collected during the day","Nothing further – the sheet is complete at the moment it is removed from the device"]},"it":{"q":"Quali iscrizioni si fanno dopo l'estrazione del disco, terminata l'ultima corsa della giornata?","a":["Luogo dell'estrazione, data sulla riga sotto, il nuovo stato del contachilometri e il totale dei chilometri percorsi","Il tempo di lavoro totale della giornata e il nome dell'ultimo cliente servito","Il numero di corse effettuate durante la giornata e l'incasso totale raccolto dai clienti","Null'altro – il disco è completo nel momento in cui viene estratto dall'apparecchio"]}},
{"en":{"q":"The tachograph stops recording correctly during the day. What must the driver do with the missing data?","a":["Enter the working, driving and rest periods by hand on the record sheet or on a special sheet attached to it","Reconstruct the missing periods from memory at the end of the month in the register","Nothing – the enforcement authority reconstructs the data from the other sheets","Ask the employer to estimate the missing times and confirm them in writing"]},"it":{"q":"Il tachigrafo smette di registrare correttamente durante la giornata. Cosa deve fare il conducente con i dati mancanti?","a":["Annotare a mano i periodi di lavoro, guida e riposo sul disco oppure su un foglio speciale da accludere al disco","Ricostruire a memoria i periodi mancanti alla fine del mese e annotarli nel registro","Nulla – l'autorità di esecuzione ricostruisce i dati sulla base degli altri dischi","Chiedere al datore di lavoro di stimare i tempi mancanti e confermarli per iscritto"]}},
{"en":{"q":"With an ANALOG tachograph, which record sheets must the driver be able to present at a check at any time?","a":["The sheets of the current week and the sheet of the last day of the previous week on which he drove","The sheets of the current day and of the previous 28 days, together with the driver card","Only the sheet that is currently inserted in the device at the moment of the check","All the sheets of the current calendar year, sorted in chronological order"]},"it":{"q":"Con il tachigrafo ANALOGICO, quali dischi il conducente deve poter presentare a un controllo in qualsiasi momento?","a":["I dischi della settimana in corso e il disco dell'ultimo giorno della settimana precedente in cui ha guidato","I dischi del giorno corrente e dei 28 giorni precedenti, insieme alla carta del conducente","Solo il disco attualmente inserito nell'apparecchio al momento del controllo","Tutti i dischi dell'anno civile in corso, ordinati in ordine cronologico"]},"x":{"en":"Analog tachograph: present the sheets of the current week + the last day of the previous week driven. Digital tachograph: driver card with the current day + the previous 28 days. Used sheets go to the employer, who keeps them at least 2 years.","it":"Tachigrafo analogico: presentare i dischi della settimana in corso + l'ultimo giorno di guida della settimana precedente. Tachigrafo digitale: carta del conducente con il giorno corrente + i 28 giorni precedenti. I dischi usati vanno al datore di lavoro, che li conserva per almeno 2 anni."}},
{"en":{"q":"What is the weekly disc booklet (for the weekly tachograph)?","a":["A booklet of 5, 6 or 7 discs; the notch between 24:00 and 00:00 ensures uninterrupted recording, and each new disc starts at 00:00","A single large disc on which all 7 days of the week are recorded in seven separate concentric rings","A digital memory card that stores one full week of data and is read out by the employer","A booklet of 12 discs, one for each month, which is replaced at the start of every year"]},"it":{"q":"Cos'è il blocchetto settimanale (per l'odocronografo settimanale)?","a":["Un blocchetto di 5, 6 o 7 dischi; l'intaglio tra le 24:00 e le 00:00 garantisce la registrazione ininterrotta, e ogni nuovo disco inizia alle 00:00","Un unico grande disco su cui tutti i 7 giorni della settimana sono registrati in sette anelli concentrici separati","Una scheda di memoria digitale che memorizza un'intera settimana di dati e viene letta dal datore di lavoro","Un blocchetto di 12 dischi, uno per ogni mese, che viene sostituito all'inizio di ogni anno"]},"x":{"en":"The handwritten entries are made on the top disc of the booklet; the \"knife\" separates the used discs from the rest.","it":"Le iscrizioni a mano si fanno sul disco superiore del blocchetto; il «coltello» separa i dischi adoperati dal resto."}},
{"en":{"q":"How do you recognise the special chart disc for the weekly tachograph?","a":["It has a gap of about 30°, one rotation takes 26 hours, and it is marked \"1 daily disc for a 7-day device\"","It has a gap of about 90°, one rotation takes 24 hours, and it is marked \"weekly disc for daily devices\"","It is twice as large as a normal daily disc and is printed on bright orange signal paper","It carries no time scale at all, only a speed scale that goes up to 180 km/h instead of 120"]},"it":{"q":"Come si riconosce il disco diagrammale speciale per l'odocronografo settimanale?","a":["Ha una pausa di circa 30°, una rotazione di 26 ore e sopra è scritto «1 disco giornaliero per apparato di 7 giorni»","Ha una pausa di circa 90°, una rotazione di 24 ore e sopra è scritto «disco settimanale per apparati giornalieri»","È grande il doppio di un normale disco giornaliero ed è stampato su carta arancione segnaletica","Non ha alcuna scala dei tempi, solo una scala di velocità che arriva a 180 km/h invece di 120"]}},
{"en":{"q":"In the work book and on tachograph records, the steering-wheel symbol stands for...","a":["Driving time","All other working time","Availability and waiting time","Breaks and rest time"]},"it":{"q":"Nel libretto di lavoro e nelle registrazioni del tachigrafo, il simbolo del volante indica...","a":["Il tempo di guida","Ogni altro tempo di lavoro","La disponibilità e il tempo di attesa","Le pause e il tempo di riposo"]}},
{"en":{"q":"The crossed-square symbol on tachograph records stands for...","a":["Availability: waiting times, time in the cab of the second driver, time in the bunk while the vehicle is moving","Driving time, but only for the periods driven on motorways and outside built-up areas","Other working time such as loading, cleaning and ordinary maintenance of the vehicle","The daily and the weekly rest time that the driver spends away from the vehicle"]},"it":{"q":"Il simbolo del quadrato barrato nelle registrazioni del tachigrafo indica...","a":["La disponibilità: tempi di attesa, tempo in cabina del secondo autista, tempo in cuccetta durante la marcia del veicolo","Il tempo di guida, ma solo per i periodi percorsi in autostrada e fuori dai centri abitati","Gli altri lavori come il carico, la pulizia e la manutenzione ordinaria del veicolo","Il riposo giornaliero e settimanale che il conducente trascorre lontano dal veicolo"]}},
{"en":{"q":"How must the entries on the daily sheet of the work book be made?","a":["Immediately at every change of activity, as a continuous record accurate to the quarter hour from 00:00 to 24:00","Once at the end of the working day, with all the times rounded up to the nearest full hour","Only for the driving periods; the breaks and the other work need not be entered","Once a week, copied afterwards from the record sheets of the tachograph"]},"it":{"q":"Come devono essere fatte le iscrizioni sul foglio giornaliero del libretto di lavoro?","a":["Subito a ogni cambiamento di attività, come registrazione continua precisa al quarto d'ora dalle ore 0 alle ore 24","Una volta alla fine della giornata lavorativa, con tutti i tempi arrotondati all'ora piena","Solo per i periodi di guida; le pause e gli altri lavori non devono essere iscritti","Una volta a settimana, copiate in un secondo momento dai dischi del tachigrafo"]}},
{"en":{"q":"What must an EMPLOYED driver enter in the weekly sheet each day?","a":["The preceding rest and the start time at the beginning, the plate number before each trip, the finishing time at day's end","The total number of hours worked and the overtime, entered once at the end of every week","The fares earned, the tips received and the total kilometres driven during each working day","The names of all the customers served and the exact routes driven during each single shift"]},"it":{"q":"Cosa deve iscrivere ogni giorno un conducente DIPENDENTE nel foglio settimanale?","a":["Il riposo precedente e l'ora d'inizio all'inizio del lavoro, la targa prima di ogni corsa, l'ora della fine a fine giornata","Il totale delle ore lavorate e gli straordinari, iscritti una sola volta alla fine di ogni settimana","Gli incassi, le mance ricevute e i chilometri totali percorsi durante ogni giornata di lavoro","I nomi di tutti i clienti serviti e i percorsi esatti effettuati durante ogni singolo turno"]}},
{"en":{"q":"When is the consumption of alcoholic drinks prohibited for the driver?","a":["During the whole working time and within the 6 hours before the start of work","During the whole working time and within the 2 hours before the start of work","Only while passengers are actually being transported in the vehicle","Only during night shifts and on Sundays and public holidays"]},"it":{"q":"Quando è vietato il consumo di bevande alcoliche per il conducente?","a":["Durante tutto il tempo di lavoro e nelle 6 ore che precedono l'inizio del lavoro","Durante tutto il tempo di lavoro e nelle 2 ore che precedono l'inizio del lavoro","Solo mentre i passeggeri vengono effettivamente trasportati nel veicolo","Solo durante i turni di notte e nelle domeniche e nei giorni festivi"]}},
{"en":{"q":"When do trips count as \"regular\" (professional transport)?","a":["When they are carried out at least twice within intervals of less than 16 days","When they are carried out at least once within intervals of 16 days","When they are carried out at least five times within one month","When they are carried out on every working day of the week"]},"it":{"q":"Quando le corse sono considerate \"regolari\" (trasporto professionale)?","a":["Quando vengono effettuate almeno due volte a intervalli di meno di 16 giorni","Quando vengono effettuate almeno una volta a intervalli di 16 giorni","Quando vengono effettuate almeno cinque volte in un mese","Quando vengono effettuate in ogni giorno lavorativo della settimana"]}},
{"en":{"q":"When is the \"economic success\" of a trip considered given?","a":["When the fare exceeds the vehicle costs and the driver's expenses","When any payment at all is made for the trip, even a symbolic one","When the fare covers exactly the fuel costs of the trip","When the driver receives a tip in addition to the fare"]},"it":{"q":"Quando il \"successo economico\" di una corsa è considerato dato?","a":["Quando il prezzo della corsa supera i costi del veicolo e le spese del conducente","Quando per la corsa viene effettuato un qualsiasi pagamento, anche simbolico","Quando il prezzo della corsa copre esattamente i costi del carburante","Quando il conducente riceve una mancia oltre al prezzo della corsa"]},"x":{"en":"Vehicle costs: amortisation, fuel, taxes and insurance, maintenance. Driver's expenses: meals, overnight stays, travel expenses.","it":"Costi del veicolo: ammortamento, carburante, tasse e assicurazioni, manutenzione. Spese del conducente: vitto, pernottamento, spese di viaggio."}},
{"en":{"q":"For which trips does the ARV2 NOT apply?","a":["Ambulances, vehicles limited to 30 km/h, transport of disabled persons, schoolchildren or workers, and fare-included trips up to 50 km","Airport transfers, hotel shuttles, school buses and all the trips that are ordered in advance by telephone or by app","Night trips between 22:00 and 06:00, all trips on Sundays and public holidays, and trips outside the canton","Trips with fewer than 4 passengers, journeys shorter than 10 kilometres and trips within the same municipality"]},"it":{"q":"Per quali corse NON si applica l'OLR2?","a":["Ambulanze, veicoli limitati a 30 km/h, trasporti di disabili, scolari o lavoratori, e corse fino a 50 km con prezzo incluso in altra prestazione","Trasferimenti aeroportuali, navette d'albergo, scuolabus e tutte le corse prenotate in anticipo per telefono o app","Corse notturne tra le 22:00 e le 06:00, tutte le corse di domenica e nei giorni festivi, e le corse fuori cantone","Corse con meno di 4 passeggeri, tragitti più corti di 10 chilometri e corse all'interno dello stesso comune"]},"x":{"en":"Example: a hotel bus taking guests to the airport is exempt, because the fare is included in the room price – provided the airport is no more than 50 km away.","it":"Esempio: il bus di un hotel che porta gli ospiti all'aeroporto è esente, perché il prezzo è incluso nella camera – a condizione che l'aeroporto non disti più di 50 km."}},
{"en":{"q":"If two free half-days are combined into one free day, it covers...","a":["The whole period from 07:00 to 18:00 (11 hours), with the daily rest immediately before or after","Any 10 consecutive hours of the day, which the employee may choose completely freely","The whole period from 06:00 to 20:00, independently of the position of the daily rest","Two separate blocks of 5 hours each, taken on two different days of the same week"]},"it":{"q":"Se due mezze giornate libere vengono unite in un giorno libero, esso copre...","a":["L'intero periodo dalle 07:00 alle 18:00 (11 ore), con il riposo giornaliero immediatamente prima o dopo","10 ore consecutive qualsiasi della giornata, scelte liberamente dal dipendente","Il periodo dalle 06:00 alle 20:00, indipendentemente dal riposo giornaliero","Due blocchi separati di 5 ore in due giorni diversi della settimana"]},"x":{"en":"Half-days may be collected over at most 4 weeks and then taken together.","it":"Le mezze giornate possono essere accumulate per al massimo 4 settimane e poi prese insieme."}},
{"en":{"q":"Which time limits apply to the weekly rest day?","a":["It must begin no later than 06:00 and end no earlier than 20:00","It must begin no later than 08:00 and end no earlier than 18:00","It must begin exactly at midnight and also end exactly at midnight","There are no time limits as long as it lasts 24 consecutive hours"]},"it":{"q":"Quali limiti di orario valgono per il giorno di riposo settimanale?","a":["Deve iniziare non più tardi delle 06:00 e terminare non prima delle 20:00","Deve iniziare non più tardi delle 08:00 e terminare non prima delle 18:00","Deve iniziare esattamente a mezzanotte e terminare anch'esso a mezzanotte","Non ci sono limiti di orario purché duri 24 ore consecutive"]}},
{"en":{"q":"An employed driver takes the weekly rest day, the normal daily rest and the free half-day together. How long must he stay away from work?","a":["40 hours (24 + 11 + 5)","38 hours (24 + 9 + 5)","35 hours (24 + 11)","29 hours (24 + 5)"]},"it":{"q":"Un conducente dipendente prende insieme il giorno di riposo settimanale, il riposo giornaliero normale e la mezza giornata libera. Per quanto tempo deve restare lontano dal lavoro?","a":["40 ore (24 + 11 + 5)","38 ore (24 + 9 + 5)","35 ore (24 + 11)","29 ore (24 + 5)"]},"x":{"en":"With the REDUCED daily rest (9 h) the block is 38 hours (24+9+5). Rest day + normal rest without the half-day = 35 hours.","it":"Con il riposo giornaliero RIDOTTO (9 ore) il blocco è di 38 ore (24+9+5). Giorno di riposo + riposo normale senza mezza giornata = 35 ore."}},
{"en":{"q":"If the work is organised in shifts, the shifts must change at the latest after...","a":["6 weeks, unless the employee expressly agrees to another arrangement","2 weeks, unless the enforcement authority grants an exception","6 months, provided the employer plans the shifts in advance","They never have to change if the wage includes a night supplement"]},"it":{"q":"Se il lavoro è organizzato a turni, i turni devono cambiare al più tardi dopo...","a":["6 settimane, salvo che il dipendente acconsenta espressamente a un'altra soluzione","2 settimane, salvo che l'autorità di esecuzione conceda un'eccezione","6 mesi, purché il datore di lavoro pianifichi i turni in anticipo","Non devono mai cambiare se il salario include un supplemento notturno"]}},
{"en":{"q":"How is overtime compensated?","a":["With free time within 3 months, or paid out with a 25% supplement (unless otherwise agreed)","Only with money, always with a 50% supplement, at the latest within one month","Only with free time within one single week; a payment in money is never allowed","It is not compensated at all, because overtime is already included in the normal wage"]},"it":{"q":"Come viene compensato il lavoro straordinario?","a":["Con tempo libero entro 3 mesi, oppure pagato con un supplemento del 25% (salvo accordo diverso)","Solo con denaro, sempre con un supplemento del 50%, entro un mese","Solo con tempo libero entro una settimana; il pagamento non è mai ammesso","Non viene compensato: lo straordinario è compreso nel salario normale"]}},
{"en":{"q":"What does the tachograph fundamentally record?","a":["Speed, time and distance travelled","Speed, fuel consumption and engine temperature","Time, the fares charged and the routes driven","Distance, the number of passengers and the stops"]},"it":{"q":"Cosa registra fondamentalmente il tachigrafo?","a":["Velocità, tempo e percorso (distanza percorsa)","Velocità, consumo di carburante e temperatura del motore","Tempo, tariffe applicate e percorsi effettuati","Distanza, numero di passeggeri e fermate"]}},
{"en":{"q":"How long may a record sheet remain in the tachograph, and by how many drivers may it be used?","a":["At most 24 hours, and it may be used by two drivers (positions 1 and 2)","At most 48 hours, and it may be used by one single driver only","At most one week, and it may be used by any number of drivers","At most 12 hours, and it may be used by three drivers per day"]},"it":{"q":"Per quanto tempo un disco può restare nel tachigrafo e da quanti conducenti può essere usato?","a":["Al massimo 24 ore, e può essere usato da due conducenti (posizioni 1 e 2)","Al massimo 48 ore, e può essere usato da un solo conducente","Al massimo una settimana, e può essere usato da un numero qualsiasi di conducenti","Al massimo 12 ore, e può essere usato da tre conducenti al giorno"]},"x":{"en":"If more than two drivers use the vehicle per day (3-shift operation), an application can be made to the enforcement authority so that each driver uses his own sheet.","it":"Se più di due conducenti usano il veicolo al giorno (3 turni), si può chiedere all'autorità di esecuzione che ogni conducente usi il proprio disco."}}
];
