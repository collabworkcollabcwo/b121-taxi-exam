<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUT-Exam · B121 / BPT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ===== Official CUT design tokens (asa Computer-Unterstützte Theorieprüfung) ===== */
  :root{
    --white:#ffffff;
    --night-rider:#303030;      /* texts */
    --dark-grey:#ababab;        /* lines, strokes */
    --silver:#c6c6c6;           /* inactive states */
    --white-smoke:#f1f1f1;      /* backgrounds */
    --mariner:#355da6;          /* buttons / primary */
    --mariner-light:#afbedb;
    --mahogany:#d73b40;         /* failed, errors */
    --medium-orchid:#af61c6;    /* marked content */
    --deep-lilac:#9849af;
    --jungle-green:#289b7c;     /* passed, accepted */
    --tropical-rain-forest:#027d5c;

    --primary-text-color:var(--night-rider);
    --line-color:var(--dark-grey);
    --inactive-color:var(--silver);
    --shared-background-color:var(--white-smoke);
    --button-color:var(--mariner);
    --error-color:var(--mahogany);
    --marked-content-color:var(--medium-orchid);
    --test-accepted-color:var(--jungle-green);
  }
  *{box-sizing:border-box;}
  html{height:100%;}
  body{
    width:100vw; margin:0;
    -webkit-tap-highlight-color:transparent;
    user-select:none; cursor:default;
    background-color:white; color:var(--primary-text-color);
    font-family:'Roboto Condensed','Roboto',sans-serif;
    font-style:normal; font-weight:400;
    overflow-x:hidden;
  }
  .header{
    height:80px; padding:0 60px; background-color:var(--white-smoke);
    display:flex; flex-direction:row; align-items:center;
  }
  .footer{
    position:fixed; bottom:0; left:0; right:0; height:80px; padding:0 60px;
    background-color:var(--white-smoke);
    display:flex; flex-direction:row; align-items:center;
  }
  .justified{justify-content:space-between;}
  .scrollpanel{
    overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch;
    position:absolute; top:80px; bottom:80px; left:0; right:0;
  }
  .scrollpanel-noheader{top:0;}
  /* paper-button replica */
  .pbtn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    font-family:inherit; font-size:14px; font-weight:500; letter-spacing:.2px;
    color:var(--mariner); background:#fff; border:none; border-radius:5px;
    padding:10px 16px; min-width:64px; cursor:pointer; text-transform:none;
    box-shadow:0 2px 2px 0 rgba(0,0,0,.14),0 1px 5px 0 rgba(0,0,0,.12),0 3px 1px -2px rgba(0,0,0,.2);
    transition:box-shadow .15s;
  }
  .pbtn:active{box-shadow:0 4px 5px 0 rgba(0,0,0,.14),0 1px 10px 0 rgba(0,0,0,.12),0 2px 4px -1px rgba(0,0,0,.3);}
  .pbtn.invert{background:var(--mariner); color:white;}
  .pbtn.flat{box-shadow:none; background:transparent;}
  .pbtn.bookmarkbtn{color:var(--marked-content-color);}
  .pbtn svg{width:20px; height:20px; fill:currentColor; flex:0 0 auto;}
  /* icon button (navigation chevrons) */
  .navbtn{
    border:none; cursor:pointer; color:white; background-color:var(--button-color);
    width:50px; height:50px; padding:8px;
  }
  .navbtn svg{width:100%; height:100%; fill:white;}
  .navbtn.back{border-radius:0 5px 5px 0;}
  .navbtn.forward{border-radius:5px 0 0 5px;}
  .navbtn:disabled{background-color:var(--silver); cursor:default;}
  /* login-info block (top right on start screens) */
  .logininfo{
    position:absolute; top:8px; right:44px; font-size:13px; line-height:1.3;
  }
  .logininfo td{padding:1px 0;}
  .logininfo td:first-child{padding-right:24px;}
  .logininfo td:last-child{font-weight:700;}
  /* ===== language selection ===== */
  .langpage{position:absolute; top:60px; left:0; right:0; display:flex; flex-direction:column; align-items:center;}
  .langcards{margin-top:75px; display:flex; gap:14px; flex-wrap:wrap; justify-content:center; max-width:400px;}
  .langcard{
    width:170px; padding:22px 0; text-align:center; background:#fff; border:none; cursor:pointer;
    color:var(--mariner); font-family:inherit; font-size:14px; font-weight:500; border-radius:2px;
    box-shadow:0 2px 2px 0 rgba(0,0,0,.14),0 1px 5px 0 rgba(0,0,0,.12),0 3px 1px -2px rgba(0,0,0,.2);
  }
  /* ===== start screen ===== */
  .startpage{padding:26px 20px 100px; text-align:center;}
  .startpage h1{font-size:24px; font-weight:700; margin:34px 0 0;}
  .startpage .goodluck{margin-top:34px; font-size:15px;}
  .startpage .disclaimer{margin:28px auto 0; max-width:820px; color:var(--mahogany); font-size:15px; line-height:1.5;}
  .examtable{
    margin:36px auto 0; border-top:1px solid var(--white-smoke); border-bottom:1px solid var(--white-smoke);
    padding:22px 0; max-width:760px; text-align:left; font-size:14px;
  }
  .examtable table{margin:0 auto; border-collapse:collapse;}
  .examtable td{padding:3px 0; vertical-align:top;}
  .examtable td:first-child{font-weight:700; padding-right:80px; white-space:nowrap;}
  .startbtn{margin-top:40px;}
  /* ===== exam screen ===== */
  .examcontainer{height:100%; display:flex; flex-direction:row;}
  .self-center{align-self:center;}
  .exampage{flex:1; min-width:0;}
  .content{padding:0 60px; display:flex; flex-direction:column;}
  .title{
    margin-top:10px; padding-bottom:10px; border-bottom:2px solid var(--shared-background-color);
    display:flex; flex-direction:row; align-items:center;
  }
  .titleText{font-weight:700; font-size:15px;}
  .flexspacer{flex:1;}
  .qcols{display:flex; flex-direction:row; gap:0;}
  .contentLeft{padding:20px 20px 0 0; display:flex; flex-direction:column; flex:1; min-width:0;}
  .contentRight{padding:20px 0 0 20px; flex:1; min-width:0;}
  .questionTitle{font-size:large; margin-bottom:10px; line-height:normal;}
  /* answers — official CUT styles */
  .answer{
    margin:5px 0 5px 0; padding:20px; border:1px solid #fff;
    display:flex; flex-direction:row; align-items:flex-start; cursor:pointer;
  }
  .answer span.atext{margin-top:5px; font-size:14px; line-height:1.4;}
  .answer.selected{
    border:1px solid var(--inactive-color);
    box-shadow:0 0 1px 0 rgba(0,0,0,.12),0 1px 2px 0 rgba(0,0,0,.12),0 2px 1px -2px rgba(0,0,0,.2);
  }
  /* paper-checkbox replica: 30px */
  .pcheck{
    display:inline-block; flex:0 0 30px; width:30px; height:30px; margin-right:16px; position:relative;
    border:2px solid var(--silver); border-radius:2px; background:#fff;
  }
  .answer.checked .pcheck{background:var(--mariner); border-color:var(--mariner);}
  .answer.checked .pcheck::after{
    content:''; position:absolute; left:9px; top:2px; width:8px; height:17px;
    border:solid white; border-width:0 3px 3px 0; transform:rotate(45deg);
  }
  /* review mode rings (official .correct / .incorrect) */
  .ring{
    display:inline-flex; align-items:center; padding:8px 0px 8px 8px; margin-right:8px; margin-left:-11px;
    border:3px solid transparent; border-radius:26px; max-height:52px;
  }
  .correct .ring{border-color:var(--test-accepted-color);}
  .incorrect .ring{border-color:var(--error-color);}
  .ring .pcheck{margin-right:8px;}
  /* header widgets */
  .hstack{display:flex; flex-direction:column; font-size:13px; line-height:1.5;}
  .hstack .row{display:flex; align-items:center; gap:6px;}
  .questionBookmarked{color:var(--marked-content-color);}
  .questionAnswered{color:var(--button-color);}
  .hstack svg{width:18px; height:18px; fill:currentColor;}
  /* cut-time-progress replica */
  .timewrap{margin-left:40px;}
  .cut-time{width:20vw; min-width:170px; height:40px; background:var(--white); position:relative; overflow:hidden;}
  .cut-time .fill{position:absolute; left:0; top:0; bottom:0; background:var(--inactive-color);}
  .cut-time .label{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:space-around;
    font-size:14px; z-index:1;
  }
  .cut-time .label.critical{color:var(--error-color);}
  /* ===== overview (Fragenübersicht) ===== */
  .ovwrap{padding:0 0 60px 60px;}
  .list-item{display:inline-table; margin:0 20px 0 0; width:calc(20% - 32px);}
  .list-item .flag{
    position:relative; width:36px; height:36px; top:40px; left:10px; z-index:1000;
    color:var(--marked-content-color); display:block;
  }
  .list-item .flag svg{width:36px; height:36px; fill:currentColor;}
  .list-item .flag.hiddenflag{visibility:hidden;}
  .ovbtn{width:100%; padding:15px; margin-bottom:6px;}
  .ovbtn .button-text{width:100%; text-align:center;}
  .ovbtn.answered{color:#fff;}
  .infoText{display:inline-block; width:100px; padding:2px 0;}
  .infoValue{font-weight:700;}
  /* ===== dialogs (paper-dialog replica) ===== */
  .backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:50;
    display:none; align-items:center; justify-content:center;
  }
  .backdrop.open{display:flex;}
  .pdialog{
    background:#fff; border-radius:2px; min-width:420px; max-width:620px; padding:24px;
    box-shadow:0 16px 24px 2px rgba(0,0,0,.14),0 6px 30px 5px rgba(0,0,0,.12),0 8px 10px -5px rgba(0,0,0,.4);
    font-size:15px; line-height:1.5;
  }
  .pdialog .dlgbuttons{display:flex; justify-content:flex-end; gap:10px; margin-top:24px;}
  /* ===== result ===== */
  .resultpage{padding:26px 20px 120px; text-align:center;}
  .resultpage h1{font-size:24px; font-weight:700; margin:34px 0 0;}
  .verdict{font-size:26px; font-weight:700; margin-top:8px;}
  .verdict.pass{color:var(--tropical-rain-forest);}
  .verdict.fail{color:var(--mahogany);}
  .reviewwrap{max-width:900px; margin:30px auto 0; text-align:left;}
  .reviewwrap h2{font-size:16px; border-bottom:2px solid var(--shared-background-color); padding-bottom:8px;}
  .rquestion{margin:26px 0 6px; font-size:15px; font-weight:700; line-height:1.4;}
  .rquestion .qnum{color:var(--mariner);}
  .reviewwrap .answer{cursor:default; padding:10px 14px;}
  .reviewwrap .answer .pcheck{transform:scale(.8); transform-origin:left center;}
  .rmarkedflag{color:var(--marked-content-color); font-size:13px;}
  @media (max-width:860px){
    .header,.footer{padding:0 14px;}
    .content{padding:0 14px;}
    .qcols{flex-direction:column;}
    .contentLeft,.contentRight{padding:14px 0 0 0;}
    .timewrap{margin-left:10px;}
    .list-item{width:calc(33% - 24px);}
    .pdialog{min-width:0; margin:0 12px;}
    .logininfo{right:12px;}
    .hstack{display:none;}
  }
</style>
</head>

{en:{q:"What does \"working time\" (Arbeitszeit) include?",a:["Driving time plus all other work-related activity","All work-related activity except the driving time","Driving time plus breaks, but not the waiting time","Driving time plus the daily rest period"]},it:{q:"Cosa comprende il \"tempo di lavoro\" (Arbeitszeit)?",a:["Il tempo di guida più ogni altra attività lavorativa","Ogni attività lavorativa escluso il tempo di guida","Il tempo di guida più le pause, ma senza il tempo di attesa","Il tempo di guida più il periodo di riposo giornaliero"]}},
{en:{q:"Interruptions or short pauses of less than 15 minutes are counted as...",a:["Working time","Rest time","A driving break","Standby time"]},it:{q:"Le interruzioni o brevi pause di meno di 15 minuti sono considerate come...",a:["Tempo di lavoro","Tempo di riposo","Una pausa di guida","Tempo di disponibilità"]}},
{en:{q:"For a self-employed driver, what counts as \"professional activity\" for the rules?",a:["The driving time","The entire working time including waiting","The driving time plus the work breaks","The waiting time at taxi ranks only"]},it:{q:"Per un conducente indipendente, cosa conta come \"attività professionale\" ai fini delle regole?",a:["Il tempo di guida","L'intero tempo di lavoro compresa l'attesa","Il tempo di guida più le pause di lavoro","Solo il tempo di attesa ai posteggi taxi"]}},
{en:{q:"A vehicle may be used for professional passenger transport only if...",a:["It is marked/entered for professional passenger transport in the vehicle registration document","It is equipped with a taximeter approved by the enforcement authority","It has passed an inspection at the road traffic office within the last 12 months","It is registered in the name of a licensed taxi business"]},it:{q:"Un veicolo può essere impiegato per il trasporto professionale di persone solo se...",a:["È annotato/iscritto per il trasporto professionale di persone nella licenza di circolazione","È dotato di un tassametro approvato dall'autorità di esecuzione","Ha superato un controllo all'ufficio della circolazione negli ultimi 12 mesi","È immatricolato a nome di un'azienda di taxi autorizzata"]}},
{en:{q:"What is the maximum daily DRIVING time between two consecutive daily rest periods?",a:["9 hours","10 hours","8 hours","12 hours"]},it:{q:"Qual è il tempo massimo DI GUIDA giornaliero tra due periodi di riposo giornaliero consecutivi?",a:["9 ore","10 ore","8 ore","12 ore"]}},
{en:{q:"What is the maximum DRIVING time (Lenkzeit) within one week?",a:["45 hours","56 hours","48 hours","53 hours"]},it:{q:"Qual è il tempo massimo DI GUIDA (Lenkzeit) in una settimana?",a:["45 ore","56 ore","48 ore","53 ore"]}},
{en:{q:"May the daily and weekly maximum driving times be exceeded when doing overtime?",a:["No, they may never be exceeded, not even with overtime","Yes, by up to 2 hours per day if compensated later","Yes, if the employer approves the overtime in writing","Yes, at most once per week for pre-booked trips"]},it:{q:"I tempi massimi di guida giornalieri e settimanali possono essere superati facendo straordinari?",a:["No, non possono mai essere superati, nemmeno con lo straordinario","Sì, fino a 2 ore al giorno se compensate in seguito","Sì, se il datore di lavoro approva lo straordinario per iscritto","Sì, al massimo una volta a settimana per corse prenotate"]}},
{en:{q:"Which activity always counts fully as driving time?",a:["Every period in which the vehicle is moving in traffic","Waiting at a taxi rank while ready to depart","Cleaning and refuelling the vehicle between trips","Filling in the work book at the end of the shift"]},it:{q:"Quale attività conta sempre interamente come tempo di guida?",a:["Ogni periodo in cui il veicolo è in movimento nel traffico","L'attesa a un posteggio taxi pronti a partire","La pulizia e il rifornimento del veicolo tra le corse","La compilazione del libretto di lavoro a fine turno"]}},
{en:{q:"A self-employed taxi driver has already driven 9 hours today. What may he still do today?",a:["No more driving under the ARV2 until after a daily rest","Drive up to 2 more hours after a 45-minute break","Drive 1 more hour if the trip was booked in advance","Keep driving as long as he does not feel tired"]},it:{q:"Un tassista indipendente ha già guidato 9 ore oggi. Cosa può ancora fare oggi?",a:["Nessun'altra guida secondo l'OLR2 fino a dopo un riposo giornaliero","Guidare fino a 2 ore in più dopo una pausa di 45 minuti","Guidare 1 ora in più se la corsa era prenotata in anticipo","Continuare a guidare finché non si sente stanco"]}},
{en:{q:"The driving-time limits of the ARV2 exist mainly to...",a:["Ensure road safety by preventing driver fatigue","Reduce traffic congestion in the city centres","Guarantee equal earnings among taxi businesses","Limit the number of taxis operating in a city"]},it:{q:"I limiti del tempo di guida dell'OLR2 esistono principalmente per...",a:["Garantire la sicurezza stradale evitando la stanchezza del conducente","Ridurre la congestione del traffico nei centri urbani","Garantire guadagni equi tra le aziende di taxi","Limitare il numero di taxi attivi in una città"]}},
{en:{q:"After how much continuous driving time must a DRIVING break of at least 45 minutes be taken?",a:["After 4½ hours of driving","After 5½ hours of driving","After 3½ hours of driving","After 6½ hours of driving"]},it:{q:"Dopo quanto tempo di guida continuativa deve essere effettuata una pausa DI GUIDA di almeno 45 minuti?",a:["Dopo 4 ore e mezza di guida","Dopo 5 ore e mezza di guida","Dopo 3 ore e mezza di guida","Dopo 6 ore e mezza di guida"]}},
{en:{q:"If the break is placed BEFORE 4½ hours of driving elapse, what is sufficient?",a:["One break of 30 minutes, or two breaks of 20 minutes each","One break of 20 minutes, or two breaks of 15 minutes each","One break of 15 minutes, or two breaks of 10 minutes each","One break of 45 minutes taken in a single block"]},it:{q:"Se la pausa è collocata PRIMA che siano trascorse 4 ore e mezza di guida, cosa è sufficiente?",a:["Una pausa di 30 minuti, oppure due pause di 20 minuti ciascuna","Una pausa di 20 minuti, oppure due pause di 15 minuti ciascuna","Una pausa di 15 minuti, oppure due pause di 10 minuti ciascuna","Una pausa di 45 minuti presa in un unico blocco"]}},
{en:{q:"What may the driver NOT do during a driving break?",a:["Drive a vehicle","Have a coffee","Rest in the car","Read a newspaper"]},it:{q:"Cosa NON può fare il conducente durante una pausa di guida?",a:["Guidare un veicolo","Bere un caffè","Riposare in auto","Leggere un giornale"]}},
{en:{q:"When is the 45-minute driving break not required after 4½ hours?",a:["If a daily or weekly rest begins immediately afterwards","If the total driving time of the day stays under 9 hours","If the driver takes the break within the following hour","If the next customer has already been confirmed"]},it:{q:"Quando la pausa di guida di 45 minuti non è richiesta dopo 4 ore e mezza?",a:["Se subito dopo inizia un riposo giornaliero o settimanale","Se il tempo di guida totale del giorno resta sotto le 9 ore","Se il conducente effettua la pausa entro l'ora successiva","Se il prossimo cliente è già stato confermato"]}},
{en:{q:"A driver takes his break as two separate parts before 4½ h of driving. Each part must be at least...",a:["20 minutes","10 minutes","5 minutes","45 minutes"]},it:{q:"Un conducente fraziona la pausa in due parti prima di 4 ore e mezza di guida. Ogni parte deve durare almeno...",a:["20 minuti","10 minuti","5 minuti","45 minuti"]}},
{en:{q:"The purpose of the driving break is primarily to...",a:["Counter fatigue and keep the driver alert","Give time to clean and refuel the taxi","Allow the taximeter to be reset between trips","Give the employer time to check the vehicle"]},it:{q:"Lo scopo della pausa di guida è principalmente quello di...",a:["Contrastare la stanchezza e mantenere il conducente vigile","Dare tempo per pulire e rifornire il taxi","Permettere il reset del tassametro tra le corse","Dare tempo al datore di lavoro di controllare il veicolo"]}},
{en:{q:"What is the maximum weekly WORKING time (Arbeitszeit) for an EMPLOYED driver in a taxi business?",a:["53 hours","45 hours","48 hours","60 hours"]},it:{q:"Qual è il tempo DI LAVORO settimanale massimo (Arbeitszeit) per un conducente DIPENDENTE in un'azienda di taxi?",a:["53 ore","45 ore","48 ore","60 ore"]}},
{en:{q:"OUTSIDE taxi businesses, the maximum weekly WORKING time for an employed driver is...",a:["48 hours","53 hours","56 hours","40 hours"]},it:{q:"AL DI FUORI delle aziende di taxi, il tempo DI LAVORO settimanale massimo per un conducente dipendente è...",a:["48 ore","53 ore","56 ore","40 ore"]}},
{en:{q:"For a SELF-EMPLOYED driver, the working time is...",a:["Not limited by the ARV2 (but driving time, breaks and rest still apply)","Limited to 53 hours per week, like for employed drivers","Limited to 48 hours per week including the waiting time","Not regulated at all, not even driving time and rest"]},it:{q:"Per un conducente INDIPENDENTE, il tempo di lavoro è...",a:["Non limitato dall'OLR2 (ma restano validi tempo di guida, pause e riposo)","Limitato a 53 ore a settimana, come per i conducenti dipendenti","Limitato a 48 ore a settimana compreso il tempo di attesa","Non regolato affatto, nemmeno tempo di guida e riposo"]}},
{en:{q:"At the latest after how much working time must an employed driver take a WORK break (Arbeitspause)?",a:["After 5½ hours of working time","After 8 hours of working time","After 4½ hours of working time","After 7 hours of working time"]},it:{q:"Al più tardi dopo quanto tempo di lavoro un conducente dipendente deve fare una pausa DI LAVORO (Arbeitspause)?",a:["Dopo 5 ore e mezza di lavoro","Dopo 8 ore di lavoro","Dopo 4 ore e mezza di lavoro","Dopo 7 ore di lavoro"]}},
{en:{q:"For a daily working time of UP TO 7 hours, the minimum work break is...",a:["20 minutes","30 minutes","45 minutes","60 minutes"]},it:{q:"Per un tempo di lavoro giornaliero FINO A 7 ore, la pausa lavorativa minima è di...",a:["20 minuti","30 minuti","45 minuti","60 minuti"]}},
{en:{q:"For a daily working time of MORE THAN 9 hours, the work break must be...",a:["1 hour, or 2×30 minutes, or 3×20 minutes","45 minutes, or 2×25 minutes, or 3×15 minutes","30 minutes, or 2×15 minutes, or 3×10 minutes","20 minutes taken in one single block"]},it:{q:"Per un tempo di lavoro giornaliero SUPERIORE a 9 ore, la pausa lavorativa deve essere di...",a:["1 ora, oppure 2×30 minuti, oppure 3×20 minuti","45 minuti, oppure 2×25 minuti, oppure 3×15 minuti","30 minuti, oppure 2×15 minuti, oppure 3×10 minuti","20 minuti presi in un unico blocco"]}},
{en:{q:"Regular overtime work is limited to how many hours per week?",a:["4 hours per week","10 hours per week","8 hours per week","2 hours per week"]},it:{q:"Il lavoro straordinario ordinario è limitato a quante ore a settimana?",a:["4 ore a settimana","10 ore a settimana","8 ore a settimana","2 ore a settimana"]}},
{en:{q:"Overtime work per calendar year may not exceed...",a:["208 hours","300 hours","150 hours","100 hours"]},it:{q:"Il lavoro straordinario per anno civile non può superare...",a:["208 ore","300 ore","150 ore","100 ore"]}},
{en:{q:"What is the regular minimum daily rest period?",a:["11 consecutive hours","9 consecutive hours","8 consecutive hours","12 consecutive hours"]},it:{q:"Qual è il riposo giornaliero minimo ordinario?",a:["11 ore consecutive","9 ore consecutive","8 ore consecutive","12 ore consecutive"]}},
{en:{q:"The daily rest may be reduced to 9 hours at most how many times per week?",a:["3 times per week","1 time per week","5 times per week","It may never be reduced"]},it:{q:"Il riposo giornaliero può essere ridotto a 9 ore al massimo quante volte a settimana?",a:["3 volte a settimana","1 volta a settimana","5 volte a settimana","Non può mai essere ridotto"]}},
{en:{q:"Does a reduced (9-hour) daily rest have to be compensated later?",a:["No, a reduced daily rest does not have to be compensated","Yes, before the end of the following week","Yes, attached to another rest of at least 8 hours","Yes, but only in the case of employed drivers"]},it:{q:"Un riposo giornaliero ridotto (9 ore) deve essere recuperato in seguito?",a:["No, un riposo giornaliero ridotto non deve essere recuperato","Sì, entro la fine della settimana successiva","Sì, unito a un altro riposo di almeno 8 ore","Sì, ma solo nel caso dei conducenti dipendenti"]}},
{en:{q:"At any moment of professional activity, how much of the previous 24 hours must have been consecutive rest?",a:["11 hours","8 hours","6 hours","24 hours"]},it:{q:"In ogni momento dell'attività professionale, quanta parte delle 24 ore precedenti deve essere stata riposo consecutivo?",a:["11 ore","8 ore","6 ore","24 ore"]}},
{en:{q:"If the daily rest is split within 24 hours, how many parts are allowed and how long must one part be?",a:["Up to 3 parts, with one part of at least 8 hours","Up to 2 parts, with one part of at least 6 hours","Up to 3 parts, with one part of at least 4 hours","Up to 4 parts of at least 3 hours each"]},it:{q:"Se il riposo giornaliero è frazionato nelle 24 ore, quante parti sono ammesse e quanto deve durare una parte?",a:["Fino a 3 parti, con una parte di almeno 8 ore","Fino a 2 parti, con una parte di almeno 6 ore","Fino a 3 parti, con una parte di almeno 4 ore","Fino a 4 parti di almeno 3 ore ciascuna"]}},
{en:{q:"Rest time may be replaced by a payment (money) instead of actually being taken.",a:["False – rest may not be replaced by money (compensation ban)","True – if the driver agrees to the payment in writing","True – but only in the case of self-employed drivers","True – for at most 4 hours of rest time per week"]},it:{q:"Il tempo di riposo può essere sostituito da un pagamento (denaro) invece di essere effettivamente goduto.",a:["Falso – il riposo non può essere sostituito con denaro (divieto di indennizzo)","Vero – se il conducente acconsente al pagamento per iscritto","Vero – ma solo nel caso dei conducenti indipendenti","Vero – per al massimo 4 ore di riposo a settimana"]}},
{en:{q:"An EMPLOYED driver must have a weekly rest day of at least...",a:["24 consecutive hours","12 consecutive hours","48 consecutive hours","8 consecutive hours"]},it:{q:"Un conducente DIPENDENTE deve avere un giorno di riposo settimanale di almeno...",a:["24 ore consecutive","12 ore consecutive","48 ore consecutive","8 ore consecutive"]}},
{en:{q:"A SELF-EMPLOYED driver must, within two weeks, take how many rest days?",a:["Two rest days of at least 24 consecutive hours each","One rest day of at least 24 consecutive hours","Two rest days of at least 12 consecutive hours each","Four rest days of at least 8 consecutive hours each"]},it:{q:"Un conducente INDIPENDENTE deve, nell'arco di due settimane, prendere quanti giorni di riposo?",a:["Due giorni di riposo di almeno 24 ore consecutive ciascuno","Un giorno di riposo di almeno 24 ore consecutive","Due giorni di riposo di almeno 12 ore consecutive ciascuno","Quattro giorni di riposo di almeno 8 ore consecutive ciascuno"]}},
{en:{q:"Between two rest days of a self-employed driver, at most how many days of professional activity may lie?",a:["12 days","6 days","14 days","8 days"]},it:{q:"Tra due giorni di riposo di un conducente indipendente, quanti giorni di attività professionale al massimo possono trascorrere?",a:["12 giorni","6 giorni","14 giorni","8 giorni"]}},
{en:{q:"The rest day counts as taken on a Sunday/holiday if at least how many of the 24 hours fall on it?",a:["18 hours","12 hours","24 hours","6 hours"]},it:{q:"Il giorno di riposo è considerato goduto in una domenica/festivo se almeno quante delle 24 ore vi cadono?",a:["18 ore","12 ore","24 ore","6 ore"]}},
{en:{q:"Who is entitled to a free half-day per week in addition to the weekly rest day?",a:["An employee whose work is spread over more than 5 mornings and afternoons of the week","An employee whose weekly working time regularly exceeds 45 hours","An employee who regularly works on Sundays and public holidays","Every employed driver, regardless of how the work is distributed"]},it:{q:"Chi ha diritto a una mezza giornata libera a settimana oltre al giorno di riposo settimanale?",a:["Un dipendente il cui lavoro è distribuito su più di 5 mattine e pomeriggi della settimana","Un dipendente il cui tempo di lavoro settimanale supera regolarmente le 45 ore","Un dipendente che lavora regolarmente la domenica e nei giorni festivi","Ogni conducente dipendente, indipendentemente da come è distribuito il lavoro"]}},
{en:{q:"The free half-day consists of 5 consecutive hours between which times?",a:["Between 07:00 and 18:00","Between 00:00 and 05:00","Between 18:00 and 23:00","Between 06:00 and 12:00"]},it:{q:"La mezza giornata libera consiste in 5 ore consecutive tra quali orari?",a:["Tra le 07:00 e le 18:00","Tra le 00:00 e le 05:00","Tra le 18:00 e le 23:00","Tra le 06:00 e le 12:00"]}},
{en:{q:"For an EMPLOYED taxi driver, time spent waiting for customers while available for the employer counts as...",a:["Working time","Rest time","A driving break","Free time"]},it:{q:"Per un tassista DIPENDENTE, il tempo trascorso in attesa dei clienti restando a disposizione del datore di lavoro conta come...",a:["Tempo di lavoro","Tempo di riposo","Una pausa di guida","Tempo libero"]}},
{en:{q:"Standby time (Bereitschaftszeit) is best described as...",a:["Time when the driver is not driving but must remain available to work","Time when the driver may leave the workplace and use the time freely","Time between two shifts that the driver spends at home","The statutory break after 4½ hours of driving"]},it:{q:"Il tempo di disponibilità (Bereitschaftszeit) è descritto meglio come...",a:["Tempo in cui il conducente non guida ma deve restare disponibile a lavorare","Tempo in cui il conducente può lasciare il posto di lavoro e disporre liberamente del tempo","Tempo tra due turni che il conducente trascorre a casa","La pausa obbligatoria dopo 4 ore e mezza di guida"]}},
{en:{q:"Why does waiting time matter for an employed driver's limits?",a:["Because it counts toward the maximum working time, not as rest","Because it counts as rest time and extends the working day","Because it counts as a driving break and replaces the 45 minutes","Because it is deducted from the daily driving time"]},it:{q:"Perché il tempo di attesa è rilevante per i limiti di un conducente dipendente?",a:["Perché conta ai fini del tempo di lavoro massimo, non come riposo","Perché conta come tempo di riposo e allunga la giornata lavorativa","Perché conta come pausa di guida e sostituisce i 45 minuti","Perché viene dedotto dal tempo di guida giornaliero"]}},
{en:{q:"A self-employed driver records his times in a...",a:["Work book (Arbeitsbuch)","Company logbook (Fahrtenbuch)","Weekly report (Wochenrapport)","Vehicle service booklet"]},it:{q:"Un conducente indipendente registra i suoi tempi in un...",a:["Libretto di lavoro (Arbeitsbuch)","Libro di bordo aziendale (Fahrtenbuch)","Rapporto settimanale (Wochenrapport)","Libretto di manutenzione del veicolo"]}},
{en:{q:"Before starting the trip, what must a self-employed driver enter in the work book?",a:["The consecutive rest before starting, the start time and the licence-plate number","The customer's name, the destination and the agreed fare","The odometer reading, the fuel level and the vehicle's condition","Only the date and the signature; everything else in the evening"]},it:{q:"Prima di iniziare la corsa, cosa deve annotare un conducente indipendente nel libretto di lavoro?",a:["Il riposo consecutivo prima dell'inizio, l'ora di inizio e il numero di targa","Il nome del cliente, la destinazione e la tariffa concordata","Il chilometraggio, il livello del carburante e lo stato del veicolo","Solo la data e la firma; tutto il resto alla sera"]}},
{en:{q:"At the end of the working day, what must the self-employed driver additionally record?",a:["The total driving time and the new odometer reading","The number of trips and the total fares collected","The weather conditions and the traffic situation","The names of all passengers transported that day"]},it:{q:"Alla fine della giornata lavorativa, cosa deve annotare in più il conducente indipendente?",a:["Il tempo di guida totale e il nuovo chilometraggio","Il numero di corse e l'incasso totale","Le condizioni meteo e la situazione del traffico","I nomi di tutti i passeggeri trasportati quel giorno"]}},
{en:{q:"What is the purpose of the driving/rest-time records?",a:["To allow the authorities to check compliance with the ARV2","To let the employer calculate the wages correctly","To provide statistics for the federal roads office","To document the fares charged to the customers"]},it:{q:"Qual è lo scopo delle registrazioni dei tempi di guida/riposo?",a:["Permettere alle autorità di verificare il rispetto dell'OLR2","Permettere al datore di lavoro di calcolare correttamente i salari","Fornire statistiche all'ufficio federale delle strade","Documentare le tariffe applicate ai clienti"]}},
{en:{q:"A digital tachograph or equivalent recording is used mainly to...",a:["Record driving, work and rest periods reliably","Record the route taken and the average speed","Record the fares and distances of each trip","Monitor the vehicle's fuel consumption"]},it:{q:"Un tachigrafo digitale o registrazione equivalente serve principalmente a...",a:["Registrare in modo affidabile i periodi di guida, lavoro e riposo","Registrare il percorso effettuato e la velocità media","Registrare le tariffe e le distanze di ogni corsa","Monitorare il consumo di carburante del veicolo"]}},
{en:{q:"Records of working, driving and rest time must be...",a:["Kept and made available for control","Archived by the canton for ten years","Handed over to the passengers on request","Destroyed as soon as the wages have been paid"]},it:{q:"Le registrazioni di tempo di lavoro, guida e riposo devono essere...",a:["Conservate e messe a disposizione per il controllo","Archiviate dal cantone per dieci anni","Consegnate ai passeggeri su richiesta","Distrutte non appena i salari sono stati pagati"]}},
{en:{q:"A key duty of the employer under the ARV2 is to...",a:["Monitor that working, driving and rest-time rules are respected","Pay any fines the drivers receive while on duty","Provide every driver with a personal vehicle","Check the taximeter tariffs every month"]},it:{q:"Un dovere fondamentale del datore di lavoro secondo l'OLR2 è...",a:["Vigilare sul rispetto delle norme su tempo di lavoro, guida e riposo","Pagare le multe ricevute dai conducenti in servizio","Fornire a ogni conducente un veicolo personale","Controllare ogni mese le tariffe del tassametro"]}},
{en:{q:"The employer's record (Aufstellung) of times must contain, among other things...",a:["Daily driving time, total daily/weekly working time and overtime","The routes driven and the customers served each day","The wages, tips and expenses of every driver","The fuel consumption and service intervals of the vehicles"]},it:{q:"Il registro (Aufstellung) dei tempi tenuto dal datore di lavoro deve contenere, tra l'altro...",a:["Tempo di guida giornaliero, tempo di lavoro totale giornaliero/settimanale e straordinari","I percorsi effettuati ogni giorno e l'elenco completo dei clienti serviti","I salari mensili, le mance e le spese di servizio di ogni singolo conducente","Il consumo di carburante e gli intervalli di manutenzione di tutti i veicoli"]}},
{en:{q:"Who is generally responsible for controlling compliance on the road and in businesses?",a:["The competent cantonal enforcement authority","The federal customs administration","The communal taxi commission","The accredited vehicle inspection centres"]},it:{q:"Chi è generalmente responsabile del controllo del rispetto delle norme su strada e nelle aziende?",a:["L'autorità cantonale di esecuzione competente","L'amministrazione federale delle dogane","La commissione comunale dei taxi","I centri accreditati di controllo dei veicoli"]}},
{en:{q:"What driving experience is normally required before obtaining the B121 (professional passenger transport)?",a:["At least 1 year of category B experience without licence withdrawal","At least 3 years of category B experience without any fines","At least 2 years of driving experience in any category","No minimum experience, but a completed driving course"]},it:{q:"Quale esperienza di guida è normalmente richiesta prima di ottenere il B121 (trasporto professionale di persone)?",a:["Almeno 1 anno di esperienza in categoria B senza revoca della licenza","Almeno 3 anni di esperienza in categoria B senza alcuna multa","Almeno 2 anni di esperienza di guida in qualsiasi categoria","Nessuna esperienza minima, ma un corso di guida completato"]}},
{en:{q:"Before registering, the candidate normally must pass a...",a:["Medical examination by an approved physician","Eye test at a recognised optician only","Psychological aptitude assessment","First-aid course taken within the last two years"]},it:{q:"Prima di iscriversi, il candidato deve normalmente superare una...",a:["Visita medica presso un medico riconosciuto","Solo esame della vista presso un ottico riconosciuto","Valutazione psicologica dell'idoneità","Corso di primo soccorso svolto negli ultimi due anni"]}},
{en:{q:"How often is the medical control examination repeated UP TO age 50?",a:["Every 5 years","Every year","Every 10 years","Only once"]},it:{q:"Ogni quanto viene ripetuta la visita medica di controllo FINO ai 50 anni?",a:["Ogni 5 anni","Ogni anno","Ogni 10 anni","Solo una volta"]}},
{en:{q:"AFTER age 50, how often must the medical control examination be repeated?",a:["Every 3 years","Every 5 years","Every year","Never again"]},it:{q:"DOPO i 50 anni, ogni quanto deve essere ripetuta la visita medica di controllo?",a:["Ogni 3 anni","Ogni 5 anni","Ogni anno","Mai più"]}},
{en:{q:"The B121 authorises professional passenger transport with vehicles up to how many seats IN TOTAL (driver INCLUDED)?",a:["9 seats (8 passengers + driver)","16 seats (15 passengers + driver)","20 seats (19 passengers + driver)","5 seats (4 passengers + driver)"]},it:{q:"Il B121 autorizza il trasporto professionale di persone con veicoli fino a quanti posti IN TOTALE (conducente INCLUSO)?",a:["9 posti (8 passeggeri + conducente)","16 posti (15 passeggeri + conducente)","20 posti (19 passeggeri + conducente)","5 posti (4 passeggeri + conducente)"]}},
{en:{q:"In addition to passing the B121 steps, a driver may also need, depending on the canton...",a:["A separate cantonal operating permit (local knowledge, local rules, language)","A federal passenger-transport concession issued by the FOT","Membership in the regional taxi association","A certificate of completed commercial training"]},it:{q:"Oltre a superare le tappe del B121, un conducente può inoltre necessitare, a seconda del cantone...",a:["Un'autorizzazione cantonale d'esercizio separata (conoscenze locali, regole locali, lingua)","Una concessione federale per il trasporto di persone rilasciata dall'UFT","L'adesione all'associazione regionale dei taxi","Un certificato di formazione commerciale completata"]}},

/* ================= CONSTANTS (official exam format) ================= */
const EXAM_N = 30;          // questions per exam
const EXAM_MIN = 45;        // minutes
const MAX_MISTAKES = 3;     // max errors allowed
const CRITICAL_S = 5*60;    // timer turns red

/* ================= STATE ================= */
let lang = localStorage.getItem('b121lang2') || null;
let view = lang ? 'start' : 'lang';   // lang | start | exam | overview | result
let exam = null;  // {qs:[{p (pool idx), perm:[..]}], answers:[origIdx|null], marked:[bool], cur, endTime, timerId, finishedIn}
const $ = id=>document.getElementById(id);
const esc = s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function shuffled(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const T = ()=>UI[lang||'en'];

/* ================= VIEWS ================= */
function loginInfoBlock(){
  const t=T();
  return `<table class="logininfo"><tr><td>${t.loggedIn}</td><td>Demo</td></tr>
  <tr><td>${t.category}</td><td>B121</td></tr>
  <tr><td>${t.device}</td><td>Web</td></tr></table>`;
}

function renderLang(){
  $('app').innerHTML = `
    <div class="header"></div>
    ${lang?loginInfoBlock():`<table class="logininfo"><tr><td>Logged in:</td><td>Demo</td></tr><tr><td>Category:</td><td>B121</td></tr><tr><td>Device:</td><td>Web</td></tr></table>`}
    <div class="langpage">
      <div style="margin-top:40px; text-align:center; font-size:13px; line-height:1.5;">
        Select a language<br>Seleziona una lingua
      </div>
      <div class="langcards">
        <button class="langcard" onclick="pickLang('en')">English</button>
        <button class="langcard" onclick="pickLang('it')">Italiano</button>
      </div>
    </div>`;
}
function pickLang(l){ lang=l; localStorage.setItem('b121lang2',l); view='start'; render(); }

function renderStart(){
  const t=T();
  $('app').innerHTML = `
    <div class="header"></div>
    ${loginInfoBlock()}
    <div class="startpage">
      <h1>${t.startTitle}</h1>
      <div class="goodluck">${t.goodLuck}</div>
      <div class="disclaimer">${t.disclaimer}</div>
      <div class="examtable">
        <table>
          <tr><td>${t.yourExam}</td><td>${t.catValue}<br>${t.oneAnswer}</td></tr>
          <tr><td>${t.numQuestions}</td><td>${EXAM_N}</td></tr>
          <tr><td>${t.maxScore}</td><td>${EXAM_N}</td></tr>
          <tr><td>${t.maxMistakes}</td><td>${MAX_MISTAKES}</td></tr>
          <tr><td>${t.time}</td><td>${t.minutes}</td></tr>
        </table>
      </div>
      <button class="pbtn invert startbtn" onclick="startExam()">${t.startExam}</button>
    </div>
    <div class="footer justified">
      <span style='font-size:12px;color:var(--dark-grey)'>v6</span>
      <button class="pbtn" onclick="view='lang';render()">${IC.lang} ${lang==='en'?'English':'Italiano'}</button>
    </div>`;
}

function saveExam(){
  if(!exam) return;
  try{ localStorage.setItem('b121exam', JSON.stringify({qs:exam.qs, answers:exam.answers, marked:exam.marked, cur:exam.cur, total:exam.total, left:exam.left, savedAt:Date.now()})); }catch(e){}
}
function clearSaved(){ try{ localStorage.removeItem('b121exam'); }catch(e){} }
function resumeExam(){
  try{
    const s=JSON.parse(localStorage.getItem('b121exam')||'null');
    if(!s || !Array.isArray(s.qs) || s.qs.length!==EXAM_N || !Array.isArray(s.answers)) return false;
    const elapsed=Math.floor((Date.now()-(s.savedAt||Date.now()))/1000);
    exam={qs:s.qs, answers:s.answers, marked:s.marked, cur:s.cur||0, total:s.total, left:Math.max(0, s.left-elapsed), timerId:null};
    view='exam';
    if(exam.left<=0){ exam.left=0; render(); finish(); return true; }
    exam.timerId=setInterval(tick, 1000);
    return true;
  }catch(e){ return false; }
}
function startExam(){
  clearSaved();
  const picks = shuffled(POOL.map((_,i)=>i)).slice(0,EXAM_N);
  exam = {
    qs: picks.map(p=>({p, perm: shuffled([0,1,2,3])})),
    answers: Array(EXAM_N).fill(null),
    marked: Array(EXAM_N).fill(false),
    cur: 0,
    total: EXAM_MIN*60,
    left: EXAM_MIN*60,
    timerId: null
  };
  exam.timerId = setInterval(tick, 1000);
  view='exam'; render();
}

function tick(){
  if(!exam) return;
  exam.left--;
  if(exam.left<=0){
    clearInterval(exam.timerId);
    exam.left=0;
    showDialog(`<p>${T().timeUp}</p>`, [[T().ok, ()=>{closeDialog(); finish();}, true]]);
    return;
  }
  saveExam();
  const el=$('timelabel'), fill=$('timefill');
  if(el){ el.innerHTML = timeHTML(); el.classList.toggle('critical', exam.left<=CRITICAL_S); }
  if(fill){ fill.style.width = (exam.left/exam.total*100)+'%'; }
}
function timeHTML(){
  const m=Math.floor(exam.left/60), s=exam.left%60;
  return `${T().remaining}&nbsp;<b>${m}:${String(s).padStart(2,'0')}</b>`;
}

function renderExam(){
  const t=T(), e=exam, qq=e.qs[e.cur], q=POOL[qq.p][lang];
  const answeredCount = e.answers.filter(a=>a!==null).length;
  const markedCount = e.marked.filter(Boolean).length;
  $('app').innerHTML = `
    <div class="header justified">
      <div>
        <button class="pbtn" onclick="view='overview';render()">${IC.menu} <span>${t.overview}</span></button>
      </div>
      <div style="display:flex; align-items:center;">
        <div class="hstack">
          <div class="row questionBookmarked">${IC.bookmark}<span>${t.marked(markedCount)}</span></div>
          <div class="row questionAnswered">${IC.check}<span>${answeredCount} / ${EXAM_N}</span></div>
        </div>
        <div class="timewrap">
          <div class="cut-time">
            <div class="fill" id="timefill" style="width:${e.left/e.total*100}%"></div>
            <div class="label ${e.left<=CRITICAL_S?'critical':''}" id="timelabel">${timeHTML()}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="scrollpanel">
      <div class="examcontainer">
        <div class="self-center">
          <button class="navbtn back" onclick="nav(-1)" ${e.cur===0?'disabled':''}>${IC.chevL}</button>
        </div>
        <div class="exampage">
          <div class="content">
            <div class="title">
              <span class="titleText">${t.question} ${e.cur+1} ${t.of} ${EXAM_N}</span>
              <div class="flexspacer"></div>
              <button class="pbtn bookmarkbtn" onclick="toggleMark()">
                ${IC.bookmark} <span>${e.marked[e.cur]?t.removeBookmark:t.bookmark}</span>
              </button>
            </div>
            <div class="qcols">
              <div class="contentLeft">
                <span class="questionTitle">${esc(q.q)}</span>
              </div>
              <div class="contentRight">
                ${qq.perm.map(orig=>{
                  const sel = e.answers[e.cur]===orig;
                  return `<div class="answer ${sel?'selected checked':''}" onclick="choose(${orig})">
                    <span class="pcheck"></span>
                    <span class="atext">${esc(q.a[orig])}</span>
                  </div>`;
                }).join('')}
              </div>
            </div>
          </div>
        </div>
        <div class="self-center">
          <button class="navbtn forward" onclick="nav(1)" ${e.cur===EXAM_N-1?'disabled':''}>${IC.chevR}</button>
        </div>
      </div>
    </div>

    <div class="footer justified">
      <button class="pbtn" onclick="showHelp()">${IC.help} ${t.help}</button>
      <button class="pbtn" onclick="askFinish()">${IC.check} ${t.closeExam}</button>
      <button class="pbtn" onclick="switchLangInline()">${IC.lang} ${lang==='en'?'English':'Italiano'}</button>
    </div>
    <div class="backdrop" id="dlgback"><div class="pdialog" id="dlg"></div></div>`;
}

function choose(orig){
  exam.answers[exam.cur] = orig;   // always select; a repeated click must never deselect
  saveExam();
  render();
}
function nav(d){
  exam.cur=Math.min(EXAM_N-1,Math.max(0,exam.cur+d));
  saveExam();
  render();
}
function toggleMark(){ exam.marked[exam.cur]=!exam.marked[exam.cur]; saveExam(); render(); }
function gotoQ(i){ exam.cur=i; view='exam'; saveExam(); render(); }
function switchLangInline(){ lang = lang==='en'?'it':'en'; localStorage.setItem('b121lang2',lang); render(); }

function renderOverview(){
  const t=T(), e=exam;
  const answeredCount=e.answers.filter(a=>a!==null).length;
  const markedCount=e.marked.filter(Boolean).length;
  $('app').innerHTML = `
    <div class="header justified">
      <div>
        <button class="pbtn" onclick="view='exam';render()">${IC.menu} <span>${t.closeOverview}</span></button>
      </div>
      <div class="hstack">
        <div class="row questionBookmarked">${IC.bookmark}<span>${t.marked(markedCount)}</span></div>
        <div class="row questionAnswered">${IC.check}<span>${t.answered(answeredCount)}</span></div>
      </div>
    </div>
    <div class="scrollpanel">
      <div class="ovwrap">
        ${e.qs.map((_,i)=>`
          <div class="list-item">
            <span class="flag ${e.marked[i]?'':'hiddenflag'}">${IC.flag}</span>
            <button class="pbtn ovbtn ${e.answers[i]!==null?'invert answered':''}" onclick="gotoQ(${i})">
              <span class="button-text">${i+1}</span>
            </button>
          </div>`).join('')}
      </div>
    </div>
    <div class="footer justified">
      <button class="pbtn" onclick="showHelp()">${IC.help} ${t.help}</button>
      <button class="pbtn" onclick="askFinish()">${IC.check} ${t.closeExam}</button>
      <span></span>
    </div>
    <div class="backdrop" id="dlgback"><div class="pdialog" id="dlg"></div></div>`;
}

/* ===== dialogs ===== */
function showDialog(html, buttons){
  const back=$('dlgback');
  if(!back) return;
  $('dlg').innerHTML = html + `<div class="dlgbuttons">${buttons.map((b,i)=>
    `<button class="pbtn ${b[2]?'invert':''}" id="dlgbtn${i}">${esc(b[0])}</button>`).join('')}</div>`;
  buttons.forEach((b,i)=>{ $('dlgbtn'+i).onclick=b[1]; });
  back.classList.add('open');
}
function closeDialog(){ const b=$('dlgback'); if(b) b.classList.remove('open'); }
function showHelp(){
  const t=T();
  showDialog(t.helpTexts.map(h=>`<p><b>${esc(h[0])}</b><br>${esc(h[1])}</p>`).join(''), [[t.ok, closeDialog, true]]);
}
function askFinish(){
  const t=T();
  const missing = exam.answers.some(a=>a===null);
  showDialog(`<p>${missing?t.confirmMissing:t.confirmAll}</p>`,
    [[t.doNotClose, closeDialog, false],[t.closeNow, ()=>{closeDialog();finish();}, true]]);
}

function finish(){
  clearInterval(exam.timerId);
  clearSaved();
  exam.usedS = exam.total - exam.left;
  view='result'; render();
  window.scrollTo(0,0);
}

function renderResult(){
  const t=T(), e=exam;
  const correct=e.answers.filter(a=>a===0).length;
  const mistakes=EXAM_N-correct;
  const pass=mistakes<=MAX_MISTAKES;
  const mm=Math.floor(e.usedS/60), ss=e.usedS%60;
  $('app').innerHTML = `
    <div class="header"></div>
    ${loginInfoBlock()}
    <div class="scrollpanel scrollpanel-noheader" style="top:80px;">
    <div class="resultpage">
      <h1>${t.examResult}</h1>
      <div class="verdict ${pass?'pass':'fail'}">${pass?t.passed:t.failed}</div>
      <div class="examtable">
        <table>
          <tr><td>${t.score}</td><td>${correct} / ${EXAM_N}</td></tr>
          <tr><td>${t.mistakes}</td><td>${mistakes} (max. ${MAX_MISTAKES})</td></tr>
          <tr><td>${t.time}</td><td>${mm}:${String(ss).padStart(2,'0')}</td></tr>
        </table>
      </div>
      <button class="pbtn invert" style="margin-top:26px;" onclick="startExam()">${t.newExam}</button>

      <div class="reviewwrap">
        <h2>${t.review}</h2><div style="font-size:13px; color:var(--night-rider); margin:8px 0 2px; line-height:1.6;">${t.legend}</div>
        ${e.qs.map((qq,i)=>{
          const q=POOL[qq.p][lang], user=e.answers[i];
          return `<div>
            <div class="rquestion"><span class="qnum">${i+1}.</span> ${esc(q.q)} ${e.marked[i]?`<span class="rmarkedflag">⚑</span>`:''} ${user===null?`<span style="color:var(--error-color); font-weight:400; font-size:13px;">— ${t.notAnswered}</span>`:''}</div>
            ${qq.perm.map(orig=>{
              const isC=orig===0, isU=user===orig;
              let cls='answer'; if(isU) cls+=' checked selected';
              let ring=''; if(isC) ring='correct'; else if(isU) ring='incorrect';
              return `<div class="${cls}" style="cursor:default">
                <span class="${ring}"><span class="ring"><span class="pcheck"></span></span></span>
                <span class="atext">${esc(q.a[orig])}</span>
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>
    </div>
    </div>
    <div class="footer justified">
      <span></span>
      <button class="pbtn" onclick="switchLangInline()">${IC.lang} ${lang==='en'?'English':'Italiano'}</button>
    </div>`;
}

/* ================= RENDER ROOT ================= */
function render(){
  if(view==='lang') renderLang();
  else if(view==='start') renderStart();
  else if(view==='exam') renderExam();
  else if(view==='overview') renderOverview();
  else if(view==='result') renderResult();
}
if(lang) resumeExam();
render();
</script>
</body>
</html>
